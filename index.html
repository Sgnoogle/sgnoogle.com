/* ─────────────────────────── ModuleTab (desktop, accordion) ───────────────────────────
   Inactive (no current): 1fr, opacity 60%, only number visible.
   Active: 2.5fr, opacity 100%, number + icon + label visible.
   Focused (hovered, not active): width unchanged, yellow arrow appears.

   Ripple "armed": mousedown → outline appears on the tab. mouseup on the
   same tab triggers select() + a yellow sonar ripple at the release point.
   If the pointer leaves before mouseup, armed clears and no ripple fires. */
function ModuleTab({ id, label, sub, active, focused, anyActive, hotkey, onClick, onHover, onLeave }) {
  const [armed, setArmed] = React.useState(false);
  const tabRef = React.useRef(null);
  // Track 'expanded' separately so the icon/label transitions stay visible
  // while the column animates from 1fr → 2.5fr.
  const expanded = active;
  // Inactive tabs dim only when SOMETHING is active (per spec).
  const dim = anyActive && !active;

  const spawnRipple = React.useCallback((x, y) => {
    const layer = document.body;
    const ring = document.createElement('span');
    ring.className = 'sgn-ripple-ring';
    ring.style.position = 'fixed';
    ring.style.left = x + 'px';
    ring.style.top  = y + 'px';
    ring.style.zIndex = 99999;
    ring.style.pointerEvents = 'none';
    layer.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove(), { once: true });
  }, []);

  const onDown = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    setArmed(true);
  };
  const onUp = (e) => {
    if (!armed) return;
    setArmed(false);
    // Solo mouse: niente sonar al tap su touch/pen (ridondante su mobile).
    // La selezione (onClick) scatta comunque.
    if (!e.pointerType || e.pointerType === 'mouse') spawnRipple(e.clientX, e.clientY);
    onClick && onClick();
  };
  const onCancel = () => { setArmed(false); };

  return (
    <button
      ref={tabRef}
      data-armed-ripple
      data-tab-id={id}
      onMouseEnter={onHover}
      onMouseLeave={() => { onLeave?.(); setArmed(false); }}
      onPointerDown={onDown}
      onPointerUp={onUp}
      onPointerCancel={onCancel}
      onBlur={onCancel}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick && onClick(); } }}
      aria-current={active ? 'true' : undefined}
      aria-label={label + (sub ? ' — ' + sub : '')}
      style={{
        position: 'relative',
        background: expanded ? C.white : C.paper,
        // Bordo intero su tutti e 4 i lati — così la tab è una card
        // indipendente che fluttua sul paper, non un segmento di un blocco.
        // Il giallo vive SOLO nel top-rail (vedi span sotto): i lati restano
        // hairline neutri anche da attiva.
        border: `0.5px solid ${expanded ? C.border : C.borderSoft}`,
        outline: armed ? `1px solid ${C.yellow}` : 'none',
        outlineOffset: '-1px',
        padding: 'clamp(14px, 2vh, 22px) clamp(14px, 1.6vw, 22px)',
        textAlign: 'left',
        cursor: 'pointer',
        fontFamily: 'IBM Plex Mono, monospace',
        opacity: dim ? 0.6 : 1,
        transition: 'background 200ms linear, border-color 200ms linear, opacity 220ms linear, outline-color 80ms linear',
        display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
        gap: 10,
        minHeight: 'clamp(140px, 22vh, 200px)',
        overflow: 'hidden',
      }}
      className="sgn-tab"
    >
      {/* Module icon — top-left, sempre visibile, dà identità a ogni tab */}
      <span style={{
        position: 'absolute', top: 10, left: 12, zIndex: 2,
        lineHeight: 0, pointerEvents: 'none',
        transition: 'opacity 200ms linear',
      }}>
        <ModuleIcon
          id={id}
          size={20}
          color={expanded ? C.ink : C.grey}
          strokeWidth={expanded ? 1.4 : 1.1}
        />
      </span>

      {/* MarathonArrow — top-right. Affordance di stato:
          · hover (focused) → punta ↗ (NE): "apri questa sezione"
          · attiva (expanded) → ruota a ↓: chevron "aperta", come un accordion.
          La rotazione di stato vive su un wrapper interno per non entrare in
          conflitto col translate d'ingresso dello span esterno. */}
      <span style={{
        position: 'absolute', top: 9, right: 9, zIndex: 2,
        lineHeight: 0,
        opacity: (expanded || focused) ? 1 : 0,
        transform: (expanded || focused) ? 'translate(0, 0)' : 'translate(4px, -4px)',
        transition: 'opacity 180ms linear, transform 220ms cubic-bezier(0.2,0,0,1)',
        pointerEvents: 'none',
      }}>
        <span style={{
          display: 'inline-block', lineHeight: 0,
          transform: expanded ? 'rotate(135deg)' : 'rotate(0deg)',
          transition: 'transform 360ms cubic-bezier(0.34,1.4,0.5,1)',
        }}>
          <MarathonArrow size={20} dir="up-right" color={expanded ? C.ink : C.yellow}/>
        </span>
      </span>

      {/* Yellow top rail sull'active tab */}
      <span style={{
        position: 'absolute', top: -0.5, left: -0.5, right: -0.5,
        height: 2, background: C.yellow,
        transform: expanded ? 'scaleX(1)' : 'scaleX(0)',
        transformOrigin: 'left',
        transition: 'transform 320ms cubic-bezier(0.2,0,0,1)',
      }}/>

      {/* BOTTOM: numero + etichetta SEMPRE visibile (wayfinding anche a
          riposo). Tre stati, animati:
          · RIPOSO (niente di aperto)  → numero grande, etichetta SOTTO, grigia.
          · COLLASSATA (un'altra aperta) → numero rimpicciolito, etichetta SOTTO:
            così la colonna stretta NON tronca mai il nome (zero "puntini").
          · APERTA (questa attiva)     → numero grande, etichetta AFFIANCATA che
            cresce di corpo+colore e rivela il sottotitolo, sfruttando la
            larghezza extra dell'accordion.
          Tra riposo e collassata cambia solo il CORPO del numero → niente
          riflow di direzione, transizione fluida; solo l'apertura ruota in riga. */}
      <div style={{
        display: 'flex',
        flexDirection: expanded ? 'row' : 'column',
        alignItems: expanded ? 'flex-end' : 'flex-start',
        gap: expanded ? 16 : 'clamp(2px, 0.5vh, 6px)', minHeight: 0,
        transition: 'gap 320ms cubic-bezier(0.2,0,0,1)',
      }}>
        <span style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
          // Collassata → numero più piccolo (lascia aria all'etichetta sotto);
          // riposo/aperta → numero pieno.
          fontSize: dim ? 'clamp(30px, 4.6vh, 52px)' : 'clamp(48px, 8vh, 88px)',
          color: C.ink, letterSpacing: '-0.05em', lineHeight: 0.85,
          flexShrink: 0,
          transition: 'font-size 340ms cubic-bezier(0.2,0,0,1)',
        }}>{id}</span>

        {/* Blocco etichetta: label (scala rest→active) + sub (solo da aperta) */}
        <div style={{
          flex: expanded ? 1 : 'none', minWidth: 0, maxWidth: '100%',
          display: 'flex', flexDirection: 'column',
          justifyContent: 'flex-end',
          gap: expanded ? 4 : 0,
          paddingBottom: expanded ? 'clamp(3px, 0.6vh, 9px)' : 0,
          overflow: 'hidden',
        }}>
          <span style={{
            fontWeight: 700, letterSpacing: '0.18em',
            color: expanded ? C.ink : C.grey,
            whiteSpace: 'nowrap', overflow: 'hidden',
            textOverflow: expanded ? 'ellipsis' : 'clip',
            fontSize: expanded ? 'clamp(15px, 1.5vw, 22px)' : 'clamp(9px, 0.95vw, 11px)',
            transition: 'font-size 340ms cubic-bezier(0.2,0,0,1), color 220ms linear',
          }}>{label}</span>
          {sub && (
            <span style={{
              fontSize: 11, fontWeight: 500, color: C.grey,
              letterSpacing: '0.02em', whiteSpace: 'nowrap',
              overflow: 'hidden', textOverflow: 'ellipsis',
              maxHeight: expanded ? 18 : 0,
              opacity: expanded ? 1 : 0,
              transition: 'max-height 320ms cubic-bezier(0.2,0,0,1), opacity 220ms linear 60ms',
            }}>{sub}</span>
          )}
        </div>
      </div>
    </button>
  );
}

/* ModuleStrip — accordion 1fr / 2.5fr, tab fluttuanti scollegati.
   Niente outer border o background-divider: ogni tab è una card
   indipendente, separata dalle altre da un gap visibile su paper. */
function ModuleStrip({ current, focused, setFocused, lang, onSelect, mobile, sound }) {
  const L = I18N[lang];
  const ids = ['01','02','03','04','05'];
  const [activeFr, setActiveFr] = React.useState(2.5);

  React.useEffect(() => {
    function update() {
      setActiveFr(window.innerWidth < 1100 ? 2 : 2.5);
    }
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  if (mobile) {
    return <GameBoyStrip ids={ids} L={L} current={current} onSelect={onSelect} sound={sound}/>;
  }

  const cols = ids.map(id => id === current ? `${activeFr}fr` : '1fr').join(' ');

  /* Container-level mouse-leave: il preview si svuota SOLO quando il cursore
     lascia l'intera strip (cioè risale nel display centrale o esce di lato).
     Tra una tab e l'altra il focus si sostituisce ma non passa mai per null,
     quindi il display non flashava più sulla home SGNOOGLE durante lo sweep. */
  return (
    <div
      className="sgn-strip"
      onMouseLeave={() => setFocused?.(null)}
      style={{
        display: 'grid',
        gridTemplateColumns: cols,
        gap: 'clamp(8px, 1.2vw, 16px)',
        background: 'transparent',
        transition: 'grid-template-columns 320ms cubic-bezier(0.2,0,0,1)',
      }}>
      {ids.map((id, i) => (
        <ModuleTab
          key={id}
          id={id}
          label={L.modules[id].label}
          sub={L.modules[id].sub}
          hotkey={String(i + 1)}
          active={current === id}
          focused={focused === id}
          anyActive={!!current}
          onClick={() => onSelect(id)}
          onHover={() => { setFocused?.(id); sound && sound('hover'); }}
          /* onLeave intenzionalmente NO-OP: il container gestisce il clear. */
          onLeave={() => {}}
        />
      ))}
    </div>
  );
}

/* ─────────────────────────── GameBoyStrip (mobile) ───────────────────────────
   Five distinct chunky buttons, icone custom, no scroll.
   Active: --yellow background. Inactive: --paper + 0.5px border.
   3px bottom border simulates the raised key. On press the button slides
   down 2px and the bottom border collapses to 1px — no box-shadow used. */
function GameBoyStrip({ ids, L, current, onSelect, sound }) {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: 'repeat(5, 1fr)',
      gap: 8,
      background: 'transparent',
      padding: 0,
    }}>
      {ids.map((id, i) => (
        <GameBoyKey
          key={id}
          id={id}
          n={i + 1}
          label={L.modules[id].label}
          active={current === id}
          onPress={() => { onSelect(id); sound && sound('confirm'); }}
        />
      ))}
    </div>
  );
}

function GameBoyKey({ id, n, label, active, onPress }) {
  const [pressed, setPressed] = React.useState(false);

  return (
    <button
      aria-label={label}
      aria-current={active ? 'true' : undefined}
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onPress?.(); }}
      onPointerLeave={() => setPressed(false)}
      onPointerCancel={() => setPressed(false)}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPress?.(); } }}
      style={{
        position: 'relative',
        // Stessa lingua del desktop: la tab attiva diventa BIANCA, le inattive
        // restano paper. Stacco affidato a hairline + tono del fondo, mai ombre.
        background: active ? C.white : C.paper,
        color: C.ink,
        border: `0.5px solid ${active ? C.border : C.borderSoft}`,
        padding: '11px 6px 10px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
        cursor: 'pointer',
        fontFamily: 'IBM Plex Mono, monospace',
        // Press feedback minimale: micro-scala, niente bordo-rialzo né shadow.
        transform: pressed ? 'scale(0.96)' : 'scale(1)',
        transition: 'transform 90ms cubic-bezier(0.2,0,0,1), background 160ms linear, border-color 160ms linear',
        minHeight: 62,
      }}>
      {/* Top-rail giallo sulla key attiva — identico al desktop ModuleTab */}
      <span style={{
        position: 'absolute', top: -0.5, left: -0.5, right: -0.5,
        height: 2, background: C.yellow,
        transform: active ? 'scaleX(1)' : 'scaleX(0)',
        transformOrigin: 'left',
        transition: 'transform 280ms cubic-bezier(0.2,0,0,1)',
      }}/>
      <ModuleIcon id={id} size={22} color={active ? C.ink : C.grey} strokeWidth={1.4}/>
      {/* Label del modulo al posto del vecchio numero hotkey (inutile su touch).
          10px: sopra la soglia comoda di lettura su telefono (era 8px). */}
      <span style={{
        fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
        color: active ? C.ink : C.grey,
        transition: 'color 160ms linear',
      }}>{label}</span>
    </button>
  );
}

Object.assign(window, { TopBar, IdleDisplay, ModuleTab, ModuleStrip,
                         LiveBadge, CornerChangelog, ModulePreview, GameBoyStrip, GameBoyKey });

</script>

<script type="text/babel">
/* TapToStart — stessa estetica del BootScreen (sfondo paper, logo, barra
   vuota), ma statica. Un tap sblocca l'AudioContext e avvia il boot.
   Niente fade-out: onStart() è sincrono così non c'è mai un frame
   in cui né TapToStart né BootScreen sono visibili. */

function TapToStart({ lang = 'it', onStart, sound }) {
  const SEGMENTS = 24;
  const firedRef = React.useRef(false);

  const handleTap = React.useCallback(() => {
    if (firedRef.current) return;
    firedRef.current = true;
    window.sgnAudio?.unlock?.();
    if (sound) sound('confirm');
    onStart();
  }, [sound, onStart]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowRight') handleTap();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [handleTap]);

  return (
    <div
      onClick={handleTap}
      role="button"
      tabIndex={0}
      aria-label={lang === 'it' ? 'Premi per avviare' : 'Press to start'}
      style={{
        position: 'fixed', inset: 0, zIndex: 100001,
        background: C.paper,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        gap: 'clamp(28px, 8vh, 56px)',
        padding: 'clamp(20px, 5vw, 60px)',

<script type="text/babel">
/* BootScreen — boot mechanico, tacche che si riempiono in giallo da
   sinistra a destra. Stagger 30ms per segmento (~720ms a piena fila su
   24 segmenti), beat finale di ~280ms prima dello sweep di uscita.
   Total ≈ 1500ms. Tap/click per saltare. */

function BootScreen({ lang = 'it', onDone, sound }) {
  const SEGMENTS = 24;
  const STAGGER = 30;       // ms tra un segmento e il successivo
  const FILL_END = SEGMENTS * STAGGER;  // = 720ms — quando l'ultima tacca scatta
  const TOTAL = 1500;
  const [filled, setFilled] = React.useState(0);
  const [phase, setPhase] = React.useState('loading');
  const skipRef = React.useRef(false);
  const soundRef = React.useRef(sound);
  soundRef.current = sound;
  const onDoneRef = React.useRef(onDone);
  onDoneRef.current = onDone;

  /* Micro-status — riga di stato mostrata sotto la barra, cambia in 4 step.
     Niente bla-bla di marketing: messaggi da manuale tecnico. */
  const STATUS = React.useMemo(() => lang === 'en' ? [
    'KERNEL · MOUNT /paper',
    'MODULES · INDEX 01..05',
    'FONTS · NEUE-MACHINA · PLEX-MONO',
    'READY · AWAITING SIGNAL',
  ] : [
    'KERNEL · MOUNT /paper',
    'MODULI · INDEX 01..05',
    'FONT · NEUE-MACHINA · PLEX-MONO',
    'READY · IN ATTESA DEL SEGNALE',
  ], [lang]);
  const stepIndex = Math.min(STATUS.length - 1, Math.floor((filled / SEGMENTS) * STATUS.length));
  const statusLine = STATUS[stepIndex];

  React.useEffect(() => {
    let cancelled = false;
    const start = performance.now();
    const timers = [];

    // Schedule one ticker per segment, equally spaced. Mechanical contatore feel.
    for (let i = 0; i < SEGMENTS; i++) {
      const t = setTimeout(() => {
        if (cancelled || skipRef.current) return;
        setFilled(i + 1);
        if (soundRef.current) soundRef.current('boot');
      }, i * STAGGER);
      timers.push(t);
    }

    // After the full fill, hold for a beat, then leave.
    const leave = setTimeout(() => {
      if (cancelled || skipRef.current) return;
      if (soundRef.current) soundRef.current('bootReady');
      setPhase('leaving');
      setTimeout(() => { if (!cancelled) onDoneRef.current?.(); }, 320);
    }, TOTAL - 320);
    timers.push(leave);

    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, []);

  const skip = React.useCallback(() => {
    if (skipRef.current) return;
    skipRef.current = true;
    setFilled(SEGMENTS);
    setPhase('leaving');
    if (soundRef.current) soundRef.current('confirm');
    setTimeout(() => onDoneRef.current?.(), 200);
  }, []);

  return (
    <div
      onClick={skip}
      style={{
        position: 'fixed', inset: 0, zIndex: 100000,
        background: C.paper,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        gap: 'clamp(28px, 8vh, 56px)',
        padding: 'clamp(20px, 5vw, 60px)',
        fontFamily: 'IBM Plex Mono, monospace',
        opacity: phase === 'leaving' ? 0 : 1,
        transition: 'opacity 280ms cubic-bezier(0.4,0,0.2,1)',
        cursor: 'pointer',
        boxSizing: 'border-box', overflow: 'hidden',
      }}>
      <div style={{
        width: '100%', maxWidth: 440, boxSizing: 'border-box',
        display: 'flex', flexDirection: 'column', gap: 20,
        alignItems: 'center', textAlign: 'center',
      }}>
        {/* F-mark, giallo, fade-in coordinato con la prima tacca */}
        <span style={{
          width: 30, height: 30, display: 'block',
          opacity: Math.min(1, (filled / 4)),
          transition: 'opacity 120ms cubic-bezier(0.4,0,0.2,1)',
        }}>
          <svg viewBox="0 0 206.1 201.44" style={{ width: '100%', height: '100%', display: 'block' }}>
            <g fill={C.yellow}>
              <polygon points="51.44 100.64 154.75 100.64 0 201.44"/>
              <polygon points="102.79 0 206.1 0 51.35 100.8"/>
              <polygon points="84.44 0 33 100.8 8.4 100.8 59.83 0"/>
            </g>
          </svg>
        </span>

        {/* product name */}
        <span style={{
          fontSize: 11, letterSpacing: '0.32em', color: C.ink, fontWeight: 700,
        }}>{BRAND.product}</span>

        {/* segmented bar — tacche SEPARATE in sequenza (vedi nota in TapToStart
            sul bordo a 1px), riempimento giallo a contatore meccanico. */}
        <div style={{ display: 'flex', gap: 2, width: '100%', boxSizing: 'border-box' }}>
          {Array.from({ length: SEGMENTS }, (_, i) => {
            const on = i < filled;
            return (
              <div key={i} style={{
                flex: 1, minWidth: 0, height: 9,
                background: on ? C.yellow : 'transparent',
                border: `1px solid ${on ? C.yellow : C.border}`,
                boxSizing: 'border-box',
                transition: 'background 80ms cubic-bezier(0.4,0,0.2,1), border-color 80ms cubic-bezier(0.4,0,0.2,1)',
              }}/>
            );
          })}
        </div>

        {/* progress numerico, piccolo, sotto la barra */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', width: '100%', boxSizing: 'border-box',
          fontSize: 9, letterSpacing: '0.22em', color: C.faint, fontWeight: 600,
        }}>
          <span>BOOT · {BRAND.version}</span>
          <span style={{ color: C.ink, fontWeight: 700 }}>
            {String(Math.round((filled / SEGMENTS) * 100)).padStart(3, '0')}%
          </span>
        </div>

      </div>

      {/* Footer: stesso ingombro del bottone START di TapToStart (stessa
          larghezza/padding, bordo trasparente) → il cluster qui sopra è
          centrato in modo IDENTICO nelle due schermate, così la barra NON si
          sposta quando parte il boot. Mostra la micro-status al posto del bottone. */}
      <div style={{
        width: '100%', maxWidth: 440, boxSizing: 'border-box',
        display: 'flex', alignItems: 'center', gap: 8,
        border: '0.5px solid transparent',
        padding: 'clamp(12px, 2vh, 18px) clamp(12px, 3vw, 20px)',
        fontFamily: 'IBM Plex Mono, monospace',
        fontSize: 10, fontWeight: 600, letterSpacing: '0.16em',
        color: C.grey, fontVariantNumeric: 'tabular-nums',
      }}>
        <span style={{
          display: 'inline-block', width: 6, height: 6,
          background: C.yellow,
          animation: 'sgnpulse 1.2s linear infinite',
          flexShrink: 0,
        }}/>
        <span style={{
          color: C.ink, fontWeight: 700, letterSpacing: '0.18em',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>{statusLine}</span>
      </div>
    </div>
  );
}

Object.assign(window, { BootScreen });

</script>

<script type="text/babel">
/* LangPopover — compact locale switcher anchored under the topbar LANG button.
   Replaces the old fullscreen modal: a small hairline dropdown (IT / EN) that
   expands next to the trigger. No backdrop takeover, no yellow sweep — those
   were abandoned. Current locale gets an isolated yellow tick; hover/keyboard
   focus arms a row with an ink left-rail (giallo e ink non si toccano mai).
   Keyboard: ↑/↓ (or ←/→) move, ↵ confirm, Esc close; click-outside closes. */

function LangPopover({ lang, onPick, onClose, sound }) {
  const ref = React.useRef(null);
  const [hover, setHover] = React.useState(lang);

  React.useEffect(() => {
    function onDown(e) {
      if (ref.current && !ref.current.contains(e.target) &&
          !(e.target.closest && e.target.closest('.sgn-langbtn'))) onClose && onClose();
    }
    function onKey(e) {
      if (e.key === 'Escape') { e.preventDefault(); onClose && onClose(); }
      else if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  { e.preventDefault(); setHover('it'); sound && sound('tick'); }
      else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); setHover('en'); sound && sound('tick'); }
      else if (e.key === 'Enter')    { e.preventDefault(); onPick && onPick(hover); }
    }
    document.addEventListener('mousedown', onDown);
    window.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDown); window.removeEventListener('keydown', onKey); };
  }, [hover, onPick, onClose, sound]);

  const rows = [
    { v: 'it', code: 'IT', name: 'Italiano' },
    { v: 'en', code: 'EN', name: 'English'  },
  ];

  return (
    <div ref={ref} role="menu" aria-label="Locale" style={{
      position: 'absolute', top: 'calc(100% + 6px)', right: 0, zIndex: 9000,
      width: 214, background: C.white, border: `0.5px solid ${C.ink}`,
      fontFamily: 'IBM Plex Mono, monospace',
    }}>
      {/* header strip */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '7px 11px', borderBottom: `0.5px solid ${C.borderSoft}`,
      }}>
        <span style={{ fontSize: 8, letterSpacing: '0.28em', color: C.grey, fontWeight: 700 }}>LOCALE</span>
        <span style={{ fontSize: 8, letterSpacing: '0.2em', color: C.faint, fontWeight: 600 }}>SGN·OS</span>
      </div>

      {/* rows */}
      {rows.map((r, i) => {
        const current = lang === r.v;
        const active  = hover === r.v;
        return (
          <button
            key={r.v}
            role="menuitemradio"
            aria-checked={current}
            onMouseEnter={() => { if (hover !== r.v) sound && sound('tick'); setHover(r.v); }}
            onClick={() => onPick && onPick(r.v)}
            style={{
              position: 'relative', width: '100%',
              display: 'flex', alignItems: 'center', gap: 11,
              padding: '12px 13px', cursor: 'pointer',
              background: active ? C.paper : 'transparent',
              border: 'none', borderTop: i ? `0.5px solid ${C.borderSoft}` : 'none',
              fontFamily: 'inherit', textAlign: 'left', color: C.ink,
              transition: 'background 120ms linear',
            }}>
            {/* ink arm-rail — appears on hover/keyboard focus */}
            <span aria-hidden style={{
              position: 'absolute', left: 0, top: 0, bottom: 0, width: 2.5,
              background: C.ink,
              transform: active ? 'scaleY(1)' : 'scaleY(0)', transformOrigin: 'center',
              transition: 'transform 150ms cubic-bezier(0.2,0,0,1)',
            }}/>
            <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: '0.04em', minWidth: 22 }}>{r.code}</span>
            <span style={{ flex: 1, fontSize: 11, letterSpacing: '0.02em',
              color: active ? C.ink : C.grey, transition: 'color 120ms linear' }}>{r.name}</span>
            {current ? (
              <span aria-hidden title="current" style={{ width: 6, height: 6, background: C.yellow, flexShrink: 0 }}/>
            ) : (
              <span aria-hidden style={{ fontSize: 9, letterSpacing: '0.14em', fontWeight: 700,
                color: C.faint, opacity: active ? 1 : 0, transition: 'opacity 120ms linear' }}>SET ▸</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

Object.assign(window, { LangPopover });

<script type="text/babel">
/* Crosshair cursor — desktop only.
   Only mounts when (hover: hover) AND (pointer: fine) — never on touch / mobile.
   Renders a yellow + that follows the mouse, expands to a target bracket
   on hover over interactive elements. Plays a discreet "tick" on press
   when audio is enabled. */

function Cursor({ enabled = true, sound }) {
  const [pos, setPos] = React.useState({ x: -100, y: -100 });
  const [hot, setHot] = React.useState(false);
  const [pressed, setPressed] = React.useState(false);
  const [visible, setVisible] = React.useState(true);
  const [supported, setSupported] = React.useState(() => {
    if (typeof window === 'undefined') return false;
    try {
      return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    } catch (e) { return false; }
  });

  // re-check support when the input mode changes (e.g. user plugs in mouse)
  React.useEffect(() => {
    const mq = window.matchMedia('(hover: hover) and (pointer: fine)');
    const onChange = () => setSupported(mq.matches);
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', onChange);
      else mq.removeListener(onChange);
    };
  }, []);

  const active = enabled && supported;

  React.useEffect(() => {
    if (!active) {
      // make sure native cursor returns when disabled
      document.body.style.cursor = '';
      const old = document.getElementById('sgn-cursor-hide');
      if (old) old.remove();
      return;
    }

    function onMove(e) {
      setPos({ x: e.clientX, y: e.clientY });
      const t = e.target;
      const interactive = t && t.closest && t.closest('button, a, [role="button"], input, select, textarea, .sgn-tab, .sgn-hot');
      setHot(!!interactive);
    }
    function onDown(e) {
      setPressed(true);
      if (sound) {
        // Only tick on interactive press; tick anywhere else is too noisy.
        const t = e.target;
        if (t && t.closest && t.closest('button, a, [role="button"], .sgn-tab, .sgn-hot')) {
          sound('tick');
        }
      }
    }
    function onUp() { setPressed(false); }
    function onLeave() { setVisible(false); }
    function onEnter() { setVisible(true); }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup',   onUp);
    document.documentElement.addEventListener('mouseleave', onLeave);
    document.documentElement.addEventListener('mouseenter', onEnter);

    document.body.style.cursor = 'none';
    let styleEl = document.getElementById('sgn-cursor-hide');
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'sgn-cursor-hide';
      styleEl.textContent = `
        @media (hover: hover) and (pointer: fine) {
          body, body * { cursor: none !important; }
        }
      `;
      document.head.appendChild(styleEl);
    }

    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup',   onUp);
      document.documentElement.removeEventListener('mouseleave', onLeave);
      document.documentElement.removeEventListener('mouseenter', onEnter);
      document.body.style.cursor = '';
      styleEl && styleEl.remove();
    };
  }, [active, sound]);

  if (!active || !visible) return null;

  const size = hot ? 28 : 18;
  const stroke = hot ? 1.5 : 1;
  const opacity = pressed ? 0.55 : 1;

  return (
    <div
      aria-hidden
      style={{
        position: 'fixed',
        top: 0, left: 0,
        transform: `translate(${pos.x - size / 2}px, ${pos.y - size / 2}px) scale(${pressed ? 0.82 : 1})`,
        width: size, height: size,
        pointerEvents: 'none',
        zIndex: 99999,
        transition: 'width 140ms cubic-bezier(0.2,0,0,1), height 140ms cubic-bezier(0.2,0,0,1), opacity 80ms linear',
        opacity,
        willChange: 'transform',
      }}
      className="sgn-cursor"
    >
      {hot ? (
        <svg viewBox="0 0 28 28" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
          <g stroke="#FFC200" strokeWidth={stroke} fill="none">
            {/* corner brackets — gaming target */}
            <path d="M 1 6 L 1 1 L 6 1"/>
            <path d="M 22 1 L 27 1 L 27 6"/>
            <path d="M 27 22 L 27 27 L 22 27"/>
            <path d="M 6 27 L 1 27 L 1 22"/>
          </g>
          <circle cx="14" cy="14" r="1.6" fill="#FFC200"/>
        </svg>
      ) : (
        <svg viewBox="0 0 18 18" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
          <g stroke="#FFC200" strokeWidth={stroke} fill="none">
            <line x1="9" y1="1" x2="9" y2="6.5"/>
            <line x1="9" y1="11.5" x2="9" y2="17"/>
            <line x1="1" y1="9" x2="6.5" y2="9"/>
            <line x1="11.5" y1="9" x2="17" y2="9"/>
          </g>
          <circle cx="9" cy="9" r="1" fill="#FFC200"/>
        </svg>
      )}
    </div>
  );
}

Object.assign(window, { Cursor });

</script>

<script type="text/babel">
/* ClickRipple — global yellow sonar ring on every click.
   Mounts a single layer over the whole viewport; spawns a short-lived
   ring at the cursor position on every primary click, animates outward,
   then removes itself. No state per ripple — DOM elements are the source
   of truth, garbage-collected by their own animationend listener. */

function ClickRipple({ enabled = true }) {
  const layerRef = React.useRef(null);

  React.useEffect(() => {
    if (!enabled) return undefined;

    function onDown(e) {
      // Only primary-button clicks — secondary/middle aren't a "select".
      if (e.button !== 0) return;
      // Solo mouse: su touch (e pen) il sonar a ogni tap è ridondante —
      // sul mobile il feedback c'è già (card selezionata, pulsante pieno).
      // pointerType distingue l'input anche sui dispositivi ibridi.
      if (e.pointerType && e.pointerType !== 'mouse') return;
      // Suppress on form inputs so the ripple doesn't fight focus rings.
      const t = e.target;
      if (t && t.closest && t.closest('input, textarea, select')) return;
      // Module tabs handle their own armed→ripple cycle on mouseup.
      // Skip them here so the global ripple doesn't double-fire.
      if (t && t.closest && t.closest('[data-armed-ripple]')) return;

      const layer = layerRef.current;
      if (!layer) return;

      const ring = document.createElement('span');
      ring.className = 'sgn-ripple-ring';
      // Position at click point; the ring is centred via translate(-50%, -50%).
      ring.style.left = e.clientX + 'px';
      ring.style.top  = e.clientY + 'px';
      layer.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove(), { once: true });
    }

    window.addEventListener('pointerdown', onDown);
    return () => window.removeEventListener('pointerdown', onDown);
  }, [enabled]);

  if (!enabled) return null;
  return (
    <div ref={layerRef} aria-hidden style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 99998,
      overflow: 'hidden',
    }}/>
  );
}

Object.assign(window, { ClickRipple });

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "language": "it",
  "sound": true,
  "crosshair": true,
  "ripple": true
}/*EDITMODE-END*/;

const MODULES = {
  '01': VideoModule,
  '02': ObjectsModule,
  '03': AppsModule,
  '04': LinkModule,
  '05': SelfModule,
};

function useIsMobile(breakpoint = 760) {
  const [m, setM] = useState(() => typeof window !== 'undefined' && window.innerWidth < breakpoint);
  useEffect(() => {
    function update() { setM(window.innerWidth < breakpoint); }
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [breakpoint]);
  return m;
}

/* Compute slide direction between two module ids.
   - +1 forward (number going up, e.g. 02 → 04, or home → any)
   - -1 backward (number going down, or any → home)
   -  0 same / first mount
*/
function computeDirection(prev, next) {
  if (!prev && !next) return 0;
  if (!prev && next)  return +1;   // home → section, entra da destra
  if (prev && !next)  return -1;   // section → home, esce verso destra
  const a = parseInt(prev, 10);
  const b = parseInt(next, 10);
  if (a === b) return 0;
  return b > a ? +1 : -1;
}

/* ── URL hash sync ─────────────────────────────────────────────
   `#01`..`#05` → modulo aperto. `#03-2` → modulo 03, pagina 2 (1-indexed
   nell'URL, 0-indexed internamente). Vuoto / `#00` / altro → home.
   parseHash() ritorna { mod, page }. writeHash() usa replaceState così non
   riempie la cronologia indietro. */
const VALID_HASH = /^#(0[1-5])(?:-([1-9][0-9]?))?$/;
function parseHash() {
  if (typeof window === 'undefined') return { mod: null, page: null };
  const m = (window.location.hash || '').match(VALID_HASH);
  if (!m) return { mod: null, page: null };
  return { mod: m[1], page: m[2] ? (parseInt(m[2], 10) - 1) : null };
}
function writeHash(mod, pageIdx) {
  if (typeof window === 'undefined') return;
  let frag = '';
  if (mod) frag = (pageIdx && pageIdx > 0) ? `#${mod}-${pageIdx + 1}` : `#${mod}`;
  if ((window.location.hash || '') === frag) return;
  const url = window.location.pathname + window.location.search + frag;
  try { window.history.replaceState(null, '', url); } catch (e) {}
}

/* ── Command palette ───────────────────────────────────────────
   Triggered da `/`. Filtra azioni (apri moduli, home, lang, sound,
   replay boot). ↑↓ per navigare, Enter per eseguire, Esc per chiudere.
   La lista è statica + dipendente dallo stato (label dinamiche). */
function CommandPalette({ open, onClose, lang, current, sound, actions }) {
  const [q, setQ] = React.useState('');
  const [idx, setIdx] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQ('');
      setIdx(0);
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  const items = React.useMemo(() => {
    const list = [];
    ['01','02','03','04','05'].forEach(id => {
      const m = I18N[lang].modules[id];
      list.push({
        kind: 'module', id,
        glyph: '§',
        label: `${lang === 'it' ? 'Apri' : 'Open'} ${m.label}`,
        sub: m.sub,
        kbd: id.slice(-1),
        action: () => actions.select(id),
      });
    });
    list.push({
      kind: 'nav', id: 'home',
      glyph: '◇',
      label: lang === 'it' ? 'Torna alla home' : 'Back to home',
      sub: lang === 'it' ? 'menu principale' : 'main menu',
      kbd: 'ESC',
      action: () => actions.goHome(),
      hidden: !current,
    });
    list.push({
      kind: 'lang', id: 'lang-it',
      glyph: '⌘', label: 'Italiano', sub: 'lang · it',
      kbd: 'IT', action: () => actions.setLang('it'),
      hidden: lang === 'it',
    });
    list.push({
      kind: 'lang', id: 'lang-en',
      glyph: '⌘', label: 'English', sub: 'lang · en',
      kbd: 'EN', action: () => actions.setLang('en'),
      hidden: lang === 'en',
    });
    list.push({
      kind: 'sound', id: 'sound-toggle',
      glyph: '♪',
      label: actions.soundOn
        ? (lang === 'it' ? 'Disattiva suoni' : 'Mute sounds')
        : (lang === 'it' ? 'Attiva suoni' : 'Unmute sounds'),
      sub: 'click feedback',
      kbd: 'M', action: () => actions.toggleSound(),
    });
    list.push({
      kind: 'boot', id: 'replay-boot',
      glyph: '⟲',
      label: lang === 'it' ? 'Rigioca boot sequence' : 'Replay boot sequence',
      sub: 'sgn-os · boot',
      kbd: '',
      action: () => actions.replayBoot(),
    });
    return list.filter(it => !it.hidden);
  }, [lang, current, actions]);

  const filtered = React.useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return items;
    return items.filter(it =>
      it.label.toLowerCase().includes(needle) ||
      (it.sub || '').toLowerCase().includes(needle) ||
      (it.id || '').toLowerCase().includes(needle)
    );
  }, [items, q]);

  React.useEffect(() => { setIdx(0); }, [q]);

  if (!open) return null;

  function run(item) {
    if (!item) return;
    sound?.('confirm');
    item.action?.();
    onClose();
  }

  function onKey(e) {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
    if (e.key === 'Enter')  { e.preventDefault(); run(filtered[idx]); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setIdx(i => Math.min(filtered.length - 1, i + 1));
      sound?.('tick');
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      setIdx(i => Math.max(0, i - 1));
      sound?.('tick');
    }
  }

  return (
    <div className="sgn-cp-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sgn-cp" role="dialog" aria-label="Command palette" onKeyDown={onKey}>
        <div className="sgn-cp-input-row">
          <span className="sgn-cp-prompt">/</span>
          <input
            ref={inputRef}
            className="sgn-cp-input"
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder={lang === 'it'
              ? 'cerca un modulo, una lingua, un\'azione…'
              : 'search a module, language, action…'}
          />
        </div>
        <ul className="sgn-cp-list" role="listbox">
          {filtered.length === 0 && (
            <li className="sgn-cp-item" style={{ cursor: 'default', opacity: 0.6, gridTemplateColumns: '1fr' }}>
              <span className="label" style={{ color: 'rgba(120,122,124,0.8)' }}>
                {lang === 'it' ? 'Nessun risultato.' : 'No results.'}
              </span>
            </li>
          )}
          {filtered.map((it, i) => (
            <li
              key={it.id}
              className={`sgn-cp-item${i === idx ? ' active' : ''}`}
              onMouseEnter={() => setIdx(i)}
              onMouseDown={(e) => { e.preventDefault(); run(it); }}
              role="option" aria-selected={i === idx}>
              <span className="glyph">{it.glyph}</span>
              <span className="num">{it.kind === 'module' ? it.id : ''}</span>
              <span className="label">{it.label}</span>
              <span className="kbd">{it.kbd}</span>
            </li>
          ))}
        </ul>
        <div className="sgn-cp-foot">
          <span><kbd>↑↓</kbd> nav</span>
          <span><kbd>↵</kbd> {lang === 'it' ? 'esegui' : 'run'}</span>
          <span><kbd>ESC</kbd> {lang === 'it' ? 'chiudi' : 'close'}</span>
        </div>
      </div>
    </div>
  );
}

/* PagerCard — scheda laterale stretta-e-alta col pager a barre verticali.
   Mostrata solo quando il modulo attivo è un PageDeck con più di una pagina.
   Le barre sono stackate verticalmente (una sopra l'altra), non orizzontali.
   Click su una barra → goto(i). Frecce ↑↓ saltano fra le barre.
   Header "PG" + footer numerico "01/03" (testo verticale rl). */
function PagerCard({ index, total, labels, goto, lang, sound }) {
  function onBarKey(e, i) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      const next = Math.min(total - 1, i + 1);
      goto(next);
      // sposta il focus alla nuova barra attiva
      requestAnimationFrame(() => {
        e.currentTarget?.parentElement?.children?.[next]?.focus();
      });
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const next = Math.max(0, i - 1);
      goto(next);
      requestAnimationFrame(() => {
        e.currentTarget?.parentElement?.children?.[next]?.focus();
      });
    } else if (e.key === 'Home') {
      e.preventDefault(); goto(0);
    } else if (e.key === 'End') {
      e.preventDefault(); goto(total - 1);
    }
  }
  return (
    <aside
      className="sgn-pager-card"
      role="tablist"
      aria-orientation="vertical"
      aria-label={lang === 'it' ? 'Pagine del modulo' : 'Module pages'}>
      <span className="sgn-pager-head">PG</span>
      <div className="sgn-pager-bars">
        {Array.from({ length: total }).map((_, i) => {
          const active = i === index;
          const label = labels?.[i] || `${lang === 'it' ? 'Pagina' : 'Page'} ${i + 1}`;
          return (
            <button
              key={i}
              type="button"
              role="tab"
              aria-selected={active}
              aria-label={label}
              tabIndex={active ? 0 : -1}
              className={`sgn-pager-bar${active ? ' active' : ''}`}
              onClick={() => { if (!active) { goto(i); sound?.('tick'); } }}
              onKeyDown={(e) => onBarKey(e, i)}
            />
          );
        })}
      </div>
      <span className="sgn-pager-foot" aria-hidden="true">
        <span className="cur">{String(index + 1).padStart(2, '0')}</span>
        <span className="sep">/</span>
        <span className="tot">{String(total).padStart(2, '0')}</span>
      </span>
    </aside>
  );
}

/* MobilePageRail — eco verticale della PagerCard, overlay sul bordo destro
   del display. Solo mobile (CSS) + moduli multi-pagina. Tap su una barra
   salta alla pagina. */
function MobilePageRail({ index, total, goto, lang, sound }) {
  // Rail discreto a riposo: vive a bassa opacità per non rubare spazio agli
  // screenshot/contenuti. "Sveglia" (piena opacità) ad ogni cambio pagina —
  // cioè appena si scorre tra le pagine della sezione — poi sfuma di nuovo.
  const [awake, setAwake] = React.useState(false);
  const firstRef = React.useRef(true);
  React.useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; } // non al primo mount
    setAwake(true);
    const t = setTimeout(() => setAwake(false), 1600);
    return () => clearTimeout(t);
  }, [index]);
  return (
    <div className={`sgn-mrail${awake ? ' awake' : ''}`} role="tablist" aria-orientation="vertical"
      aria-label={lang === 'it' ? 'Pagine del modulo' : 'Module pages'}>
      {Array.from({ length: total }).map((_, i) => {
        const active = i === index;
        return (
          <button
            key={i}
            type="button"
            role="tab"
            aria-selected={active}
            aria-label={`${lang === 'it' ? 'Pagina' : 'Page'} ${i + 1}`}
            className={`sgn-mrail-bar${active ? ' active' : ''}`}
            onClick={() => { if (!active) { goto(i); sound?.('tick'); } }}
          />
        );
      })}
    </div>
  );
}

/* SwipeHint — pill transitoria "SCORRI ↕" (mobile, una-tantum a sessione). */
function SwipeHint({ lang }) {
  return (
    <div className="sgn-swipe-hint" role="status" aria-hidden="true">
      {lang === 'it' ? 'SCORRI' : 'SWIPE'}<span className="ar">↕</span>
    </div>
  );
}

/* OnboardHint — coachmark desktop una-tantum: indica la nav da tastiera. */
function OnboardHint({ lang, onClose }) {
  return (
    <div className="sgn-onboard" role="dialog" aria-label={lang === 'it' ? 'Suggerimento navigazione' : 'Navigation tip'}>
      <span className="ob-rail" aria-hidden="true"/>
      <span className="ob-txt">
        {lang === 'it' ? (
          <>Naviga con i tasti <kbd>1</kbd>–<kbd>5</kbd>, oppure premi <kbd>/</kbd> per la <b>palette comandi</b>.</>
        ) : (
          <>Jump with keys <kbd>1</kbd>–<kbd>5</kbd>, or press <kbd>/</kbd> for the <b>command palette</b>.</>
        )}
      </span>
      <button type="button" className="ob-x" onClick={onClose}>OK</button>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = useState(tweaks.language || 'it');
  const [current, setCurrent] = useState(null);
  const [focused, setFocused] = useState(null);
  // Boot persiste PER SESSIONE: la prima visita vede TapToStart + boot, i
  // reload successivi (stessa scheda/sessione) entrano diretti. Una nuova
  // sessione rivede l'esperienza completa.
  const bootedBefore = (() => { try { return sessionStorage.getItem('sgnBooted') === '1'; } catch (e) { return false; } })();
  const [started, setStarted] = useState(bootedBefore);
  const [booted, setBooted] = useState(bootedBefore);
  const [langOpen, setLangOpen] = useState(false);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [transKey, setTransKey] = useState(0);
  const [direction, setDirection] = useState(0);
  const [pageMeta, setPageMeta] = useState({ label: '', index: 0, total: 0, goto: null, labels: [] });
  const [idle, setIdle] = useState(false);
  const [swipeHint, setSwipeHint] = useState(false);
  const [onboard, setOnboard] = useState(false);
  const prevRef = useRef(null);
  const pendingPageRef = useRef(null);
  const mobile = useIsMobile();
  const displayInnerRef = useRef(null);
  const displaySectionRef = useRef(null);

  /* Niente reset esplicito di pageMeta sul cambio `current`: il cleanup
     dell'useEffect di PageDeck azzera già al unmount del modulo precedente,
     e il nuovo deck ripopola al primo commit. Un reset qui (parent) girerebbe
     DOPO l'effect del figlio (child→parent) e cancellerebbe la label appena
     scritta — race condition diagnosticata dal verifier. */

  /* Stable identity for the provider value, così non causa re-render a cascata. */
  const pageMetaCtx = React.useMemo(() => ({ setMeta: setPageMeta }), []);
  /* PageMetaContext live su window — riassegna a un identificatore PascalCase
     così il JSX <PageMeta.Provider> compila pulito sotto Babel. */
  const PageMeta = window.SgnPageMetaContext;

  /* Idle reveal del footer: dopo 5s senza input l'hint compare;
     al primo movimento del mouse o keydown sparisce. */
  useEffect(() => {
    let t;
    const arm = () => {
      setIdle(false);
      clearTimeout(t);
      t = setTimeout(() => setIdle(true), 5000);
    };
    arm();
    window.addEventListener('mousemove', arm, { passive: true });
    window.addEventListener('keydown', arm);
    window.addEventListener('touchstart', arm, { passive: true });
    window.addEventListener('wheel', arm, { passive: true });
    return () => {
      clearTimeout(t);
      window.removeEventListener('mousemove', arm);
      window.removeEventListener('keydown', arm);
      window.removeEventListener('touchstart', arm);
      window.removeEventListener('wheel', arm);
    };
  }, []);

  useEffect(() => { if (tweaks.language && tweaks.language !== lang) setLang(tweaks.language); }, [tweaks.language]);
  useEffect(() => { window.sgnAudio?.setEnabled(!!tweaks.sound); }, [tweaks.sound]);

  const sound = useCallback((kind) => {
    if (tweaks.sound && window.sgnTick) window.sgnTick(kind);
  }, [tweaks.sound]);

  const select = useCallback((id) => {
    setCurrent(prev => {
      const next = prev === id ? null : id;
      const dir = computeDirection(prev, next);
      setDirection(dir);
      prevRef.current = prev;
      if (next) { setTransKey(k => k + 1); sound('confirm'); }
      else { sound('back'); }
      return next;
    });
  }, [sound]);

  const goHome = useCallback(() => {
    setCurrent(prev => {
      if (!prev) return prev;
      setDirection(computeDirection(prev, null));
      prevRef.current = prev;
      sound('back');
      return null;
    });
  }, [sound]);

  const onPickLang = useCallback((v) => {
    setLang(v); setTweak('language', v);
    setLangOpen(false);
  }, [setTweak]);

  /* URL hash sync — leggi al mount + scrivi quando cambia `current`.
     Se l'utente naviga avanti/indietro col browser, popstate ri-applica. */
  useEffect(() => {
    writeHash(current, (pageMeta.total > 1) ? pageMeta.index : 0);
  }, [current, pageMeta.index, pageMeta.total]);
  useEffect(() => {
    function onPop() {
      const { mod: fromHash, page } = parseHash();
      pendingPageRef.current = page;
      setCurrent(prev => {
        if (prev === fromHash) return prev;
        setDirection(computeDirection(prev, fromHash));
        prevRef.current = prev;
        if (fromHash) setTransKey(k => k + 1);
        return fromHash;
      });
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  /* Deep-link a livello di pagina: quando il deck del modulo pubblica il suo
     `goto`, se c'è una pagina pendente (da hash/popstate) saltaci una volta. */
  useEffect(() => {
    const p = pendingPageRef.current;
    if (p != null && pageMeta.goto && pageMeta.total > 1) {
      pendingPageRef.current = null;
      if (p > 0 && p < pageMeta.total) pageMeta.goto(p);
    }
  }, [pageMeta.goto, pageMeta.total]);

  /* Focus management — al cambio modulo sposta il focus nel display, così
     tastiera e screen-reader seguono la nuova schermata. preventScroll per
     non disturbare il layout fisso. Solo dopo il boot. */
  useEffect(() => {
    if (!booted) return;
    const el = displaySectionRef.current;
    if (!el) return;
    try { el.focus({ preventScroll: true }); } catch (e) { try { el.focus(); } catch (e2) {} }
  }, [current, transKey, booted]);

  /* Swipe hint (mobile, una-tantum a sessione) sui moduli multi-pagina. */
  useEffect(() => {
    if (!mobile || !current || pageMeta.total <= 1) { setSwipeHint(false); return; }
    try { if (sessionStorage.getItem('sgnSwipeSeen')) return; } catch (e) {}
    setSwipeHint(true);
    const t = setTimeout(() => {
      setSwipeHint(false);
      try { sessionStorage.setItem('sgnSwipeSeen', '1'); } catch (e) {}
    }, 3400);
    return () => clearTimeout(t);
  }, [mobile, current, pageMeta.total]);
  useEffect(() => {
    if (pageMeta.index > 0 && swipeHint) {
      setSwipeHint(false);
      try { sessionStorage.setItem('sgnSwipeSeen', '1'); } catch (e) {}
    }
  }, [pageMeta.index]);

  /* Onboarding desktop (una-tantum, persistente) — appare dopo il boot e
     sparisce alla prima navigazione o su OK. */
  useEffect(() => {
    if (mobile || !booted) return;
    try { if (localStorage.getItem('sgnOnboardSeen')) return; } catch (e) {}
    const t = setTimeout(() => setOnboard(true), 1400);
    return () => clearTimeout(t);
  }, [mobile, booted]);
  const dismissOnboard = useCallback(() => {
    setOnboard(false);
    try { localStorage.setItem('sgnOnboardSeen', '1'); } catch (e) {}
  }, []);
  useEffect(() => { if (current && onboard) dismissOnboard(); }, [current]);
  useEffect(() => { if (paletteOpen && onboard) dismissOnboard(); }, [paletteOpen]);

  /* Keyboard nav — [11] tasti 1-5, ESC, ↑↓, `/` palette */
  useEffect(() => {
    function onKey(e) {
      const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
      // `/` apre la palette ovunque (anche con la palette giù: l'input la gestisce);
      // ignora se sei già in un input non-palette.
      if (e.key === '/' && !inInput && !langOpen && !mobile) {
        e.preventDefault();
        setPaletteOpen(true);
        sound('tick');
        return;
      }
      if (inInput || langOpen || paletteOpen) return;
      if (['1','2','3','4','5'].includes(e.key)) {
        select(`0${e.key}`);
      } else if (e.key === 'Escape' || e.key === '0') {
        goHome();
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        // ↑↓ delegano al PageDeck attivo (se presente) per saltare
        // ESATTAMENTE di una pagina, niente scroll libero.
        const deck = document.querySelector('.sgn-display [data-page-deck]');
        if (deck) {
          e.preventDefault();
          deck.dispatchEvent(new CustomEvent('sgn-deck-nav', {
            detail: { dir: e.key === 'ArrowDown' ? 'next' : 'prev' }
          }));
        }
      } else if (e.key.toLowerCase() === 'l') {
        setLangOpen(true);
      } else if (e.key.toLowerCase() === 'm') {
        setTweak('sound', !tweaks.sound);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [select, goHome, langOpen, paletteOpen, tweaks.sound, setTweak, sound, mobile]);

  const ActiveModule = current ? MODULES[current] : null;
  const slideClass = direction > 0 ? 'sgn-slide-forward'
                    : direction < 0 ? 'sgn-slide-back' : '';

  return (
    <div data-screen-label={current ? `${current} ${I18N[lang].modules[current].label}` : '00 Menu'}>
      <a href="#sgn-main" className="sgn-skip"
        onClick={(e) => { e.preventDefault(); const el = displaySectionRef.current; if (el) el.focus(); }}>
        {lang === 'it' ? 'Salta al contenuto' : 'Skip to content'}
      </a>
      <p className="sgn-sr-only" aria-live="polite">
        {current
          ? `${lang === 'it' ? 'Sezione' : 'Section'} ${current} ${I18N[lang].modules[current].label}`
          : (lang === 'it' ? 'Menu principale' : 'Main menu')}
      </p>
      {!started && <TapToStart lang={lang} onStart={() => setStarted(true)} sound={sound}/>}
      {started && !booted && <BootScreen lang={lang} onDone={() => { setBooted(true); try { sessionStorage.setItem('sgnBooted', '1'); } catch (e) {} }} sound={sound}/>}

      <Cursor enabled={!!tweaks.crosshair && !mobile} sound={sound}/>
      <ClickRipple enabled={!!tweaks.ripple}/>

      <div className="sgn-page">
        <div className="sgn-frame">
          <TopBar
            lang={lang}
            langOpen={langOpen}
            onToggleLang={() => { setLangOpen(o => !o); sound('tick'); }}
            onPickLang={onPickLang}
            onCloseLang={() => setLangOpen(false)}
            sound={sound}
            onHome={goHome}
            current={current}
            direction={direction}
            variant="topbar"
            mobile={mobile}
            soundOn={!!tweaks.sound}
            onToggleSound={() => setTweak('sound', !tweaks.sound)}
            pageLabel={pageMeta.label}
            pageIndex={pageMeta.index}
            pageTotal={pageMeta.total}
            idle={idle}
          />

          <div className={`sgn-display-area${pageMeta.total > 1 && pageMeta.goto ? ' has-pager' : ''}`}>
            <section
              className="sgn-display"
              id="sgn-main"
              ref={displaySectionRef}
              tabIndex={-1}
              role="region"
              aria-label={current
                ? `${current} ${I18N[lang].modules[current].label}${pageMeta.total > 1 ? ` · ${lang === 'it' ? 'pagina' : 'page'} ${pageMeta.index + 1}/${pageMeta.total}` : ''}`
                : (lang === 'it' ? 'Menu principale' : 'Main menu')}>
              <PageMeta.Provider value={pageMetaCtx}>
                <div
                  key={`mod-${current || 'idle'}-${transKey}`}
                  ref={displayInnerRef}
                  className={`sgn-display-inner ${slideClass}`}>
                  {ActiveModule
                    ? <ActiveModule lang={lang} mobile={mobile}/>
                    : <IdleDisplay lang={lang} mobile={mobile} focused={focused}/>
                  }
                </div>
              </PageMeta.Provider>
              {pageMeta.total > 1 && pageMeta.goto && (
                <MobilePageRail
                  index={pageMeta.index}
                  total={pageMeta.total}
                  goto={pageMeta.goto}
                  lang={lang}
                  sound={sound}
                />
              )}
              {swipeHint && <SwipeHint lang={lang}/>}
            </section>
            {pageMeta.total > 1 && pageMeta.goto && (
              <PagerCard
                index={pageMeta.index}
                total={pageMeta.total}
                labels={pageMeta.labels || []}
                goto={pageMeta.goto}
                lang={lang}
                sound={sound}
              />
            )}
          </div>

          <ModuleStrip
            current={current}
            focused={focused}
            setFocused={setFocused}
            lang={lang}
            onSelect={select}
            mobile={mobile}
            sound={sound}
          />
        </div>
      </div>

      {/* La scorciatoia comandi vive ora nel readout centrale della topbar
          quando il sito va in standby (vedi StatusReadout · idle). Niente
          più hint nel footer. */}

      <CommandPalette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        lang={lang}
        current={current}
        sound={sound}
        actions={{
          select,
          goHome,
          setLang: (v) => { setLang(v); setTweak('language', v); },
          soundOn: !!tweaks.sound,
          toggleSound: () => setTweak('sound', !tweaks.sound),
          replayBoot: () => setBooted(false),
        }}
      />

      {onboard && <OnboardHint lang={lang} onClose={dismissOnboard}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Language">
          <TweakRadio label="Locale" value={tweaks.language || 'it'}
            onChange={(v) => { setLang(v); setTweak('language', v); }}
            options={[{ value: 'it', label: 'IT' }, { value: 'en', label: 'EN' }]}/>
          <TweakButton label="Open language menu" onClick={() => setLangOpen(true)} secondary/>
        </TweakSection>
        <TweakSection label="Feel">
          <TweakToggle label="Sound (clicks)" value={!!tweaks.sound}
            onChange={(v) => setTweak('sound', v)}/>
          <TweakToggle label="Crosshair cursor" value={!!tweaks.crosshair}
            onChange={(v) => setTweak('crosshair', v)}/>
          <TweakToggle label="Click ripple" value={!!tweaks.ripple}
            onChange={(v) => setTweak('ripple', v)}/>
          <TweakButton label="Replay boot sequence" onClick={() => setBooted(false)} secondary/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
