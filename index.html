<script type="text/babel">
/* STLLab — 3D viewer + lista modelli.
   v3.3:
   - sfondo viewer bianco (era paper) — coerente con le card "elevate"
   - lista cliccabile nel panel destro: ogni voce carica il modello nel viewer
   - schema dati: { id, name, file, mat, desc, link, ... }
   - se l'STL non è disponibile, fallback su geometria procedurale per id

   Phase 1 (now): no real .stl files yet — useremo geometrie procedurali.
   Phase 2 (when files land in /assets/models/): swap il caricamento con
   THREE.STLLoader e fetch del .stl dal path nel data.
*/

function STLLab({ lang }) {
  const mountRef = React.useRef(null);
  const stateRef = React.useRef(null);
  const spinRef = React.useRef({ autoSpin: true });
  const [ready, setReady] = React.useState(typeof window !== 'undefined' && !!window.THREE);
  const [loadError, setLoadError] = React.useState(false);
  const [currentId, setCurrentId] = React.useState(OBJECTS[0]?.id || '01');
  const current = OBJECTS.find(o => o.id === currentId) || OBJECTS[0];

  // Wait for THREE (loaded as static script in <head>). Se dopo ~10s non è
  // ancora disponibile (CDN giù/bloccato), esci dal polling e mostra un errore
  // invece di restare su "LOADING" all'infinito.
  React.useEffect(() => {
    if (ready) return undefined;
    let cancelled = false;
    const started = Date.now();
    const t = setInterval(() => {
      if (cancelled) return;
      if (window.THREE) { setReady(true); clearInterval(t); }
      else if (Date.now() - started > 10000) { setLoadError(true); clearInterval(t); }
    }, 80);
    return () => { cancelled = true; clearInterval(t); };
  }, [ready]);

  // Scene setup + interaction loop — runs once when THREE is ready.
  React.useEffect(() => {
    if (!ready || !mountRef.current) return undefined;
    const THREE = window.THREE;
    const el = mountRef.current;
    // Guardia: se il layout non ha ancora dato dimensioni al contenitore,
    // usa fallback ragionevoli — il ResizeObserver correggerà appena il grid
    // risolve l'altezza (evita aspect=NaN e canvas 0×0 → schermo vuoto).
    const w = el.clientWidth  || 600;
    const h = el.clientHeight || 400;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xFFFFFF);

    const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 2000);
    camera.position.set(0, 0, 360);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    renderer.setSize(w, h);
    el.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(80, 120, 200);
    scene.add(dir);

    // Subtle grid floor
    const grid = new THREE.GridHelper(400, 20, 0x787A7C, 0xC7C8C9);
    grid.material.opacity = 0.10;
    grid.material.transparent = true;
    grid.position.y = -110;
    scene.add(grid);

    // Group container — we swap its child on model change.
    const holder = new THREE.Group();
    scene.add(holder);

    // ── Interaction
    let rotX = -0.25, rotY = 0.3;
    let dragging = false, dragSx = 0, dragSy = 0, dragRx = 0, dragRy = 0;
    spinRef.current.autoSpin = true;

    // La rotazione automatica si ferma quando l'utente tocca/trascina o usa le
    // frecce, e riparte da sola qualche secondo dopo l'ultima interazione.
    // Durante il drag il timer resta sospeso (riparte al rilascio).
    const RESUME_DELAY = 2600;
    let resumeTimer = null;
    const pauseSpin = () => {
      spinRef.current.autoSpin = false;
      if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
    };
    const scheduleResume = () => {
      if (resumeTimer) clearTimeout(resumeTimer);
      resumeTimer = setTimeout(() => { spinRef.current.autoSpin = true; resumeTimer = null; }, RESUME_DELAY);
    };

    const onDown = (e) => {
      dragging = true; pauseSpin();
      const p = e.touches ? e.touches[0] : e;
      dragSx = p.clientX; dragSy = p.clientY;
      dragRx = rotX;      dragRy = rotY;
    };
    const onMove = (e) => {
      if (!dragging) return;
      const p = e.touches ? e.touches[0] : e;
      const dx = p.clientX - dragSx;
      const dy = p.clientY - dragSy;
      rotY = dragRy + dx * 0.01;
      rotX = Math.max(-1.2, Math.min(1.2, dragRx + dy * 0.01));
    };
    const onUp = () => { if (dragging) { dragging = false; scheduleResume(); } };

    // Rotazione da tastiera: frecce orbitano, +/- ... (il mount è focusabile).
    const onKey = (e) => {
      const step = 0.18;
      let handled = true;
      switch (e.key) {
        case 'ArrowLeft':  rotY -= step; break;
        case 'ArrowRight': rotY += step; break;
        case 'ArrowUp':    rotX = Math.max(-1.2, rotX - step); break;
        case 'ArrowDown':  rotX = Math.min(1.2,  rotX + step); break;
        default: handled = false;
      }
      if (handled) { pauseSpin(); scheduleResume(); e.preventDefault(); }
    };

    el.addEventListener('pointerdown', onDown);
    el.addEventListener('keydown', onKey);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup',   onUp);

    let raf;
    const tick = () => {
      raf = requestAnimationFrame(tick);
      if (spinRef.current.autoSpin) rotY += 0.0035;
      holder.rotation.x = rotX;
      holder.rotation.y = rotY;
      renderer.render(scene, camera);
    };
    tick();

    const onResize = () => {
      const W = el.clientWidth, H = el.clientHeight;
      if (!W || !H) return;
      camera.aspect = W / H;
      camera.updateProjectionMatrix();
      renderer.setSize(W, H);
    };
    const ro = new ResizeObserver(onResize);
    ro.observe(el);

    stateRef.current = { THREE, scene, renderer, holder };

    return () => {
      cancelAnimationFrame(raf);
      if (resumeTimer) clearTimeout(resumeTimer);
      ro.disconnect();
      el.removeEventListener('pointerdown', onDown);
      el.removeEventListener('keydown', onKey);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup',   onUp);
      renderer.dispose();
      if (renderer.domElement.parentNode === el) el.removeChild(renderer.domElement);
    };
  }, [ready]);

  // Swap geometry when currentId changes
  React.useEffect(() => {
    if (!stateRef.current) return;
    const { THREE, holder } = stateRef.current;

    // Nuovo modello selezionato → riparte subito la rotazione automatica.
    spinRef.current.autoSpin = true;

    // Clear previous children
    while (holder.children.length) {
      const c = holder.children[0];
      holder.remove(c);
      c.geometry?.dispose?.();
      if (c.material) {
        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
        else c.material.dispose?.();
      }
    }

    const obj = OBJECTS.find(o => o.id === currentId);

    if (obj?.real && THREE.STLLoader) {
      // Phase 2: load real STL file
      let cancelled = false;
      const loader = new THREE.STLLoader();
      const fillMat = new THREE.MeshLambertMaterial({ color: 0xEDB200 }); // ambra brand leggermente smorzato per il 3D (meno flashy del giallo #FFC200)
      const edgeMat = new THREE.LineBasicMaterial({ color: 0x28282C, linewidth: 1 });

      loader.load(
        `/assets/models/${obj.file}`,
        (geometry) => {
          if (cancelled) return;
          // Centra la GEOMETRIA all'origine PRIMA di scalare: gli STL di
          // MakerWorld hanno spesso l'origine in un angolo / sul piano di
          // stampa. Centrare la geometria (non la posizione del gruppo) fa sì
          // che lo scaling avvenga attorno al baricentro → il modello resta
          // al centro del piano e ruota su se stesso.
          geometry.center();
          geometry.computeVertexNormals();
          const mesh  = new THREE.Mesh(geometry, fillMat);
          const edges = new THREE.EdgesGeometry(geometry, 15);
          const lines = new THREE.LineSegments(edges, edgeMat);
          const group = new THREE.Group();
          group.add(mesh);
          group.add(lines);
          // Scale to fit ~180 units (geometria già centrata sull'origine)
          const box3   = new THREE.Box3().setFromObject(group);
          const size   = box3.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          if (maxDim > 0) group.scale.setScalar(180 / maxDim);
          holder.add(group);
        },
        undefined,
        () => { if (!cancelled) holder.add(buildProceduralModel(THREE, currentId)); }
      );
      return () => { cancelled = true; };
    }

    holder.add(buildProceduralModel(THREE, currentId));
  }, [currentId, ready]);

  return (
    <div style={{
      height: '100%', minHeight: 0,
      display: 'grid',
      gridTemplateColumns: 'minmax(0, 1.4fr) minmax(260px, 1fr)',
      gap: 'clamp(12px, 1.5vw, 22px)',
    }} className="sgn-stl-grid">
      {/* Viewer */}
      <div className="sgn-stl-viewer" style={{
        position: 'relative',
        background: C.white,
        border: `0.5px solid ${C.border}`,
        minHeight: 0,
      }}>
        <div ref={mountRef}
          tabIndex={ready ? 0 : -1}
          role="img"
          aria-label={(lang === 'it' ? 'Modello 3D: ' : '3D model: ') + (current?.name || '') + (lang === 'it' ? ' — usa le frecce per ruotare' : ' — use arrow keys to rotate')}
          style={{
          position: 'absolute', inset: 0,
          touchAction: 'none', cursor: 'grab', outlineOffset: '-2px',
        }}/>
        {!ready && !loadError && (
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 10, letterSpacing: '0.22em', color: C.faint,
          }}>LOADING · THREE.JS</div>
        )}
        {loadError && (
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', flexDirection: 'column', gap: 14,
            alignItems: 'center', justifyContent: 'center', padding: 24,
            textAlign: 'center', fontFamily: 'IBM Plex Mono, monospace',
          }}>
            <span style={{ fontSize: 10, letterSpacing: '0.2em', color: C.ink, fontWeight: 700 }}>
              {lang === 'it' ? 'VISUALIZZATORE 3D NON DISPONIBILE' : '3D VIEWER UNAVAILABLE'}
            </span>
            <span style={{ fontSize: 10, letterSpacing: '0.04em', color: C.grey, lineHeight: 1.6, maxWidth: 280 }}>
              {lang === 'it'
                ? 'Impossibile caricare il motore 3D. Controlla la connessione e riprova.'
                : 'Could not load the 3D engine. Check your connection and retry.'}
            </span>
            <button onClick={() => { setLoadError(false); setReady(!!window.THREE); }}
              style={{
                border: `0.5px solid ${C.ink}`, background: 'transparent', color: C.ink,
                fontFamily: 'IBM Plex Mono, monospace', fontSize: 10, letterSpacing: '0.2em',
                fontWeight: 700, padding: '8px 18px', cursor: 'pointer',
              }}>
              {lang === 'it' ? 'RIPROVA' : 'RETRY'}
            </button>
          </div>
        )}
        <div style={{
          position: 'absolute', bottom: 10, right: 10,
          fontSize: 9, letterSpacing: '0.2em', color: C.faint,
          fontFamily: 'IBM Plex Mono, monospace', fontWeight: 600,
        }}>{lang === 'it' ? 'TRASCINA PER RUOTARE' : 'DRAG TO ROTATE'}</div>
      </div>

      {/* Side panel — un'unica regione scrollabile: header sticky + lista STL
          + scheda del modello attivo. Niente più clipping a qualsiasi altezza:
          quando lo spazio è poco, si scorre. */}
      <div className="sgn-stl-panel" style={{
        background: C.white,
        border: `0.5px solid ${C.borderSoft}`,
        display: 'flex', flexDirection: 'column',
        minHeight: 0, overflow: 'hidden',
      }}>
        <div className="sgn-stl-scroll" style={{
          flex: 1, minHeight: 0, overflowY: 'auto',
          overscrollBehavior: 'contain',
          display: 'block',
        }}>
          {/* header lista — sticky, resta in cima mentre si scorre */}
          <div style={{
            position: 'sticky', top: 0, zIndex: 2,
            background: C.white,
            padding: 'clamp(12px,1.3vw,16px) clamp(14px,1.4vw,18px) 10px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            borderBottom: `0.5px solid ${C.borderSoft}`,
          }}>
            <Label size={9} color={C.faint}>CATALOG</Label>
            <span style={{
              fontFamily: 'IBM Plex Mono, monospace', fontSize: 9, fontWeight: 700,
              letterSpacing: '0.18em', color: C.ink,
              background: C.paper, border: `0.5px solid ${C.borderSoft}`,
              padding: '2px 7px',
            }}>{String(OBJECTS.length).padStart(2, '0')}</span>
          </div>

          {/* lista modelli + dettaglio INLINE sotto la voce attiva */}
          <div style={{
            display: 'flex', flexDirection: 'column', gap: 1,
            background: C.borderSoft,
            paddingBottom: 1,
          }}>
            {OBJECTS.map(o => (
              <STLListItem
                key={o.id}
                o={o}
                active={o.id === currentId}
                onSelect={() => { setCurrentId(o.id); if (window.sgnTick) window.sgnTick('tick'); }}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* Una riga della lista — toggle giallo a sinistra quando attiva.
   Accanto al nome, un link diretto alla pagina MakerWorld del modello
   (Bambu Lab). Il click sul link non seleziona la riga (stopPropagation). */
function STLListItem({ o, active, onSelect }) {
  return (
    <button
      onClick={onSelect}
      className={`sgn-hot sgn-stl-item${active ? ' is-active' : ''}`}
      style={{
        position: 'relative',
        background: active ? C.paper : C.white,
        border: 'none',
        padding: '10px 10px 10px 16px',
        cursor: 'pointer',
        display: 'grid',
        gridTemplateColumns: '28px 1fr auto',
        gap: 10, alignItems: 'center',
        fontFamily: 'IBM Plex Mono, monospace',
        textAlign: 'left',
        transition: 'background 160ms linear',
      }}>
      {/* Yellow rail on active */}
      <span className="sgn-stl-rail" style={{
        position: 'absolute', top: 0, left: 0, bottom: 0,
        width: 3, background: active ? C.yellow : 'transparent',
        transition: 'background 160ms linear',
      }}/>
      <span className="sgn-stl-id" style={{
        fontSize: 10, letterSpacing: '0.18em', color: active ? C.ink : C.faint,
        fontWeight: 700,
      }}>{o.id}</span>
      <span style={{
        display: 'flex', flexDirection: 'column', minWidth: 0,
      }}>
        <span style={{
          fontSize: 12, fontWeight: 700, color: C.ink,
          letterSpacing: '-0.005em',
          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
        }}>{o.name}</span>
        <span style={{
          fontSize: 9, color: C.grey, letterSpacing: '0.04em', marginTop: 2,
        }}>{o.file}</span>
      </span>
      {o.link && (
        <CTA
          as="a"
          href={o.link}
          target="_blank"
          size="xs"
          label="MW"
          onClick={(e) => { e.stopPropagation(); if (window.sgnTick) window.sgnTick('confirm'); }}
          title="MakerWorld · Bambu Lab"
          aria-label={`${o.name} · MakerWorld`}
        />
      )}
    </button>
  );
}

function StlSpec({ k, v }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: '60px 1fr',
      gap: 10, fontSize: 10,
      fontFamily: 'IBM Plex Mono, monospace',
      paddingBottom: 6,
      borderBottom: `0.5px dashed rgba(120,122,124,0.18)`,
    }}>
      <span style={{ color: C.faint, letterSpacing: '0.18em', fontWeight: 600 }}>{k}</span>
      <span style={{ color: C.ink, fontWeight: 700 }}>{v}</span>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────────
   buildProceduralModel — geometrie procedurali per ogni voce della
   lista. Sostituire con STLLoader.load(path) appena gli .stl reali
   atterrano in /assets/models/.
   Tutti i modelli sono in giallo brand + edges ink, sempre coerenti.
   ────────────────────────────────────────────────────────────────── */
function buildProceduralModel(THREE, id) {
  const group = new THREE.Group();
  const fillMat = new THREE.MeshLambertMaterial({ color: 0xEDB200 }); // ambra brand leggermente smorzato per il 3D (meno flashy del giallo #FFC200)
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x28282C, linewidth: 1 });

  function addMesh(geom) {
    group.add(new THREE.Mesh(geom, fillMat));
    const edges = new THREE.EdgesGeometry(geom, 18);
    group.add(new THREE.LineSegments(edges, edgeMat));
  }

  // Fallback procedurale (usato solo se il caricamento dell'STL reale fallisce):
  // CMF GameBoy Slide — corpo rettangolare con guida laterale.
  const body = new THREE.BoxGeometry(200, 18, 96);
  body.translate(0, 0, 0);
  addMesh(body);
  const rail = new THREE.BoxGeometry(200, 7, 10);
  rail.translate(0, -12, 0);
  addMesh(rail);

  // Center + scale: `group` viene centrato all'origine, poi avvolto in un
  // wrapper esterno che fa lo scaling. Così il fit avviene attorno al centro
  // (lo scaling di `group` direttamente, dopo position.sub, sposterebbe il
  // modello fuori asse di center*(k-1)).
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  group.position.sub(center);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const target = 180;
  const wrapper = new THREE.Group();
  wrapper.add(group);
  if (maxDim > 0) wrapper.scale.setScalar(target / maxDim);
  return wrapper;
}

Object.assign(window, { STLLab, StlSpec, STLListItem, buildProceduralModel });

</script>

<script type="text/babel">
/* Five module bodies. Render inline inside the Console display area.
   Each starts with a ModuleHeader (tag + title), then content.
   No giant background section numbers, no full-screen Section wrapper.
   v3.0: spacious, minimal, mobile-responsive. */

/* ModuleHeader — Japanese-minimal: number + slash + label inline (no §),
   then a hairline rule. Title lives in IBM Plex Mono, not Neue Machina,
   to stop the display font from dominating every screen.
   Number stays in Neue Machina so it carries the gaming-stat feel. */
function ModuleHeader({ id, title, sub }) {
  return (
    <header style={{
      display: 'grid',
      gridTemplateColumns: 'auto 1fr auto',
      alignItems: 'center', gap: 'clamp(16px, 2.5vw, 28px)',
      marginBottom: 'clamp(20px, 3vh, 32px)',
      paddingBottom: 'clamp(14px, 2vh, 18px)',
      borderBottom: `0.5px solid ${C.borderSoft}`,
    }} className="sgn-mod-header">
      {/* Number — Neue Machina (use #3 of 3) */}
      <span style={{
        fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
        fontSize: 'clamp(38px, 5vw, 62px)', letterSpacing: '-0.05em',
        color: C.ink, lineHeight: 0.85,
      }}>
        <span style={{ color: C.yellow }}>{id}</span>
      </span>

      <h2 style={{
        fontFamily: 'IBM Plex Mono, monospace', fontWeight: 700,
        fontSize: 'clamp(16px, 1.5vw, 20px)', lineHeight: 1.1,
        letterSpacing: '0.18em', color: C.ink,
        textTransform: 'uppercase', margin: 0,
      }}>{title}</h2>

      {/* Vertical subtitle (tategaki) — sits to the right, slim */}
      {sub && (
        <span className="sgn-vsub" style={{
          writingMode: 'vertical-rl',
          fontFamily: 'IBM Plex Mono, monospace',
          fontSize: 'clamp(9px, 0.8vw, 10px)',
          fontWeight: 600,
          letterSpacing: '0.22em',
          color: C.grey, textTransform: 'uppercase',
          lineHeight: 1.4,
          maxHeight: 'clamp(40px, 6vh, 70px)',
          overflow: 'hidden',
          paddingLeft: 6,
          borderLeft: `0.5px solid ${C.border}`,
        }}>{sub}</span>
      )}
    </header>
  );
}

/* HoverCornerMarks — 4 L-shape yellow corners che appaiono al hover.
   Si appoggia al parent (deve avere `position: relative`). 180ms linear. */
function HoverCornerMarks({ size = 10, stroke = 1.5, inset = -1, color = C.yellow }) {
  const base = {
    position: 'absolute', width: size, height: size,
    transition: 'opacity 180ms linear',
    opacity: 0, pointerEvents: 'none',
  };
  return (
    <>
      <span className="sgn-cm" style={{ ...base, top: inset, left: inset,
        borderTop: `${stroke}px solid ${color}`, borderLeft: `${stroke}px solid ${color}` }}/>
      <span className="sgn-cm" style={{ ...base, top: inset, right: inset,
        borderTop: `${stroke}px solid ${color}`, borderRight: `${stroke}px solid ${color}` }}/>
      <span className="sgn-cm" style={{ ...base, bottom: inset, left: inset,
        borderBottom: `${stroke}px solid ${color}`, borderLeft: `${stroke}px solid ${color}` }}/>
      <span className="sgn-cm" style={{ ...base, bottom: inset, right: inset,
        borderBottom: `${stroke}px solid ${color}`, borderRight: `${stroke}px solid ${color}` }}/>
    </>
  );
}

/* CTA — pulsante canonico del sito. Struttura unica [freccia | label],
   tre taglie (md/sm/xs). Rendi come <a> se passi href, come <button>
   altrimenti; come <span> (as="span") quando vive DENTRO un'altra area
   cliccabile (es. la ContactCard è già un mailto): in quel caso non è
   interattivo di suo e si accende all'hover della card che lo contiene. */
function CTA({ label, href, onClick, target, as, size = 'md', dir = 'up-right', className = '', style, ...rest }) {
  const S = ({
    md: { h: 44, icon: 44, arrow: 22, fs: 11, ls: '0.2em',  px: 18 },
    sm: { h: 38, icon: 38, arrow: 14, fs: 11, ls: '0.18em', px: 16 },
    xs: { h: 26, icon: 26, arrow: 11, fs: 9,  ls: '0.18em', px: 11 },
  })[size] || { h: 44, icon: 44, arrow: 22, fs: 11, ls: '0.2em', px: 18 };
  const Tag = as || (href ? 'a' : 'button');
  const interactive = Tag !== 'span';
  const tagProps = {
    className: `sgn-cta${interactive ? ' sgn-hot' : ''}${className ? ' ' + className : ''}`,
    style: { height: S.h, ...style },
    onClick,
    ...rest,
  };
  if (Tag === 'a') { tagProps.href = href; if (target) { tagProps.target = target; tagProps.rel = 'noopener noreferrer'; } }
  if (Tag === 'button') { tagProps.type = 'button'; }
  return (
    <Tag {...tagProps}>
      <span className="sgn-cta__icon" style={{ width: S.icon }}>
        <MarathonArrow size={S.arrow} dir={dir} color={C.yellow}/>
      </span>
      <span className="sgn-cta__label" style={{ padding: `0 ${S.px}px`, fontSize: S.fs, letterSpacing: S.ls }}>
        {label}
      </span>
    </Tag>
  );
}

/* EmptyModuleState — terminal log style.
   Mostra una riga `> NO RECORDS FOUND` o `AWAITING DATA...` con cursore
   `|` che lampeggia. IBM Plex Mono, --grey. */
function EmptyModuleState({ status = 'NO RECORDS FOUND', title, body, hint }) {
  return (
    <div style={{
      background: C.white, border: `0.5px solid ${C.borderSoft}`,
      padding: 'clamp(28px, 4vw, 56px)',
      display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 18,
      fontFamily: 'IBM Plex Mono, monospace',
    }}>
      {/* Status line — tacca gialla spec-sheet, niente prompt > da shell */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        fontSize: 13, fontWeight: 700, color: C.ink,
        letterSpacing: '0.16em',
      }}>
        <span style={{ width: 4, height: 15, background: C.yellow, flexShrink: 0 }}/>
        <span>{status}</span>
      </div>
      {title && (
        <div style={{
          fontFamily: 'IBM Plex Mono, monospace', fontWeight: 700,
          fontSize: 'clamp(20px, 2.4vw, 28px)', letterSpacing: '-0.02em',
          color: C.ink, lineHeight: 1.15, margin: 0,
        }}>{title}</div>
      )}
      {body && (
        <p style={{
          fontSize: 'clamp(12px, 1.05vw, 14px)', color: C.grey, lineHeight: 1.7,
          margin: 0, maxWidth: 540,
        }}>{body}</p>
      )}
      {hint && (
        <div style={{
          marginTop: 6, display: 'inline-flex', alignItems: 'center', gap: 8,
          fontSize: 10, letterSpacing: '0.16em', fontWeight: 600,
          color: C.ink,
        }}>
          <span style={{ color: C.yellow, fontSize: 9 }}>▸</span>{hint}
        </div>
      )}
    </div>
  );
}

/* ── Helpers per i metadati live del featured video ── */
function fmtViews(n) {
  if (!n) return '—';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}
function fmtDur(iso) {
  const m = iso?.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '—';
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), sec = parseInt(m[3] || 0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${min}:${String(sec).padStart(2,'0')}`;
}
function fmtPubDate(iso, lang) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const M = lang === 'it'
    ? ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC']
    : ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

/* useFeaturedVideoMeta — due fetch a YouTube Data v3:
   1. playlistItems → videoId + titolo + data del PRIMO upload (= il più recente)
   2. videos        → statistics (views, likes) + contentDetails (duration)
   Senza YT_API_KEY ritorna null e l'UI mostra il fallback statico. */
function useFeaturedVideoMeta() {
  const [meta, setMeta] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('sgn_feat_v1')) || null; }
    catch { return null; }
  });
  React.useEffect(() => {
    if (!YT_API_KEY) return;
    let alive = true;
    fetch('https://www.googleapis.com/youtube/v3/playlistItems'
      + '?part=snippet&maxResults=1&playlistId=' + UPLOADS_PID + '&key=' + YT_API_KEY)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => {
        if (!alive || !d?.items?.[0]) return;
        const sn = d.items[0].snippet;
        const videoId = sn.resourceId.videoId;
        return fetch('https://www.googleapis.com/youtube/v3/videos'
          + '?part=statistics,contentDetails,snippet&id=' + videoId + '&key=' + YT_API_KEY)
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(sd => {
            if (!alive || !sd?.items?.[0]) return;
            const { statistics: s, contentDetails: cd, snippet: vs } = sd.items[0];
            const fresh = {
              videoId, title: sn.title, publishedAt: sn.publishedAt,
              views: parseInt(s.viewCount || 0),
              likes: parseInt(s.likeCount || 0),
              duration: cd.duration,
              description: vs?.description || '',
            };
            try { localStorage.setItem('sgn_feat_v1', JSON.stringify(fresh)); } catch {}
            if (alive) setMeta(fresh);
          });
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);
  return meta;
}

/* useLatestUploads — popola la pagina 2 con gli ULTIMI video reali del canale.
   Con YT_API_KEY impostata: chiede a YouTube Data v3 gli item della
   uploads-playlist (già ordinati dal più recente), scarta il primo (è
   l'ultimo caricato, già IN PRIMO PIANO a pagina 1) e mostra il resto —
   sempre fresco, 2026 inclusi, titoli e copertine reali.
   Senza chiave (o se la fetch fallisce): tiene il fallback curato (VIDEOS). */
function useLatestUploads() {
  const [rest, setRest] = React.useState(() => VIDEOS.slice(1));
  React.useEffect(() => {
    if (!YT_API_KEY) return;            // nessuna chiave → resta il fallback curato
    let alive = true;
    const url = 'https://www.googleapis.com/youtube/v3/playlistItems'
      + '?part=snippet&maxResults=13&playlistId=' + UPLOADS_PID
      + '&key=' + YT_API_KEY;
    fetch(url)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        if (!alive || !data || !data.items) return;
        const mapped = data.items.map(it => {
          const s = it.snippet || {};
          const vid = s.resourceId && s.resourceId.videoId;
          if (!vid) return null;
          return {
            id: vid, youtubeId: vid,
            title: (s.title || '').toUpperCase(),
            cat: 'YOUTUBE',
            url: 'https://www.youtube.com/watch?v=' + vid,
          };
        }).filter(Boolean);
        // [0] = ultimo upload = già in primo piano → lo escludo dalla griglia
        if (mapped.length > 1) setRest(mapped.slice(1));
      })
      .catch(() => { /* tiene il fallback curato */ });
    return () => { alive = false; };
  }, []);
  return rest;
}

/* VideoPreview — muted auto-play YouTube embed.
   Riempie il container del genitore (niente aspect-ratio rigida) così
   il featured può ridimensionarsi con la pagina. */
function VideoPreview({ youtubeId, playlistId, title }) {
  const [loaded, setLoaded] = React.useState(false);
  const base = 'https://www.youtube-nocookie.com/embed/';
  const common = 'autoplay=1&mute=1&controls=0&loop=1'
    + '&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3&disablekb=1';
  // playlistId → feed live (uploads playlist del canale, sempre l'ultimo video).
  // youtubeId  → singolo video in loop.
  const url = playlistId
    ? `${base}videoseries?list=${playlistId}&${common}`
    : `${base}${youtubeId}?playlist=${youtubeId}&${common}`;
  return (
    <div style={{
      position: 'relative',
      width: '100%', height: '100%', minHeight: 0,
      background: C.ink, overflow: 'hidden',
      containerType: 'size',
    }}>
      <iframe
        src={url}
        title={title}
        loading="lazy"
        onLoad={() => setLoaded(true)}
        allow="autoplay; encrypted-media; picture-in-picture"
        referrerPolicy="strict-origin-when-cross-origin"
        style={{
          // Cover: la SORGENTE YouTube è 16:9. Sovradimensioniamo l'iframe
          // mantenendo 16:9 (non 18:9) così il player NON letterboxa e
          // il frame 18:9 viene coperto pieno, senza bande nere — su qualunque
          // forma della cella (desktop e mobile).
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%) scale(1.02)',
          width: 'max(100%, calc(100cqh * 16 / 9))',
          height: 'max(100%, calc(100cqw * 9 / 16))',
          border: 0, display: 'block',
          pointerEvents: 'none',
          opacity: loaded ? 1 : 0,
          transition: 'opacity 260ms linear',
        }}
      />
      {/* Loading state — fondo ink + label mono con cursore lampeggiante +
          rail giallo in alto. Niente salto secco mentre l'embed carica. */}
      {!loaded && (
        <div aria-hidden="true" style={{
          position: 'absolute', inset: 0, background: C.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          pointerEvents: 'none',
        }}>
          <span style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: C.yellow }}/>
          <span style={{
            fontFamily: 'IBM Plex Mono, monospace', fontSize: 10, fontWeight: 700,
            letterSpacing: '0.22em', color: 'rgba(255,255,255,0.55)',
            display: 'inline-flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ color: C.yellow }}>▸</span>LOADING
            <span style={{ animation: 'sgnBlink 1s steps(1) infinite' }}>_</span>
          </span>
        </div>
      )}
    </div>
  );
}

function VideoCard({ v, L, delay = 0 }) {
  const [ref, inView] = useInView({ threshold: 0.2 });
  return (
    <a ref={ref} href={v.url || undefined}
      target={v.url ? '_blank' : undefined}
      rel="noopener noreferrer"
      className="sgn-card-hover sgn-card-hover--media sgn-hot" style={{
      position: 'relative', textDecoration: 'none', color: 'inherit',
      background: C.white, border: `0.5px solid ${C.borderSoft}`,
      opacity: inView ? 1 : 0,
      // Solo fade, niente translateY: la slide portava la card a una Y
      // frazionaria durante l'animazione e il bordo hairline 0.5px spariva per
      // anti-aliasing, ricomparendo a fine corsa (lo "scatto"). Senza movimento
      // il bordo resta sempre a posizione intera → nitido per tutta l'entrata.
      transition: `opacity 400ms linear ${delay}ms`,
      display: 'flex', flexDirection: 'column',
      overflow: 'hidden',
      padding: 'clamp(6px, 0.7vw, 10px)',
      gap: 'clamp(6px, 0.7vh, 10px)',
      boxSizing: 'border-box',
    }}>
      {/* copertina 16:9 — verrà popolata con la cover reale del video.
         Rapporto fisso così tutte le card sono identiche e allineate;
         la card si dimensiona sul contenuto (niente stretch di riga). */}
      <div style={{ aspectRatio: '16 / 9', flexShrink: 0, position: 'relative', border: `0.5px solid ${C.borderSoft}`, overflow: 'hidden' }}>
        {v.youtubeId ? <VideoThumb id={v.youtubeId} title={v.title}/> : <VideoArt v={v} fill/>}
      </div>
      <div style={{ flexShrink: 0, padding: '0 2px 2px' }}>
        {/* Solo il titolo — verrà recuperato da YouTube a sito pronto.
            Nessun altro metadato (categoria/durata/data) per scelta. */}
        <div style={{
          fontFamily: 'IBM Plex Mono, monospace', fontWeight: 700,
          fontSize: 'clamp(11px, 1vw, 13px)',
          color: C.ink, lineHeight: 1.25, letterSpacing: '-0.005em',
          display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
          overflow: 'hidden',
        }}>{v.title}</div>
      </div>
      <HoverCornerMarks/>
    </a>
  );
}

/* VideoThumb — copertina REALE del video, presa live da YouTube senza API
   né chiavi: i.ytimg.com serve sempre la thumbnail aggiornata del video.
   Parto dalla maxres (1280×720, nessuna banda) e ricado su hqdefault per i
   video che non la espongono. È il "dato sempre aggiornato" che riempie le
   card della pagina 2 con immagini reali invece dei placeholder. */
function VideoThumb({ id, title }) {
  const [src, setSrc] = React.useState(`https://i.ytimg.com/vi/${id}/maxresdefault.jpg`);
  return (
    <img
      src={src}
      alt={title}
      loading="lazy"
      decoding="async"
      onError={() => setSrc(`https://i.ytimg.com/vi/${id}/hqdefault.jpg`)}
      style={{
        position: 'absolute', inset: 0, width: '100%', height: '100%',
        objectFit: 'cover', display: 'block', background: C.ink,
      }}
    />
  );
}

function VideoArt({ v, big, fill }) {
  const isB = v.kind === 'B';
  // `fill`: l'art occupa lo spazio dato dal flex parent (niente aspect-ratio)
  // `big`:  più chrome interno, font più grande
  // default: aspect 16:9 (per usi al di fuori del PageDeck, se mai)
  const sizing = fill
    ? { position: 'absolute', inset: 0 }
    : { position: 'relative', aspectRatio: '18 / 9' };
  return (
    <div style={{
      ...sizing,
      background: C.paper, overflow: 'hidden',
    }}>
      {/* rail giallo: a sinistra (A) o in alto a tutta larghezza (B) — mai giallo a contatto con l'ink */}
      {isB
        ? <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: big ? 5 : 3, background: C.yellow }}/>
        : <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: big ? 5 : 3, background: C.yellow }}/>}
      <div style={{
        position: 'absolute', top: big ? 22 : 14, left: big ? 22 : 16,
        fontFamily: 'IBM Plex Mono, monospace', fontWeight: 700,
        fontSize: big ? 'clamp(24px, 3vw, 44px)' : 'clamp(14px, 1.6vw, 20px)',
        color: C.ink, letterSpacing: '-0.03em', lineHeight: 1.02,
        textTransform: 'uppercase', maxWidth: '78%',
      }}>{v.title}</div>
      <div style={{
        position: 'absolute', bottom: 10, left: big ? 22 : 16, fontSize: 9,
        letterSpacing: '0.14em', textTransform: 'uppercase',
        color: C.faint,
      }}>SGNAOLIN · {v.id}</div>
    </div>
  );
}

function Wireframe() {

    <svg viewBox="0 0 200 120" preserveAspectRatio="xMidYMid meet" style={{ width: '100%', height: '100%' }}>

/* ════════ 03 APPS ════════
   Una pagina del PageDeck per ogni app. Le scorri verticalmente (↑/↓).
   Layout per pagina:
     [icon-grande]  [name / subtitle / tagline / stats / install]
     [riga screenshot — orizzontale, scrollabile]
*/
function AppsModule({ lang }) {
  const L = I18N[lang];
  if (!APPS.length) {

        <Page justify="center" label="EMPTY">
          <div style={{ flex: 1, minHeight: 0, display: 'flex', alignItems: 'center' }}>

              status="AWAITING DATA..."
              title={lang === 'it' ? 'Android apps · in arrivo.' : 'Android apps · incoming.'}
              hint="build playstore@sgnoogle"

        </Page>

/* AppPage — un singolo "schermo prodotto" che entra intero nel display.
   Layout: HERO (icona inquadrata + name/sub/tagline + INSTALL) → META BAND
   (stats cell-per-cell, equidistanti) → BODY (descrizione+features | gallery
   con 4 screenshot equispaziati e mai croppati). */
function AppPage({ app, lang }) {
  const tagline       = app.tagline?.[lang]       || app.tagline?.it    || '';
  const description   = app.description?.[lang]   || app.description?.it|| '';
  const category      = app.category?.[lang]      || app.category?.en   || '';
  const monetization  = app.monetization?.[lang]  || app.monetization?.en || '';
  const features      = app.features?.[lang]      || app.features?.en   || [];

  return (

      flex: 1, minHeight: 0,

      overflow: 'hidden',

        display: 'flex', alignItems: 'stretch',
        gap: 'clamp(12px, 1.8vw, 22px)',

        <div style={{
          flex: 1, minWidth: 0,
          display: 'flex', flexDirection: 'column',
          justifyContent: 'space-between',

          <h3 style={{
            fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
            fontSize: 'clamp(22px, 3vw, 42px)', letterSpacing: '-0.04em',
            color: C.ink, lineHeight: 1, margin: 0, textTransform: 'lowercase',
          }}>{app.name}</h3>
          <CTA
            href={APP_PLAY_URL(app.pkg)}
            target="_blank"
            size="sm"
            label={lang === 'it' ? 'INSTALLA' : 'INSTALL'}
            style={{ alignSelf: 'flex-start' }}
          />
        </div>
      </div>

      {/* ─── TAGLINE ─── riga separata sotto l'hero */}
      {tagline && (
        <p style={{
          margin: 0, fontFamily: 'IBM Plex Mono, monospace',
          fontSize: 'clamp(12px, 1.05vw, 14px)', color: C.ink,
          lineHeight: 1.5, fontWeight: 600, textWrap: 'pretty',

      {/* ─── META BAND ─── solo i dati essenziali, celle equispaziate.
          Rimossi su richiesta: RECENSIONI, CATEGORIA, MONETIZZAZIONE, SNAPSHOT. */}
      <AppMetaBand
        cells={[
          { k: lang === 'it' ? 'VALUTAZIONE' : 'RATING',  v: `${app.rating} ★`, gold: true },
          { k: lang === 'it' ? 'DOWNLOAD'   : 'DOWNLOADS', v: app.downloads },
          { k: lang === 'it' ? 'PIATTAFORMA': 'PLATFORM', v: 'Android' },

      {/* ─── BODY ─── due colonne: a sinistra descrizione + CARATTERISTICHE
          (features, prima calcolate ma mai mostrate); a destra la GALLERY con
          gli screenshot REALI del Play Store (live dalla CDN, mai croppati).
          Così lo spazio orizzontale non resta vuoto e l'app si "vede". Su

      <div className="sgn-app-body-grid" style={{

        gridTemplateColumns: 'minmax(0, 0.92fr) minmax(0, 1.08fr)',

        <div className="sgn-app-textcol sgn-stl-scroll" style={{

          display: 'flex', flexDirection: 'column', gap: 'clamp(14px, 1.8vh, 20px)',

            </Label>
            <p style={{
              margin: 0, fontFamily: 'IBM Plex Mono, monospace',

                    fontSize: 'clamp(12px, 1vw, 14px)', color: C.ink, fontWeight: 600,

          <Label size={9} color={C.faint} style={{ display: 'block' }}>

          <AppGallery shots={app.shotsLh || []} name={app.name}/>
        </div>
      </div>
    </div>
  );

/* AppGallery — striscia orizzontale di screenshot REALI del Play Store,
   serviti live dalla CDN play-lh (APP_LH, nessuna API). objectFit: contain →
   mai croppati (regola del sistema); fondo paper a riempire l'eventuale
   margine. Scroll orizzontale, scrollbar nascosta (sgn-stl-scroll), snap. */
function AppGallery({ shots, name }) {
  if (!shots || !shots.length) return null;
  return (
    <div className="sgn-app-gallery sgn-stl-scroll" style={{
      flex: 1, minHeight: 0,
      display: 'flex', alignItems: 'stretch', gap: 'clamp(8px, 0.9vw, 12px)',
      overflowX: 'auto', overflowY: 'hidden',
      scrollSnapType: 'x proximity',

      {shots.map((h, i) => (
        <div key={i} style={{
          position: 'relative',
          flex: '0 0 auto', height: '100%',
          aspectRatio: '9 / 16',
          background: C.paper,
          scrollSnapAlign: 'start',
          overflow: 'hidden',
        }}>
          <img
            src={APP_LH(h, 'w512')}
            alt={`${name} — screenshot ${i + 1}`}

            style={{
              display: 'block', width: '100%', height: '100%',
              objectFit: 'contain',

            position: 'absolute', inset: 0,

}

/* ════════ 04 LINK ════════
   Strip orizzontale di schede quadrate, scorribile con le frecce (stesso
   gesto della gallery screenshot). Prima scheda = CONTATTO (scrivimi via
   mail). A seguire, gli sponsor con cui ho collaborato: ogni quadrato,
   cliccato, porta al contenuto social fatto con quel brand. Finché il
   roster è vuoto, mostro slot aperti come invito alla collaborazione. */
function LinkModule({ lang }) {
  const L = I18N[lang];
  return (
    <PageDeck>
      <Page label={lang === 'it' ? 'SPONSOR' : 'SPONSORS'}>
        <LinkStrip L={L} lang={lang}/>
      </Page>
    </PageDeck>
  );
}

function LinkStrip({ L, lang }) {
  const scrollerRef = React.useRef(null);
  const [atStart, setAtStart] = React.useState(true);
  const [atEnd, setAtEnd]     = React.useState(false);
  const isIt = lang === 'it';
  const sponsors = (typeof LINKS !== 'undefined' && LINKS) || [];
  const openSlots = Math.max(0, 3 - sponsors.length);

  const update = React.useCallback(() => {
    const el = scrollerRef.current;
    if (!el) return;
    // Su mobile la strip è una COLONNA (scroll verticale): leggo l'asse Y;
    // su desktop resta orizzontale (asse X). Stessa logica "ci sono altri
    // elementi in quella direzione?" → accende/spegne le frecce.
    const vertical = window.matchMedia('(max-width: 760px)').matches;
    if (vertical) {
      setAtStart(el.scrollTop <= 2);
      setAtEnd(el.scrollTop + el.clientHeight >= el.scrollHeight - 2);
    } else {
      setAtStart(el.scrollLeft <= 2);
      setAtEnd(el.scrollLeft + el.clientWidth >= el.scrollWidth - 2);
    }
  }, []);

  React.useEffect(() => {
    update();
    const el = scrollerRef.current;
    if (!el) return undefined;
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [update]);

  function scrollByCard(dir) {
    const el = scrollerRef.current;
    if (!el) return;
    const vertical = window.matchMedia('(max-width: 760px)').matches;
    const card = el.querySelector('[data-link-card]');
    const r = card ? card.getBoundingClientRect() : null;
    if (vertical) {
      const step = r ? r.height + 16 : 240;
      el.scrollBy({ top: dir * step, behavior: 'smooth' });
    } else {
      const step = r ? r.width + 18 : 280;
      el.scrollBy({ left: dir * step, behavior: 'smooth' });
    }
    if (window.sgnTick) window.sgnTick('tick');
  }

  return (
    <div style={{
      flex: 1, minHeight: 0,
      display: 'flex', flexDirection: 'column', gap: 'clamp(12px, 1.6vh, 18px)',
    }}>
      {/* header — eyebrow + frecce di scorrimento */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 12, flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
          <span style={{
            width: 6, height: 6, background: C.yellow, display: 'inline-block',
            animation: 'sgnpulse 1.6s linear infinite', flexShrink: 0,
          }}/>
          <Label size={10} color={C.ink} style={{ fontWeight: 700 }}>
            {isIt ? 'SPONSOR · COLLABORAZIONI' : 'SPONSORS · COLLABS'}
          </Label>
        </div>
        <div style={{ display: 'inline-flex', gap: 6, flexShrink: 0 }}>
          {/* Desktop: scroll orizzontale → frecce ← → */}
          <div className="sgn-link-arrows" style={{ display: 'inline-flex', gap: 6 }}>
            <StripArrow dir="left"  disabled={atStart} onClick={() => scrollByCard(-1)} lang={lang}/>
            <StripArrow dir="right" disabled={atEnd}   onClick={() => scrollByCard(+1)} lang={lang}/>
          </div>
          {/* Mobile: scroll verticale → frecce ↑ ↓, affiancate e compatte,
              nello stesso angolo in alto a destra dell'header (che resta
              sempre visibile mentre le schede scorrono). Niente più colonna
              dedicata a lato. */}
          <div className="sgn-link-arrows-m" style={{ display: 'none', gap: 6 }}>
            <StripArrow dir="up"   disabled={atStart} onClick={() => scrollByCard(-1)} lang={lang} small/>
            <StripArrow dir="down" disabled={atEnd}   onClick={() => scrollByCard(+1)} lang={lang} small/>
          </div>
        </div>
      </div>

      {/* corpo: solo lo scroller. Desktop scorre in orizzontale, mobile in
          colonna (CSS). Le frecce vivono nell'header (vedi sopra) su entrambi
          i layout — niente colonna laterale di affordance. */}
      <div className="sgn-link-body" style={{
        flex: 1, minHeight: 0, display: 'flex',
        gap: 'clamp(8px, 1.4vw, 14px)', alignItems: 'stretch',
      }}>
        <div
          ref={scrollerRef}
          onScroll={update}
          className="sgn-stl-scroll sgn-link-scroller"
          style={{
            flex: 1, minHeight: 0, minWidth: 0,
            display: 'flex', alignItems: 'stretch',
            gap: 'clamp(12px, 1.4vw, 18px)',
            overflowX: 'auto', overflowY: 'hidden',
            scrollSnapType: 'x proximity',
          }}>
          <ContactCard L={L} lang={lang}/>
          {sponsors.map((s, i) => (
            <SponsorCard key={s.name} s={s} L={L} lang={lang}/>
          ))}
          {Array.from({ length: openSlots }).map((_, i) => (
            <OpenSlotCard key={`slot-${i}`} n={sponsors.length + i + 1} lang={lang}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* StripArrow — bottone quadrato di scorrimento, stesso linguaggio della
   gallery (paper + hairline, ↑↓ disabilitate ai capi). */
function StripArrow({ dir, disabled, onClick, lang, small }) {
  const glyph = { left: '←', right: '→', up: '↑', down: '↓' }[dir] || '→';
  const isPrev = dir === 'left' || dir === 'up';
  const dim = small ? 28 : 34;
  return (
    <button
      type="button"
      onClick={onClick}
      disabled={disabled}
      aria-label={isPrev
        ? (lang === 'it' ? 'precedente' : 'previous')
        : (lang === 'it' ? 'successivo' : 'next')}
      className="sgn-hot"
      style={{
        width: dim, height: dim,
        appearance: 'none', cursor: disabled ? 'default' : 'pointer',
        background: disabled ? 'transparent' : C.white,
        border: `0.5px solid ${disabled ? C.borderSoft : C.border}`,
        color: disabled ? C.faint : C.ink,
        fontFamily: 'IBM Plex Mono, monospace', fontSize: small ? 13 : 14, fontWeight: 700,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        opacity: disabled ? 0.4 : 1,
        transition: 'background 150ms linear, border-color 150ms linear, opacity 150ms linear',
      }}>
      {glyph}
    </button>
  );
}

/* ContactCard — prima scheda della strip: invito a collaborare via mail.
   Quadrata, gialla. Il contenuto è un blocco coeso centrato verticalmente
   (niente space-between che lascia buchi su quadrati alti o sfora su quelli
   bassi); l'indice "00" galleggia in alto a destra in absolute così non
   entra nel flusso. overflow:hidden tiene tutto dentro la cornice. */
function ContactCard({ L, lang }) {
  const isIt = lang === 'it';
  return (
    <a
      href={typeof MAILTO !== 'undefined' ? MAILTO : 'mailto:francesco.sgnaolin@gmail.com'}
      data-link-card
      className="sgn-hot sgn-card-hover"
      style={{
        position: 'relative', flexShrink: 0,
        height: '100%', aspectRatio: '1 / 1',
        minWidth: 'clamp(240px, 30vw, 360px)',
        scrollSnapAlign: 'start',
        background: C.white, textDecoration: 'none', color: C.ink,
        border: `0.5px solid ${C.border}`,
        boxSizing: 'border-box', overflow: 'hidden',
        padding: 'clamp(20px, 2.4vw, 32px)',
        paddingLeft: 'clamp(24px, 2.6vw, 38px)',
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        gap: 'clamp(12px, 1.8vh, 20px)',
        fontFamily: 'IBM Plex Mono, monospace',
      }}>
      {/* rail giallo a sinistra = la card "speciale", senza giallo/nero a contatto */}
      <span aria-hidden style={{
        position: 'absolute', top: 0, bottom: 0, left: 0, width: 4, background: C.yellow,
      }}/>

      {/* fondo geometrico in deriva lenta — stessa grammatica hairline 45° del
          sistema, sovradimensionato così la deriva non scopre i bordi. Sta
          sotto il rail (z) e dietro testo+CTA (che sono relative). */}
      <span className="sgn-ambient sgn-contact-bg" aria-hidden="true"/>

      <div style={{

/* AutoFit — misura il contenuto e lo scala (transform) per stare SEMPRE
   dentro lo spazio disponibile: né scroll né taglio, su qualunque display.
   Il transform non altera scrollHeight/offsetHeight → nessun loop col
   ResizeObserver. Scala solo verso il basso (max 1). */
function AutoFit({ children, max = 1 }) {
  const outerRef = React.useRef(null);
  const innerRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useLayoutEffect(() => {
    const outer = outerRef.current, inner = innerRef.current;
    if (!outer || !inner) return undefined;
    let raf = 0;
    const measure = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const availH = outer.clientHeight, availW = outer.clientWidth;
        const natH = inner.offsetHeight, natW = inner.offsetWidth;
        if (!availH || !natH || !natW) return;
        const s = Math.min(max, availH / natH, availW / natW);
        setScale(s > 0 && s < 1 ? s : (s >= 1 ? max : 1));
      });
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(outer); ro.observe(inner);
    window.addEventListener('resize', measure);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [max]);
  return (
    <div ref={outerRef} style={{
      flex: 1, minHeight: 0, width: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      <div ref={innerRef} style={{
        width: '100%',
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
      }}>{children}</div>
    </div>
  );
}

/* StatusReadout — readout di stato al centro della topbar: lampeggiatore
   ● ONLINE + orologio di sistema che ticchetta. La menu-bar di un OS mostra
   l'ora — telemetria vera, sempre rilevante, mai ridondante. Sostituisce
   "SGN-OS · STEEL" (codename arbitrario fuori contesto qui). */
function StatusReadout({ lang, current, direction = 0, variant = 'flash', idle = false }) {
  const isIt = lang === 'it';
  // Standby: solo a riposo sull'home (nessuna sezione aperta). Il readout
  // smette di dire "ONLINE + ora" e invita all'azione suggerendo la
  // scorciatoia — la palette non vive più nel footer, ma qui al centro.
  const showIdle = idle && !current;
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  /* ── Route takeover ───────────────────────────────────────────
     Quando `current` cambia, la status line (ONLINE + orologio) si fa
     da parte in dissolvenza e la barra mostra per ~700ms solo il NOME
     della sezione aperta — l'unica informazione che non conosci già
     premendo il tasto — con una hairline gialla 2px che lo sottolinea
     swippando nella direzione del cambio (riusa sgnSweepRight/Left).
     Poi torna l'orologio. I due stati sono layer assoluti sovrapposti →
     zero layout shift, l'orologio ticchetta sotto e riappare aggiornato.
     direction è letto da un ref così l'effetto scatta SOLO al cambio di
     `current`, mai per un re-render con stessa sezione. */
  const dirRef = React.useRef(direction);
  dirRef.current = direction;
  const variantRef = React.useRef(variant);
  variantRef.current = variant;
  const [route, setRoute] = React.useState(null); // { key, dir, id, label }
  const firstRef = React.useRef(true);
  const keyRef = React.useRef(0);
  React.useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; } // no takeover al primo mount
    if (variantRef.current !== 'topbar') return; // il takeover esiste solo in modalità 'topbar'
    const L = I18N[lang];
    keyRef.current += 1;
    const mod = current ? L.modules[current] : null;
    const mine = keyRef.current;
    setRoute({ key: mine, dir: dirRef.current, id: current, label: mod ? mod.label : L.nav.main });
    const t = setTimeout(() => setRoute(r => (r && r.key === mine ? null : r)), 720);
    return () => clearTimeout(t);
  }, [current]); // eslint-disable-line — lang/direction/variant via ref di proposito

  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');

  const active = !!route;
  const fwd = (route?.dir ?? 0) >= 0;
  const sweepAnim = fwd ? 'sgnSweepRight' : 'sgnSweepLeft';

  return (
    <div style={{
      flex: 1, position: 'relative', alignSelf: 'stretch',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      minWidth: 0, fontFamily: 'IBM Plex Mono, monospace',
    }}>
      {/* Layer A — a riposo: ● IN ATTESA + scorciatoia "/". Attivo:
          ● ONLINE + orologio. I due stati condividono la stessa shell
          (dot+label | divisore+contenuto) e si dissolvono l'uno nell'altro. */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 12,
        opacity: active ? 0 : 1,
        transition: 'opacity 160ms linear',
        pointerEvents: 'none',
      }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
          <span style={{
            width: 6, height: 6, display: 'inline-block',
            background: showIdle ? C.faint : C.yellow,
            animation: showIdle ? 'none' : 'sgnpulse 1.6s linear infinite',
            transition: 'background 320ms linear',
          }}/>
          <span style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.3em',
            color: showIdle ? C.grey : C.ink, transition: 'color 320ms linear',
            whiteSpace: 'nowrap',
          }}>{showIdle ? (isIt ? 'IN ATTESA' : 'STANDBY') : 'ONLINE'}</span>
        </span>
        <span style={{
          paddingLeft: 12, borderLeft: `0.5px solid ${C.borderSoft}`,
          display: 'inline-flex', alignItems: 'center', gap: 7, whiteSpace: 'nowrap',
        }}>
          {showIdle ? (
            <>
              <span style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                minWidth: 16, height: 16, padding: '0 4px',
                border: `0.5px solid ${C.border}`, background: C.white,
                fontSize: 10, fontWeight: 700, color: C.ink, lineHeight: 1,
                fontFamily: 'IBM Plex Mono, monospace',
              }}>/</span>
              <span style={{
                fontSize: 9, fontWeight: 700, letterSpacing: '0.22em', color: C.faint,
              }}>{isIt ? 'PER I COMANDI' : 'FOR COMMANDS'}</span>
            </>
          ) : (
            <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 6 }}>
              <span style={{
                fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', color: C.ink,
                fontVariantNumeric: 'tabular-nums',
              }}>{hh}:{mm}<span style={{ color: C.faint }}>:{ss}</span></span>
              <span style={{
                fontSize: 8, fontWeight: 700, letterSpacing: '0.22em', color: C.faint,
              }}>CET</span>
            </span>
          )}
        </span>
      </div>

      {/* Layer B — solo il NOME della sezione (l'unica informazione che non
          conosci già aprendola), con una hairline gialla che lo sottolinea
          swippando nella direzione del cambio. */}
      <div aria-hidden style={{
        position: 'absolute', inset: 0,
        display: 'flex', justifyContent: 'center', alignItems: 'center',
        opacity: active ? 1 : 0,
        transition: 'opacity 160ms linear',
        pointerEvents: 'none',
      }}>
        {route && (
          <span style={{
            position: 'relative', display: 'inline-block',
            paddingBottom: 6, lineHeight: 1,
          }}>
            <span style={{
              fontSize: 11, fontWeight: 700, color: C.ink, letterSpacing: '0.3em',
              whiteSpace: 'nowrap',
            }}>{route.label}</span>
            <span key={route.key} style={{
              position: 'absolute', left: 0, right: 0, bottom: 0, height: 2,
              background: C.yellow,
              animation: `${sweepAnim} 700ms cubic-bezier(0.2,0,0,1) forwards`,
            }}/>
          </span>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────── IdleDisplay ─────────────────────────── */
function IdleDisplay({ lang, mobile, focused }) {
  const L = I18N[lang];
  const [armed, setArmed] = React.useState(false);
  const [idleMode, setIdleMode] = React.useState(false);

  React.useEffect(() => {
    const t = setTimeout(() => setArmed(true), 80);
    return () => clearTimeout(t);
  }, []);

  React.useEffect(() => {
    if (focused) return undefined;
    let t;
    const reset = () => {
      setIdleMode(false);
      clearTimeout(t);
      t = setTimeout(() => setIdleMode(true), 30000);
    };
    reset();
    window.addEventListener('mousemove', reset);
    window.addEventListener('keydown',   reset);
    window.addEventListener('touchstart',reset);
    return () => {
      clearTimeout(t);
      window.removeEventListener('mousemove', reset);
      window.removeEventListener('keydown',   reset);
      window.removeEventListener('touchstart',reset);
    };
  }, [focused]);

  const preview = focused && L.modules[focused];

  return (
    <div style={{
      position: 'relative',
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      fontFamily: 'IBM Plex Mono, monospace',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        transform: idleMode ? 'scale(1.4)' : 'scale(1)',
        opacity: preview ? 0.32 : 1,

      }}>

      <div style={{
        position: 'relative', zIndex: 4,
        flex: 1,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        padding: 'clamp(20px, 3.2vw, 48px)',

      }}>
        <h1 style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace',
          fontWeight: 700,
          fontSize: 'clamp(36px, 12vw, 168px)',
          letterSpacing: '-0.05em', color: C.ink,
          lineHeight: 0.9, margin: 0,
          whiteSpace: 'nowrap',
          display: preview ? 'none' : 'block',
          opacity: idleMode ? 0.35 : (armed ? 1 : 0),
          transform: armed ? 'translateY(0)' : 'translateY(18px)',
          transition: 'opacity 700ms linear 120ms, transform 700ms cubic-bezier(0.2,0,0,1) 120ms',
        }}>
          <span style={{ color: C.yellow }}>SGN</span>OOGLE
        </h1>

        {!preview && <LiveBadge armed={armed} dimmed={idleMode}/>}

        {!preview && (
          <div aria-hidden style={{
            position: 'absolute',
            bottom: 'clamp(8px, 1.2vh, 14px)',
            left: '50%', transform: 'translateX(-50%)',
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: 'clamp(4px, 0.6vh, 6px) 0',
            opacity: idleMode ? 0 : (armed ? 1 : 0),
            transition: 'opacity 700ms linear 500ms',
            whiteSpace: 'nowrap',
          }}>
            <span style={{
              fontSize: 9, color: C.faint,
              animation: 'sgnBlink 1.4s step-start infinite',
            }}>↓</span>
            <span style={{
              fontSize: 10, letterSpacing: '0.26em', fontWeight: 700, color: C.faint,
              fontFamily: 'IBM Plex Mono, monospace',
            }}>
              {lang === 'it' ? 'SELEZIONA MODULO' : 'SELECT MODULE'}
            </span>
          </div>
        )}

        {preview && (
          <ModulePreview id={focused} module={preview} lang={lang}/>

/* ModulePreview — scheda densa "spec sheet" sull'hover.
   Sostituisce il vecchio Gran-Turismo-style (titolo 220px centrato).
   Layout: card a sinistra del display, header con §-tag + status,
   titolo medio + sub, riga con preview surface (thumbnail / icon /
   wireframe / avatar / mark) + meta in colonna, footer con hint
   "PREMI N PER ENTRARE". Tutti i moduli usano la stessa shell —
   cambia solo la surface e i meta. */
function ModulePreview({ id, module, lang }) {
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setMounted(true), 20); return () => clearTimeout(t); }, []);

  const meta = buildPreviewMeta(id, lang);

  return (
    <div style={{
      /* Pannello spec-sheet a due compartimenti: SCHEDA (identità + dati)
         | ANTEPRIMA (media grande). Riempie la larghezza del display —
         niente più mezzo schermo vuoto a destra. Grid 2 colonne divise da
         una hairline; ogni colonna gestisce il proprio overflow.
         Aspect-ratio fisso → il pannello ha la stessa forma e gli stessi
         margini su ogni schermo, centrato dal contenitore. maxHeight evita
         overflow su viewport bassi (allora restringe la larghezza). */
      width: '100%', maxWidth: 1140,
      aspectRatio: '1140 / 580', maxHeight: '100%',
      background: C.white,
      border: `0.5px solid ${C.border}`,
      boxSizing: 'border-box',
      position: 'relative',
      fontFamily: 'IBM Plex Mono, monospace',
      pointerEvents: 'none',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(10px)',
      transition: 'opacity 280ms linear, transform 320ms cubic-bezier(0.2,0,0,1)',
      display: 'grid',
      gridTemplateColumns: 'minmax(0, 0.82fr) minmax(0, 1.18fr)',
      overflow: 'hidden',
    }}>
      <PreviewCornerMarks/>

      {/* ───── COMPARTIMENTO A · SCHEDA (solo titolo + descrizione) ───── */}
      <div style={{
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: 'clamp(16px, 1.8vw, 26px)',
        borderRight: `0.5px solid ${C.border}`,
        minWidth: 0, minHeight: 0, overflow: 'hidden',
      }}>
        {/* titolo grande — niente underscore terminale */}
        <h2 style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
          fontSize: 'clamp(30px, 3.6vw, 54px)',
          letterSpacing: '-0.04em', color: C.ink,
          lineHeight: 0.9, margin: '0 0 clamp(12px, 1.6vh, 18px)',
        }}>{module.label}</h2>
        <span style={{
          fontSize: 13, color: C.grey, letterSpacing: '0.01em', lineHeight: 1.6,
          textWrap: 'pretty',
        }}>{module.sub}</span>
      </div>

      {/* ───── COMPARTIMENTO B · ANTEPRIMA ─────
          Fondale vivo: l'elemento relativo al modulo riempie tutto il
          compartimento, zoomatissimo e sfocato (la bassa risoluzione non si
          nota) e scorre lentamente — niente più anteprima statica. Sopra,
          la didascalia (tag + titolo) su una velatura paper che ne tiene
          la leggibilità. Nessuna ombra: solo tono del fondo + hairline. */}
      <div style={{
        position: 'relative',
        background: C.paper,
        minWidth: 0, minHeight: 0, overflow: 'hidden',
      }}>
        {/* fondale in movimento */}
        <PreviewAmbient id={id}/>

        {/* velatura paper: scurisce appena in basso a sinistra per la
            didascalia, lascia respirare il resto. (tinta, non ombra) */}
        <div aria-hidden style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          background: `linear-gradient(105deg, rgba(240,241,242,0.86) 0%, rgba(240,241,242,0.5) 34%, rgba(240,241,242,0) 62%)`,
        }}/>
        {/* hairline interno per ancorare il fondale al telaio della scheda */}
        <div aria-hidden style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          border: `0.5px solid ${C.borderSoft}`,
        }}/>

        {/* didascalia sovrapposta — in basso a sinistra */}
        <div style={{
          position: 'absolute', left: 'clamp(16px, 1.8vw, 26px)',
          bottom: 'clamp(16px, 1.8vw, 26px)', right: 'clamp(16px, 1.8vw, 26px)',
          display: 'flex', flexDirection: 'column', gap: 6, zIndex: 2,
        }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>

              fontSize: 9, fontWeight: 700, letterSpacing: '0.28em', color: C.grey,
            }}>{meta.head.tag}</span>
          </span>
          <span style={{
            fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
            fontSize: 'clamp(16px, 1.6vw, 24px)', color: C.ink,
            letterSpacing: '-0.02em', lineHeight: 1.0,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{meta.head.title}</span>
        </div>
      </div>
    </div>
  );
}

/* PreviewAmbient — fondale vivo che riempie il compartimento ANTEPRIMA.
   UNIFICATO (v3.8): ogni sezione parla la STESSA lingua della 04 — una
   griglia di "oggetti" hairline grigi che deriva in diagonale (sgnDrift,
   lineare, meccanico, niente blur). Via le foto sfocate (01/03) e i glyph
   organici (02/05): cambia solo il glifo del tile, non il trattamento, così
   tutte e cinque le anteprime appartengono alla stessa famiglia. La velatura
   paper + l'hairline interno li mette il chiamante; il nome reale del
   contenuto resta nella didascalia in basso a sinistra. */
function PreviewAmbient({ id }) {
  // tile() → fondale a piastrelle 132px che scorre in diagonale.
  // 132 è obbligatorio: sgnDrift trasla esattamente di -132px → loop perfetto.
  const tile = (inner, dur = 24) => {
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='132' height='132'>${inner}</svg>`;
    return (
      <div className="sgn-ambient" aria-hidden style={{
        position: 'absolute', inset: '-30%',
        backgroundImage: `url("data:image/svg+xml,${encodeURIComponent(svg)}")`,
        backgroundSize: '132px 132px', backgroundRepeat: 'repeat',
        opacity: 0.5,
        animation: `sgnDrift ${dur}s linear infinite`,
        willChange: 'transform',
      }}/>
    );
  };

  const G = 'rgb(120,122,124)';  // --grey, come il tratteggio della 04

  // 01 VIDEO → cornice 16:9 con triangolo play.
  if (id === '01') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1' stroke-linejoin='round'>` +
      `<rect x='26' y='40' width='80' height='52'/>` +
      `<path d='M58 54 L82 66 L58 78 Z'/>` +
      `</g>`, 26
    );
  }
  // 02 OBJECTS → esaedro isometrico "pieno" (stesso marchio della ModuleIcon
  //   e dell'STL Lab): SOLO le 3 facce frontali — niente diagonali che
  //   attraversano fino al retro (che facevano leggere il cubo come un
  //   esagono "a fette"). Spigoli dal centro ai 3 vertici vicini.
  if (id === '02') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'>` +
      `<polygon points='66,34 94,50 94,82 66,98 38,82 38,50'/>` +
      `<polyline points='38,50 66,66 94,50'/>` +
      `<line x1='66' y1='66' x2='66' y2='98'/>` +
      `</g>`, 30
    );
  }
  // 03 APPS → griglia app 2×2 (quadrati, niente raggio: brand radius 0).
  if (id === '03') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1'>` +
      `<rect x='34' y='34' width='28' height='28'/>` +
      `<rect x='70' y='34' width='28' height='28'/>` +
      `<rect x='34' y='70' width='28' height='28'/>` +
      `<rect x='70' y='70' width='28' height='28'/>` +
      `</g>`, 22
    );
  }
  // 05 ABOUT → monogramma Sgnaolin in contorno (i tre poligoni del logo).
  if (id === '05') {
    return tile(
      `<g transform='translate(26,26) scale(0.388)' fill='none' stroke='${G}' stroke-width='2.6' stroke-linejoin='round'>` +
      `<polygon points='51.44,100.64 154.75,100.64 0,201.44'/>` +
      `<polygon points='102.79,0 206.1,0 51.35,100.8'/>` +
      `<polygon points='84.44,0 33,100.8 8.4,100.8 59.83,0'/>` +
      `</g>`, 28
    );
  }
  // 04 LINK → slot tratteggiato (motivo "posti liberi") — il riferimento, invariato.
  return tile(
    `<rect x='26' y='26' width='80' height='80' fill='none' stroke='${G}' stroke-width='1' stroke-dasharray='4 5'/>`, 24
  );
}

/* PreviewViewport — quadratino bianco incorniciato con corner-tick,

      <span style={{ ...base, top: off, right: off, borderTop: `${t}px solid ${C.yellow}`, borderRight: `${t}px solid ${C.yellow}` }}/>
      <span style={{ ...base, bottom: off, left: off, borderBottom: `${t}px solid ${C.yellow}`, borderLeft: `${t}px solid ${C.yellow}` }}/>
      <span style={{ ...base, bottom: off, right: off, borderBottom: `${t}px solid ${C.yellow}`, borderRight: `${t}px solid ${C.yellow}` }}/>

}

/* buildPreviewMeta — restituisce status + 3 righe key/value per modulo.
   Dati live quando esistono, fallback "—" se la sezione è vuota. */
function buildPreviewMeta(id, lang) {
  const isIt = lang === 'it';
  if (id === '01') {
    const v = (VIDEOS && VIDEOS[0]) || {};
    return {
      status: 'LIVE',
      head: { tag: isIt ? 'ULTIMO VIDEO' : 'LATEST VIDEO', title: v.title || (isIt ? 'Nessun video' : 'No video') },
      rows: [
        { k: isIt ? 'CANALE'  : 'CHANNEL', v: CHANNEL.subs.synced ? '67K SUBS' : '—' },
        { k: isIt ? 'ULTIMO'  : 'LATEST',  v: v.title || '—' },
        { k: isIt ? 'PUBBL.'  : 'PUBL.',   v: v.date ? `${v.date} · ${v.views || '—'}` : '—' },
      ],
    };
  }
  if (id === '02') {
    const o = (OBJECTS && OBJECTS[0]) || {};
    return {
      status: OBJECTS && OBJECTS.length ? 'LIVE' : 'SOON',
      head: { tag: isIt ? 'ULTIMO OGGETTO' : 'LATEST OBJECT', title: o.name || (isIt ? 'In arrivo' : 'Coming soon') },
      rows: [
        { k: 'FILES',  v: `${(OBJECTS||[]).length.toString().padStart(2,'0')} STL` },
        { k: isIt ? 'ULTIMO' : 'LATEST', v: o.name || '—' },
        { k: isIt ? 'DIM.'   : 'SIZE',   v: o.size ? `${o.size} mm` : '—' },
      ],
    };
  }
  if (id === '03') {
    const a = (typeof APPS !== 'undefined' && APPS[0]) || {};
    return {
      status: typeof APPS !== 'undefined' && APPS.length ? 'LIVE' : 'SOON',
      head: { tag: isIt ? 'PIÙ SCARICATA' : 'TOP DOWNLOAD', title: a.name || (isIt ? 'In arrivo' : 'Coming soon') },
      rows: [
        { k: 'APPS',  v: `${(typeof APPS !== 'undefined' ? APPS : []).length.toString().padStart(2,'0')} ANDROID` },
        { k: isIt ? 'TOP'    : 'TOP',    v: a.name || '—' },
        { k: isIt ? 'VOTO'   : 'RATING', v: a.rating ? `${a.rating} ★ · ${a.downloads}` : '—' },
      ],
    };
  }
  if (id === '04') {
    const hasLinks = typeof LINKS !== 'undefined' && LINKS.length > 0;
    const f = hasLinks ? LINKS[0] : null;
    return {
      status: hasLinks ? 'LIVE' : 'OPEN',
      head: { tag: isIt ? 'STATO' : 'STATUS', title: hasLinks ? (f.name || '—') : (isIt ? 'Aperto a collaborazioni' : 'Open for collabs') },
      rows: [
        { k: isIt ? 'COLLAB.' : 'COLLABS', v: hasLinks ? String(LINKS.length).padStart(2, '0') : '00' },
        { k: isIt ? 'ATTIVE' : 'ACTIVE',  v: hasLinks ? (f.name || '—') : (isIt ? 'IN ATTESA' : 'AWAITING') },
        { k: 'TAG',  v: hasLinks ? 'ACTIVE' : 'OPEN FOR' },
      ],
    };
  }
  if (id === '05') {
    return {
      status: 'YOU',
      head: { tag: isIt ? 'PROFILO' : 'PROFILE', title: 'SGNOOGLE' },
      rows: [
        { k: isIt ? 'CLASSE' : 'CLASS', v: 'TECH CREATOR' },
        { k: isIt ? 'DAL'    : 'SINCE', v: String(CHANNEL.startYear || '—') },
        { k: 'BASE', v: 'IT · MILAN' },
      ],
    };
  }
  return { status: '·', head: { tag: '', title: '' }, rows: [] };
}
