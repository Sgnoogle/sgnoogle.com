/* VideoPreview — muted YouTube embed lazy.
   Prima paint leggero: thumbnail/placeholder OS; iframe solo quando il riquadro
   entra in viewport o l'utente lo richiede. */
function VideoPreview({ youtubeId, playlistId, title }) {
  const [loaded, setLoaded] = React.useState(false);
  const [armed, setArmed] = React.useState(false);
  const wrapRef = React.useRef(null);
  const base = 'https://www.youtube-nocookie.com/embed/';
  const common = 'autoplay=1&mute=1&controls=0&loop=1'
    + '&modestbranding=1&playsinline=1&rel=0&iv_load_policy=3&disablekb=1';
  const url = playlistId
    ? `${base}videoseries?list=${playlistId}&${common}`
    : `${base}${youtubeId}?playlist=${youtubeId}&${common}`;

  React.useEffect(() => {
    const el = wrapRef.current;
    if (!el || armed) return undefined;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setArmed(true);
        obs.disconnect();
      }
    }, { rootMargin: '160px 0px', threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [armed]);

  return (
    <div ref={wrapRef} onClick={() => setArmed(true)} style={{
      position: 'relative',
      width: '100%', height: '100%', minHeight: 0,
      background: C.ink, overflow: 'hidden',
      containerType: 'size', cursor: armed ? 'default' : 'pointer',
    }}>
      {armed && (
        <iframe
          src={url}
          title={title}
          loading="lazy"
          onLoad={() => setLoaded(true)}
          allow="autoplay; encrypted-media; picture-in-picture"
          referrerPolicy="strict-origin-when-cross-origin"
          style={{
            position: 'absolute', top: '50%', left: '50%',
            transform: 'translate(-50%, -50%) scale(1.02)',
            width: 'max(100%, calc(100cqh * 16 / 9))',
            height: 'max(100%, calc(100cqw * 9 / 16))',
            maxWidth: 'none', maxHeight: 'none',
            border: 0, display: 'block',
            pointerEvents: 'none',
            opacity: loaded ? 1 : 0,
            transition: 'opacity 260ms linear',
          }}
        />
      )}
      {(!armed || !loaded) && (
        <div aria-hidden="true" style={{
          position: 'absolute', inset: 0, background: C.ink,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          pointerEvents: 'none',
        }}>
          <span style={{
            fontFamily: 'IBM Plex Mono, monospace', fontSize: 10, fontWeight: 700,
            letterSpacing: '0.22em', color: 'rgba(255,255,255,0.55)',
            display: 'inline-flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ color: C.yellow }}>▸</span>{armed ? 'LOADING' : 'LIVE FEED · STANDBY'}
            <span style={{ animation: 'sgnBlink 1s steps(1) infinite' }}>_</span>
          </span>
        </div>
      )}
    </div>
  );
}

/* VideoThumb — copertina REALE del video, presa live da YouTube senza API
   né chiavi: i.ytimg.com serve sempre la thumbnail aggiornata del video.
   Parto dalla maxres (1280×720, nessuna banda) e ricado su hqdefault per i
   video che non la espongono. È il "dato sempre aggiornato" che riempie le
   card della pagina 2 con immagini reali invece dei placeholder. */
function VideoThumb({ id, title }) {
  const [src, setSrc] = React.useState(`https://i.ytimg.com/vi/${id}/maxresdefault.jpg`);
  return (
    <img
      src={src}
      alt={title}
      loading="lazy"
      decoding="async"
      onError={() => setSrc(`https://i.ytimg.com/vi/${id}/hqdefault.jpg`)}
      style={{
        position: 'absolute', inset: 0, width: '100%', height: '100%',
        objectFit: 'cover', display: 'block', background: C.ink,
      }}
    />
  );
}

/* ════════ 04 LINK ════════
   Strip orizzontale di schede quadrate, scorribile con le frecce (stesso
   gesto della gallery screenshot). Prima scheda = CONTATTO (scrivimi via
   mail). A seguire, gli sponsor con cui ho collaborato: ogni quadrato,
   cliccato, porta al contenuto social fatto con quel brand. Finché il
   roster è vuoto, mostro slot aperti come invito alla collaborazione. */
function LinkModule({ lang }) {
  const L = I18N[lang];
  return (
    <PageDeck>
      <Page label={lang === 'it' ? 'SPONSOR' : 'SPONSORS'}>
        <LinkStrip L={L} lang={lang}/>
      </Page>
    </PageDeck>
  );

function LinkStrip({ L, lang }) {
  const scrollerRef = React.useRef(null);
  const [atStart, setAtStart] = React.useState(true);
  const [atEnd, setAtEnd]     = React.useState(false);
  const isIt = lang === 'it';
  const sponsors = (typeof LINKS !== 'undefined' && LINKS) || [];
  const openSlots = Math.max(0, 3 - sponsors.length);

  const update = React.useCallback(() => {
    const el = scrollerRef.current;
    if (!el) return;
    // Su mobile la strip è una COLONNA (scroll verticale): leggo l'asse Y;
    // su desktop resta orizzontale (asse X). Stessa logica "ci sono altri
    // elementi in quella direzione?" → accende/spegne le frecce.
    const vertical = window.matchMedia('(max-width: 760px)').matches;
    if (vertical) {
      setAtStart(el.scrollTop <= 2);
      setAtEnd(el.scrollTop + el.clientHeight >= el.scrollHeight - 2);
    } else {
      setAtStart(el.scrollLeft <= 2);
      setAtEnd(el.scrollLeft + el.clientWidth >= el.scrollWidth - 2);
    }
  }, []);

  React.useEffect(() => {
    update();
    const el = scrollerRef.current;
    if (!el) return undefined;
    const ro = new ResizeObserver(update);
    ro.observe(el);
    return () => ro.disconnect();
  }, [update]);

  function scrollByCard(dir) {
    const el = scrollerRef.current;
    if (!el) return;
    const vertical = window.matchMedia('(max-width: 760px)').matches;
    const card = el.querySelector('[data-link-card]');
    const r = card ? card.getBoundingClientRect() : null;
    if (vertical) {
      const step = r ? r.height + 16 : 240;
      el.scrollBy({ top: dir * step, behavior: 'smooth' });
    } else {
      const step = r ? r.width + 18 : 280;
      el.scrollBy({ left: dir * step, behavior: 'smooth' });
    }
    if (window.sgnTick) window.sgnTick('tick');
  }

  return (
    <div style={{
      flex: 1, minHeight: 0,
      display: 'flex', flexDirection: 'column', gap: 'clamp(12px, 1.6vh, 18px)',
    }}>
      {/* header — eyebrow + frecce di scorrimento */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        gap: 12, flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 }}>
          <span style={{
            width: 6, height: 6, background: C.yellow, display: 'inline-block',
            animation: 'sgnpulse 1.6s linear infinite', flexShrink: 0,
          }}/>
          <Label size={10} color={C.ink} style={{ fontWeight: 700 }}>
            {isIt ? 'SPONSOR · COLLABORAZIONI' : 'SPONSORS · COLLABS'}
          </Label>
        </div>
        <div style={{ display: 'inline-flex', gap: 6, flexShrink: 0 }}>
          {/* Desktop: scroll orizzontale → frecce ← → */}
          <div className="sgn-link-arrows" style={{ display: 'inline-flex', gap: 6 }}>
            <StripArrow dir="left"  disabled={atStart} onClick={() => scrollByCard(-1)} lang={lang}/>
            <StripArrow dir="right" disabled={atEnd}   onClick={() => scrollByCard(+1)} lang={lang}/>
          </div>
          {/* Mobile: scroll verticale → frecce ↑ ↓, affiancate e compatte,
              nello stesso angolo in alto a destra dell'header (che resta
              sempre visibile mentre le schede scorrono). Niente più colonna
              dedicata a lato. */}
          <div className="sgn-link-arrows-m" style={{ display: 'none', gap: 6 }}>
            <StripArrow dir="up"   disabled={atStart} onClick={() => scrollByCard(-1)} lang={lang} small/>
            <StripArrow dir="down" disabled={atEnd}   onClick={() => scrollByCard(+1)} lang={lang} small/>
          </div>
        </div>
      </div>

      {/* corpo: solo lo scroller. Desktop scorre in orizzontale, mobile in
          colonna (CSS). Le frecce vivono nell'header (vedi sopra) su entrambi
          i layout — niente colonna laterale di affordance. */}
      <div className="sgn-link-body" style={{
        flex: 1, minHeight: 0, display: 'flex',
        gap: 'clamp(8px, 1.4vw, 14px)', alignItems: 'stretch',
      }}>
        <div
          ref={scrollerRef}
          onScroll={update}
          className="sgn-stl-scroll sgn-link-scroller"
          style={{
            flex: 1, minHeight: 0, minWidth: 0,
            display: 'flex', alignItems: 'stretch',
            gap: 'clamp(12px, 1.4vw, 18px)',
            overflowX: 'auto', overflowY: 'hidden',
            scrollSnapType: 'x proximity',
          }}>
          <ContactCard L={L} lang={lang}/>
          {sponsors.map((s, i) => (
            <SponsorCard key={s.name} s={s} L={L} lang={lang}/>
          ))}
          {Array.from({ length: openSlots }).map((_, i) => (
            <OpenSlotCard key={`slot-${i}`} n={sponsors.length + i + 1} lang={lang}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* StripArrow — bottone quadrato di scorrimento, stesso linguaggio della
   gallery (paper + hairline, ↑↓ disabilitate ai capi). */
function StripArrow({ dir, disabled, onClick, lang, small }) {
  const glyph = { left: '←', right: '→', up: '↑', down: '↓' }[dir] || '→';
  const isPrev = dir === 'left' || dir === 'up';
  const dim = small ? 28 : 34;
  return (
    <button
      type="button"
      onClick={onClick}
      disabled={disabled}
      aria-label={isPrev
        ? (lang === 'it' ? 'precedente' : 'previous')
        : (lang === 'it' ? 'successivo' : 'next')}
      className="sgn-hot"
      style={{
        width: dim, height: dim,
        appearance: 'none', cursor: disabled ? 'default' : 'pointer',
        background: disabled ? 'transparent' : C.white,
        border: `0.5px solid ${disabled ? C.borderSoft : C.border}`,
        color: disabled ? C.faint : C.ink,
        fontFamily: 'IBM Plex Mono, monospace', fontSize: small ? 13 : 14, fontWeight: 700,
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        opacity: disabled ? 0.4 : 1,
        transition: 'background 150ms linear, border-color 150ms linear, opacity 150ms linear',
      }}>
      {glyph}
    </button>
  );
}

/* AutoFit — misura il contenuto e lo scala (transform) per stare SEMPRE
   dentro lo spazio disponibile: né scroll né taglio, su qualunque display.
   Il transform non altera scrollHeight/offsetHeight → nessun loop col
   ResizeObserver. Scala solo verso il basso (max 1). */
function AutoFit({ children, max = 1 }) {
  const outerRef = React.useRef(null);
  const innerRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useLayoutEffect(() => {
    const outer = outerRef.current, inner = innerRef.current;
    if (!outer || !inner) return undefined;
    let raf = 0;
    const measure = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const availH = outer.clientHeight, availW = outer.clientWidth;
        const natH = inner.offsetHeight, natW = inner.offsetWidth;
        if (!availH || !natH || !natW) return;
        const s = Math.min(max, availH / natH, availW / natW);
        setScale(s > 0 && s < 1 ? s : (s >= 1 ? max : 1));
      });
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(outer); ro.observe(inner);
    window.addEventListener('resize', measure);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(measure);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [max]);
  return (
    <div ref={outerRef} style={{
      flex: 1, minHeight: 0, width: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      overflow: 'hidden',
    }}>
      <div ref={innerRef} style={{
        width: '100%',
        transform: `scale(${scale})`,
        transformOrigin: 'center center',
      }}>{children}</div>

/* ProfileCard — scheda-ID incorniciata, avatar flippabile.
   Mount: cornice bianca + title-bar (ID / SGN-CARD / A·B) + passe-partout,
   con corner-tick gialli sulla finestra avatar (la "cornice figa").

function ProfileCard({ L }) {
  const [view, setView] = React.useState('avatar');
  const flip = () => {
    if (window.sgnTick) window.sgnTick('confirm');
    setView(v => v === 'avatar' ? 'real' : 'avatar');

  const isReal = view === 'real';

  const armW = 12, armT = 1.5, o = 7;
  const tickBase = { position: 'absolute', width: armW, height: armW, zIndex: 3, pointerEvents: 'none' };
  const ticks = {
    tl: { top: o, left: o,    borderTop: `${armT}px solid ${C.yellow}`, borderLeft: `${armT}px solid ${C.yellow}` },
    tr: { top: o, right: o,   borderTop: `${armT}px solid ${C.yellow}`, borderRight: `${armT}px solid ${C.yellow}` },
    bl: { bottom: o, left: o, borderBottom: `${armT}px solid ${C.yellow}`, borderLeft: `${armT}px solid ${C.yellow}` },

  return (
    <div style={{
      position: 'relative',
      background: C.white,
      border: `0.5px solid ${C.border}`,
      padding: 'clamp(9px, 1vw, 13px)',

          con transizione su padding-bottom sincronizzata col flip 3D. */}
      <div style={{
        position: 'relative',
        height: 0, paddingBottom: isReal ? '122%' : '100%',
        border: `0.5px solid ${C.border}`,
        perspective: '1200px', overflow: 'hidden',
        transition: 'padding-bottom 540ms cubic-bezier(0.2,0,0,1)',
      }}>
        <div style={{
          position: 'absolute', inset: 0,
          transformStyle: 'preserve-3d',
          transition: 'transform 540ms cubic-bezier(0.2,0,0,1)',
          transform: isReal ? 'rotateY(180deg)' : 'rotateY(0)',
        }}>
          {/* FACE A — anime */}
          <div style={{
            position: 'absolute', inset: 0, overflow: 'hidden',
            backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
          }}>
            <img src="/assets/avatar-anime.webp" alt="Francesco Sgnaolin avatar" loading="lazy" decoding="async"
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}/>
          </div>
          {/* FACE B — real photo */}
          <div style={{
            position: 'absolute', inset: 0, overflow: 'hidden',
            backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
            transform: 'rotateY(180deg)', background: C.paper,
          }}>
            <img src="/assets/avatar-real.webp" alt="Francesco Sgnaolin real photo" loading="lazy" decoding="async"
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}/>
          </div>
        </div>

        {/* CORNER-TICK — la cornice gialla sopra entrambe le facce */}
        <span style={{ ...tickBase, ...ticks.tl }}/>
        <span style={{ ...tickBase, ...ticks.tr }}/>
        <span style={{ ...tickBase, ...ticks.bl }}/>
        <span style={{ ...tickBase, ...ticks.br }}/>

        {/* TOGGLE — switch segmentato AVATAR / REAL. Fondo bianco, etichette
            ink, sottolineatura GIALLA che scorre sotto l'attiva: il giallo sta
            sempre su bianco e mai a contatto col nero (regola del sito). */}
        <button
          onClick={flip}
          className="sgn-hot"
          title={L.self.viewHint}
          aria-label={`${L.self.viewToggleAvatar} / ${L.self.viewToggleReal}`}
          role="switch"
          aria-checked={isReal}
          style={{
            position: 'absolute', right: 10, bottom: 10, zIndex: 4,
            display: 'inline-flex', alignItems: 'stretch',

            <span aria-hidden="true" style={{
              position: 'absolute', left: 0, bottom: 0, width: '50%', height: 3,
              background: C.yellow,
              transform: isReal ? 'translateX(100%)' : 'translateX(0)',
              transition: 'transform 260ms cubic-bezier(0.2,0,0,1)',

            <span style={{
              position: 'relative', zIndex: 1, width: 54, textAlign: 'center',
              padding: '6px 0 8px', fontSize: 9, fontWeight: 700, letterSpacing: '0.18em',
              color: isReal ? C.faint : C.ink,

            }}>{L.self.viewToggleAvatar}</span>
            <span style={{
              position: 'relative', zIndex: 1, width: 54, textAlign: 'center',

            }}>{L.self.viewToggleReal}</span>
          </span>
        </button>

  );
}

<script type="text/babel">
/* Console — the SGN-OS shell.
   Layout: TopBar / Display / ModuleStrip.
   v3.3 desktop: accordion strip (active tab expands to ~2.5fr).
   v3.3 mobile: Game-Boy-style 5-button bottom nav, icone custom, no scroll.
*/

/* ─────────────────────────── TopBar ─────────────────────────── */

/* StatusReadout — readout di stato al centro della topbar: lampeggiatore
   ● ONLINE + orologio di sistema che ticchetta. La menu-bar di un OS mostra
   l'ora — telemetria vera, sempre rilevante, mai ridondante. Sostituisce
   "SGN-OS · STEEL" (codename arbitrario fuori contesto qui). */
function StatusReadout({ lang, current, direction = 0, variant = 'flash', idle = false }) {
  const isIt = lang === 'it';
  // Standby: solo a riposo sull'home (nessuna sezione aperta). Il readout
  // smette di dire "ONLINE + ora" e invita all'azione suggerendo la
  // scorciatoia — la palette non vive più nel footer, ma qui al centro.
  const showIdle = idle && !current;
  const [now, setNow] = React.useState(() => new Date());
  React.useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);
  // Fuso del visitatore (l'orologio mostra l'ora LOCALE): niente più "CET"
  // fisso, che mentiva fuori dall'Europa centrale.
  const tz = React.useMemo(() => {
    try {
      return new Intl.DateTimeFormat(undefined, { timeZoneName: 'short' })
        .formatToParts(new Date()).find(p => p.type === 'timeZoneName')?.value || 'LOCAL';
    } catch (e) { return 'LOCAL'; }
  }, []);

  /* ── Route takeover ───────────────────────────────────────────
     Quando `current` cambia, la status line (ONLINE + orologio) si fa
     da parte in dissolvenza e la barra mostra per ~700ms solo il NOME
     della sezione aperta — l'unica informazione che non conosci già
     premendo il tasto — con una hairline gialla 2px che lo sottolinea
     swippando nella direzione del cambio (riusa sgnSweepRight/Left).
     Poi torna l'orologio. I due stati sono layer assoluti sovrapposti →
     zero layout shift, l'orologio ticchetta sotto e riappare aggiornato.
     direction è letto da un ref così l'effetto scatta SOLO al cambio di
     `current`, mai per un re-render con stessa sezione. */
  const dirRef = React.useRef(direction);
  dirRef.current = direction;
  const variantRef = React.useRef(variant);
  variantRef.current = variant;
  const [route, setRoute] = React.useState(null); // { key, dir, id, label }
  const firstRef = React.useRef(true);
  const keyRef = React.useRef(0);
  React.useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; } // no takeover al primo mount
    if (variantRef.current !== 'topbar') return; // il takeover esiste solo in modalità 'topbar'
    const L = I18N[lang];
    keyRef.current += 1;
    const mod = current ? L.modules[current] : null;
    const mine = keyRef.current;
    setRoute({ key: mine, dir: dirRef.current, id: current, label: mod ? mod.label : L.nav.main });
    const t = setTimeout(() => setRoute(r => (r && r.key === mine ? null : r)), 720);
    return () => clearTimeout(t);
  }, [current]); // eslint-disable-line — lang/direction/variant via ref di proposito

  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');

  const active = !!route;
  const fwd = (route?.dir ?? 0) >= 0;
  const sweepAnim = fwd ? 'sgnSweepRight' : 'sgnSweepLeft';

  return (
    <div style={{
      flex: 1, position: 'relative', alignSelf: 'stretch',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      minWidth: 0, fontFamily: 'IBM Plex Mono, monospace',
    }}>
      {/* Layer A — a riposo: ● IN ATTESA + scorciatoia "/". Attivo:
          ● ONLINE + orologio. I due stati condividono la stessa shell
          (dot+label | divisore+contenuto) e si dissolvono l'uno nell'altro. */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 12,
        opacity: active ? 0 : 1,
        transition: 'opacity 160ms linear',
        pointerEvents: 'none',
      }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
          <span style={{
            width: 6, height: 6, display: 'inline-block',
            background: showIdle ? C.faint : C.yellow,
            animation: showIdle ? 'none' : 'sgnpulse 1.6s linear infinite',
            transition: 'background 320ms linear',
          }}/>
          <span style={{
            fontSize: 9, fontWeight: 700, letterSpacing: '0.3em',
            color: showIdle ? C.grey : C.ink, transition: 'color 320ms linear',
            whiteSpace: 'nowrap',
          }}>{showIdle ? (isIt ? 'IN ATTESA' : 'STANDBY') : 'ONLINE'}</span>
        </span>
        <span style={{
          paddingLeft: 12, borderLeft: `0.5px solid ${C.borderSoft}`,
          display: 'inline-flex', alignItems: 'center', gap: 7, whiteSpace: 'nowrap',
        }}>
          {showIdle ? (
            <>
              <span style={{
                display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                minWidth: 16, height: 16, padding: '0 4px',
                border: `0.5px solid ${C.border}`, background: C.white,
                fontSize: 10, fontWeight: 700, color: C.ink, lineHeight: 1,
                fontFamily: 'IBM Plex Mono, monospace',
              }}>/</span>
              <span style={{
                fontSize: 9, fontWeight: 700, letterSpacing: '0.22em', color: C.faint,
              }}>{isIt ? 'PER I COMANDI' : 'FOR COMMANDS'}</span>
            </>
          ) : (
            <span style={{ display: 'inline-flex', alignItems: 'baseline', gap: 6 }}>
              <span style={{
                fontSize: 11, fontWeight: 600, letterSpacing: '0.14em', color: C.ink,
                fontVariantNumeric: 'tabular-nums',
              }}>{hh}:{mm}<span style={{ color: C.faint }}>:{ss}</span></span>
              <span style={{
                fontSize: 8, fontWeight: 700, letterSpacing: '0.22em', color: C.faint,
              }}>{tz}</span>
            </span>
          )}
        </span>
      </div>

      {/* Layer B — solo il NOME della sezione (l'unica informazione che non
          conosci già aprendola), con una hairline gialla che lo sottolinea
          swippando nella direzione del cambio. */}
      <div aria-hidden style={{
        position: 'absolute', inset: 0,
        display: 'flex', justifyContent: 'center', alignItems: 'center',
        opacity: active ? 1 : 0,
        transition: 'opacity 160ms linear',
        pointerEvents: 'none',
      }}>
        {route && (
          <span style={{
            position: 'relative', display: 'inline-block',
            paddingBottom: 6, lineHeight: 1,
          }}>
            <span style={{
              fontSize: 11, fontWeight: 700, color: C.ink, letterSpacing: '0.3em',
              whiteSpace: 'nowrap',
            }}>{route.label}</span>
            <span key={route.key} style={{
              position: 'absolute', left: 0, right: 0, bottom: 0, height: 2,
              background: C.yellow,
              animation: `${sweepAnim} 700ms cubic-bezier(0.2,0,0,1) forwards`,
            }}/>
          </span>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────────── IdleDisplay ─────────────────────────── */
function IdleDisplay({ lang, mobile, focused }) {
  const L = I18N[lang];
  const [armed, setArmed] = React.useState(false);
  const [idleMode, setIdleMode] = React.useState(false);
  const moduleWords = React.useMemo(() => ['VIDEO', 'OBJECTS', 'APPS', 'LINK', 'ABOUT'], []);
  const [moduleIndex, setModuleIndex] = React.useState(0);
  const [typedModule, setTypedModule] = React.useState('');
  const [deletingModule, setDeletingModule] = React.useState(false);
  const [reduceModuleMotion, setReduceModuleMotion] = React.useState(false);
  const [showSideHint, setShowSideHint] = React.useState(false);

  React.useEffect(() => {
    const mq = window.matchMedia?.('(prefers-reduced-motion: reduce)');
    if (!mq) return undefined;
    const sync = () => setReduceModuleMotion(mq.matches);
    sync();
    mq.addEventListener?.('change', sync);
    return () => mq.removeEventListener?.('change', sync);
  }, []);

  React.useEffect(() => {
    if (reduceModuleMotion) return undefined;
    const full = moduleWords[moduleIndex];
    const complete = typedModule.length === full.length;
    const empty = typedModule.length === 0;
    const delay = deletingModule ? 48 : (complete ? 1050 : 76);
    const t = setTimeout(() => {
      if (!deletingModule) {
        if (!complete) setTypedModule(full.slice(0, typedModule.length + 1));
        else setDeletingModule(true);
      } else if (!empty) {
        setTypedModule(full.slice(0, typedModule.length - 1));
      } else {
        setDeletingModule(false);
        setModuleIndex(i => (i + 1) % moduleWords.length);
      }
    }, empty && deletingModule ? 180 : delay);
    return () => clearTimeout(t);
  }, [typedModule, deletingModule, moduleIndex, moduleWords, reduceModuleMotion]);

  React.useEffect(() => {
    const t = setTimeout(() => setArmed(true), 80);
    return () => clearTimeout(t);
  }, []);

  React.useEffect(() => {
    if (focused) return undefined;
    let t;
    const reset = () => {
      setIdleMode(false);
      clearTimeout(t);
      t = setTimeout(() => setIdleMode(true), 30000);
    };
    reset();
    window.addEventListener('mousemove', reset);
    window.addEventListener('keydown',   reset);
    window.addEventListener('touchstart',reset);
    return () => {
      clearTimeout(t);
      window.removeEventListener('mousemove', reset);
      window.removeEventListener('keydown',   reset);
      window.removeEventListener('touchstart',reset);
    };
  }, [focused]);

  React.useEffect(() => {
    if (focused) {
      setShowSideHint(false);
      try { localStorage.setItem('sgnHomeSideHintSeen', '1'); } catch (e) {}
      return undefined;
    }
    try { if (localStorage.getItem('sgnHomeSideHintSeen')) return undefined; } catch (e) {}
    const show = setTimeout(() => setShowSideHint(true), 900);
    const hide = setTimeout(() => {
      setShowSideHint(false);
      try { localStorage.setItem('sgnHomeSideHintSeen', '1'); } catch (e) {}
    }, 5000);
    return () => { clearTimeout(show); clearTimeout(hide); };
  }, [focused]);

  const preview = focused && L.modules[focused];

  return (
    <div style={{
      position: 'relative',
      width: '100%', height: '100%',
      display: 'flex', flexDirection: 'column',
      fontFamily: 'IBM Plex Mono, monospace',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        transform: idleMode ? 'scale(1.4)' : 'scale(1)',
        opacity: preview ? 0.32 : 1,
        transition: 'transform 1800ms cubic-bezier(0.2,0,0,1), opacity 320ms linear',
      }}>
        <Hero3DMark mobile={mobile}/>
      </div>

      <div style={{
        position: 'relative', zIndex: 4,
        flex: 1,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        padding: 'clamp(20px, 3.2vw, 48px)',
        gap: 'clamp(18px, 3vh, 28px)',
      }}>
        <h1 style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace',
          fontWeight: 700,
          fontSize: 'clamp(36px, 12vw, 168px)',
          letterSpacing: '-0.05em', color: C.ink,
          lineHeight: 0.9, margin: 0,
          whiteSpace: 'nowrap',
          display: preview ? 'none' : 'block',
          opacity: idleMode ? 0.35 : (armed ? 1 : 0),
          transform: armed ? 'translateY(0)' : 'translateY(18px)',
          transition: 'opacity 700ms linear 120ms, transform 700ms cubic-bezier(0.2,0,0,1) 120ms',
        }}>
          <span style={{ color: C.yellow }}>SGN</span>OOGLE
        </h1>

        {!preview && (
          <div style={{
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            gap: 'clamp(5px, 0.8vh, 8px)',
          }}>
            <LiveBadge armed={armed} dimmed={idleMode}/>
            <div
              className="sgn-home-module-cycle"
              aria-label="VIDEO · OBJECTS · APPS · LINK · ABOUT"
              style={{
                marginTop: 'clamp(22px, 4vh, 44px)',
                opacity: armed ? (idleMode ? 0.18 : 0.52) : 0,
                transform: armed ? 'translateY(0)' : 'translateY(6px)',
                transition: 'opacity 600ms linear 760ms, transform 600ms cubic-bezier(0.2,0,0,1) 760ms',
              }}
            >
              {reduceModuleMotion ? (
                'VIDEO · OBJECTS · APPS · LINK · ABOUT'
              ) : (
                <>
                  <span className="sgn-home-module-cycle__label">MODULE</span>
                  <span className="sgn-home-module-cycle__sep">/</span>
                  <span className="sgn-home-module-cycle__word">
                    {typedModule}
                    {typedModule && <span className="sgn-home-module-cycle__cursor" aria-hidden="true">_</span>}
                  </span>
                </>
              )}
            </div>
          </div>
        )}

        {!preview && showSideHint && (
          <div aria-hidden style={{
            position: 'absolute',
            bottom: 'clamp(8px, 1.2vh, 14px)',
            left: '50%', transform: 'translateX(-50%)',
            display: 'inline-flex', alignItems: 'center', gap: 8,
            padding: 'clamp(4px, 0.6vh, 6px) 0',
            opacity: idleMode ? 0 : (armed ? 1 : 0),
            transition: 'opacity 700ms linear 500ms',
            whiteSpace: 'nowrap',
          }}>
            <span style={{
              fontSize: 10, color: C.grey,
              animation: 'sgnBlink 1.4s step-start infinite',
            }}>◀</span>
            <span style={{
              fontSize: 10, letterSpacing: '0.26em', fontWeight: 700, color: C.faint,
              fontFamily: 'IBM Plex Mono, monospace',
            }}>
              {lang === 'it' ? 'SCORRI LATERALMENTE' : 'SWIPE SIDEWAYS'}
            </span>
            <span style={{
              fontSize: 10, color: C.grey,
              animation: 'sgnBlink 1.4s step-start infinite', animationDelay: '0.7s',
            }}>▶</span>
          </div>
        )}

        {preview && (
          <ModulePreview id={focused} module={preview} lang={lang}/>
        )}
      </div>

      {idleMode && !preview && (
        <div aria-hidden style={{
          position: 'absolute', top: '50%', left: '50%',
          transform: 'translate(-50%, -50%) translateY(120px)',
          fontSize: 10, letterSpacing: '0.4em', color: C.faint, fontWeight: 600,
          zIndex: 3, pointerEvents: 'none',
          animation: 'sgnpulse 2.4s linear infinite',
        }}>{lang === 'it' ? '— IN ATTESA —' : '— STAND BY —'}</div>
      )}
    </div>
  );
}

/* ModulePreview — scheda densa "spec sheet" sull'hover.
   Sostituisce il vecchio Gran-Turismo-style (titolo 220px centrato).
   Layout: card a sinistra del display, header con §-tag + status,
   titolo medio + sub, riga con preview surface (thumbnail / icon /
   wireframe / avatar / mark) + meta in colonna, footer con hint
   "PREMI N PER ENTRARE". Tutti i moduli usano la stessa shell —
   cambia solo la surface e i meta. */
function ModulePreview({ id, module, lang }) {
  const [mounted, setMounted] = React.useState(false);
  React.useEffect(() => { const t = setTimeout(() => setMounted(true), 20); return () => clearTimeout(t); }, []);

  const meta = buildPreviewMeta(id, lang);

  return (
    <div style={{
      /* Pannello spec-sheet a due compartimenti: SCHEDA (identità + dati)
         | ANTEPRIMA (media grande). Riempie la larghezza del display —
         niente più mezzo schermo vuoto a destra. Grid 2 colonne divise da
         una hairline; ogni colonna gestisce il proprio overflow.
         Aspect-ratio fisso → il pannello ha la stessa forma e gli stessi
         margini su ogni schermo, centrato dal contenitore. maxHeight evita
         overflow su viewport bassi (allora restringe la larghezza). */
      width: '100%', maxWidth: 1140,
      aspectRatio: '1140 / 580', maxHeight: '100%',
      background: C.white,
      border: `0.5px solid ${C.border}`,
      boxSizing: 'border-box',
      position: 'relative',
      fontFamily: 'IBM Plex Mono, monospace',
      pointerEvents: 'none',
      opacity: mounted ? 1 : 0,
      transform: mounted ? 'translateY(0)' : 'translateY(10px)',
      transition: 'opacity 280ms linear, transform 320ms cubic-bezier(0.2,0,0,1)',
      display: 'grid',
      gridTemplateColumns: 'minmax(0, 0.82fr) minmax(0, 1.18fr)',
      overflow: 'hidden',
    }}>
      <PreviewCornerMarks/>

      {/* ───── COMPARTIMENTO A · SCHEDA (solo titolo + descrizione) ───── */}
      <div style={{
        display: 'flex', flexDirection: 'column', justifyContent: 'center',
        padding: 'clamp(16px, 1.8vw, 26px)',
        borderRight: `0.5px solid ${C.border}`,
        minWidth: 0, minHeight: 0, overflow: 'hidden',
      }}>
        {/* titolo grande — niente underscore terminale */}
        <h2 style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
          fontSize: 'clamp(30px, 3.6vw, 54px)',
          letterSpacing: '-0.04em', color: C.ink,
          lineHeight: 0.9, margin: '0 0 clamp(12px, 1.6vh, 18px)',
        }}>{module.label}</h2>
        <span style={{
          fontSize: 13, color: C.grey, letterSpacing: '0.01em', lineHeight: 1.6,
          textWrap: 'pretty',
        }}>{module.sub}</span>
      </div>

      {/* ───── COMPARTIMENTO B · ANTEPRIMA ─────
          Fondale vivo: l'elemento relativo al modulo riempie tutto il
          compartimento, zoomatissimo e sfocato (la bassa risoluzione non si
          nota) e scorre lentamente — niente più anteprima statica. Sopra,
          la didascalia (tag + titolo) su una velatura paper che ne tiene
          la leggibilità. Nessuna ombra: solo tono del fondo + hairline. */}
      <div style={{
        position: 'relative',
        background: C.paper,
        minWidth: 0, minHeight: 0, overflow: 'hidden',
      }}>
        {/* fondale in movimento */}
        <PreviewAmbient id={id}/>

        {/* velatura paper: scurisce appena in basso a sinistra per la
            didascalia, lascia respirare il resto. (tinta, non ombra) */}
        <div aria-hidden style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          background: `linear-gradient(105deg, rgba(240,241,242,0.86) 0%, rgba(240,241,242,0.5) 34%, rgba(240,241,242,0) 62%)`,
        }}/>
        {/* hairline interno per ancorare il fondale al telaio della scheda */}
        <div aria-hidden style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          border: `0.5px solid ${C.borderSoft}`,
        }}/>

        {/* didascalia sovrapposta — in basso a sinistra */}
        <div style={{
          position: 'absolute', left: 'clamp(16px, 1.8vw, 26px)',
          bottom: 'clamp(16px, 1.8vw, 26px)', right: 'clamp(16px, 1.8vw, 26px)',
          display: 'flex', flexDirection: 'column', gap: 6, zIndex: 2,
        }}>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
            <span style={{ width: 5, height: 12, background: C.yellow, flexShrink: 0 }}/>
            <span style={{
              fontSize: 9, fontWeight: 700, letterSpacing: '0.28em', color: C.grey,
            }}>{meta.head.tag}</span>
          </span>
          <span style={{
            fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
            fontSize: 'clamp(16px, 1.6vw, 24px)', color: C.ink,
            letterSpacing: '-0.02em', lineHeight: 1.0,
            overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
          }}>{meta.head.title}</span>
        </div>
      </div>
    </div>
  );
}

/* PreviewCornerMarks — 4 L-shapes in yellow alle angoli della card.
   Brand-canonical 1.5px stroke. */
function PreviewCornerMarks() {
  const armW = 10, armT = 1.5, off = -0.5;
  const common = {
    position: 'absolute', width: armW, height: armW,
    pointerEvents: 'none',
  };
  return (
    <>
      <span style={{ ...common, top: off, left: off,
        borderTop: `${armT}px solid ${C.yellow}`,
        borderLeft: `${armT}px solid ${C.yellow}` }}/>
      <span style={{ ...common, top: off, right: off,
        borderTop: `${armT}px solid ${C.yellow}`,
        borderRight: `${armT}px solid ${C.yellow}` }}/>
      <span style={{ ...common, bottom: off, left: off,
        borderBottom: `${armT}px solid ${C.yellow}`,
        borderLeft: `${armT}px solid ${C.yellow}` }}/>
      <span style={{ ...common, bottom: off, right: off,
        borderBottom: `${armT}px solid ${C.yellow}`,
        borderRight: `${armT}px solid ${C.yellow}` }}/>
    </>
  );
}

/* PreviewAmbient — fondale vivo che riempie il compartimento ANTEPRIMA.
   UNIFICATO (v3.8): ogni sezione parla la STESSA lingua della 04 — una
   griglia di "oggetti" hairline grigi che deriva in diagonale (sgnDrift,
   lineare, meccanico, niente blur). Via le foto sfocate (01/03) e i glyph
   organici (02/05): cambia solo il glifo del tile, non il trattamento, così
   tutte e cinque le anteprime appartengono alla stessa famiglia. La velatura
   paper + l'hairline interno li mette il chiamante; il nome reale del
   contenuto resta nella didascalia in basso a sinistra. */
function PreviewAmbient({ id }) {
  // tile() → fondale a piastrelle 132px che scorre in diagonale.
  // 132 è obbligatorio: sgnDrift trasla esattamente di -132px → loop perfetto.
  const tile = (inner, dur = 24) => {
    const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='132' height='132'>${inner}</svg>`;
    return (
      <div className="sgn-ambient" aria-hidden style={{
        position: 'absolute', inset: '-30%',
        backgroundImage: `url("data:image/svg+xml,${encodeURIComponent(svg)}")`,
        backgroundSize: '132px 132px', backgroundRepeat: 'repeat',
        opacity: 0.5,
        animation: `sgnDrift ${dur}s linear infinite`,
        willChange: 'transform',
      }}/>
    );
  };

  const G = 'rgb(120,122,124)';  // --grey, come il tratteggio della 04

  // 01 VIDEO → cornice 16:9 con triangolo play.
  if (id === '01') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1' stroke-linejoin='round'>` +
      `<rect x='26' y='40' width='80' height='52'/>` +
      `<path d='M58 54 L82 66 L58 78 Z'/>` +
      `</g>`, 26
    );
  }
  // 02 OBJECTS → esaedro isometrico "pieno" (stesso marchio della ModuleIcon
  //   e dell'STL Lab): SOLO le 3 facce frontali — niente diagonali che
  //   attraversano fino al retro (che facevano leggere il cubo come un
  //   esagono "a fette"). Spigoli dal centro ai 3 vertici vicini.
  if (id === '02') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1' stroke-linejoin='round' stroke-linecap='round'>` +
      `<polygon points='66,34 94,50 94,82 66,98 38,82 38,50'/>` +
      `<polyline points='38,50 66,66 94,50'/>` +
      `<line x1='66' y1='66' x2='66' y2='98'/>` +
      `</g>`, 30
    );
  }
  // 03 APPS → griglia app 2×2 (quadrati, niente raggio: brand radius 0).
  if (id === '03') {
    return tile(
      `<g fill='none' stroke='${G}' stroke-width='1'>` +
      `<rect x='34' y='34' width='28' height='28'/>` +
      `<rect x='70' y='34' width='28' height='28'/>` +
      `<rect x='34' y='70' width='28' height='28'/>` +
      `<rect x='70' y='70' width='28' height='28'/>` +
      `</g>`, 22
    );
  }
  // 05 ABOUT → monogramma Sgnaolin in contorno (i tre poligoni del logo).
  if (id === '05') {
    return tile(
      `<g transform='translate(26,26) scale(0.388)' fill='none' stroke='${G}' stroke-width='2.6' stroke-linejoin='round'>` +
      `<polygon points='51.44,100.64 154.75,100.64 0,201.44'/>` +
      `<polygon points='102.79,0 206.1,0 51.35,100.8'/>` +
      `<polygon points='84.44,0 33,100.8 8.4,100.8 59.83,0'/>` +
      `</g>`, 28
    );
  }
  // 04 LINK → slot tratteggiato (motivo "posti liberi") — il riferimento, invariato.
  return tile(
    `<rect x='26' y='26' width='80' height='80' fill='none' stroke='${G}' stroke-width='1' stroke-dasharray='4 5'/>`, 24
  );
}

/* buildPreviewMeta — tag + titolo dell'header della card preview di ogni
   modulo (l'unico dato consumato da ModulePreview). Live quando esiste,
   fallback se la sezione è vuota. */
function buildPreviewMeta(id, lang) {
  const isIt = lang === 'it';
  if (id === '01') {
    const v = (VIDEOS && VIDEOS[0]) || {};
    return { head: { tag: isIt ? 'ULTIMO VIDEO' : 'LATEST VIDEO', title: v.title || (isIt ? 'Nessun video' : 'No video') } };
  }
  if (id === '02') {
    const o = (OBJECTS && OBJECTS[0]) || {};
    return { head: { tag: isIt ? 'ULTIMO OGGETTO' : 'LATEST OBJECT', title: o.name || (isIt ? 'In arrivo' : 'Coming soon') } };
  }
  if (id === '03') {
    const a = (typeof APPS !== 'undefined' && APPS[0]) || {};
    return { head: { tag: isIt ? 'PIÙ SCARICATA' : 'TOP DOWNLOAD', title: a.name || (isIt ? 'In arrivo' : 'Coming soon') } };
  }
  if (id === '04') {
    const hasLinks = typeof LINKS !== 'undefined' && LINKS.length > 0;
    const f = hasLinks ? LINKS[0] : null;
    return { head: { tag: isIt ? 'STATO' : 'STATUS', title: hasLinks ? (f.name || '—') : (isIt ? 'Aperto a collaborazioni' : 'Open for collabs') } };
  }
  if (id === '05') {
    return { head: { tag: isIt ? 'PROFILO' : 'PROFILE', title: 'SGNOOGLE' } };
  }
  return { head: { tag: '', title: '' } };
}

/* ─────────────────────────── ModuleTab (desktop, accordion) ───────────────────────────
   Inactive (no current): 1fr, opacity 60%, only number visible.
   Active: 2.5fr, opacity 100%, number + icon + label visible.
   Focused (hovered, not active): width unchanged, yellow arrow appears.

   Ripple "armed": mousedown → outline appears on the tab. mouseup on the
   same tab triggers select() + a yellow sonar ripple at the release point.
   If the pointer leaves before mouseup, armed clears and no ripple fires. */
function ModuleTab({ id, label, sub, active, focused, anyActive, hotkey, onClick, onHover, onLeave }) {
  const [armed, setArmed] = React.useState(false);
  const tabRef = React.useRef(null);
  // Track 'expanded' separately so the icon/label transitions stay visible
  // while the column animates from 1fr → 2.5fr.
  const expanded = active;
  // Inactive tabs dim only when SOMETHING is active (per spec).
  const dim = anyActive && !active;

  const spawnRipple = React.useCallback((x, y) => {
    const layer = document.body;
    const ring = document.createElement('span');
    ring.className = 'sgn-ripple-ring';
    ring.style.position = 'fixed';
    ring.style.left = x + 'px';
    ring.style.top  = y + 'px';
    ring.style.zIndex = 99999;
    ring.style.pointerEvents = 'none';
    layer.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove(), { once: true });
  }, []);

  const onDown = (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    setArmed(true);
  };
  const onUp = (e) => {
    if (!armed) return;
    setArmed(false);
    // Solo mouse: niente sonar al tap su touch/pen (ridondante su mobile).
    // La selezione (onClick) scatta comunque.
    if (!e.pointerType || e.pointerType === 'mouse') spawnRipple(e.clientX, e.clientY);
    onClick && onClick();
  };
  const onCancel = () => { setArmed(false); };

  return (
    <button
      ref={tabRef}
      data-armed-ripple
      data-tab-id={id}
      onMouseEnter={onHover}
      onMouseLeave={() => { onLeave?.(); setArmed(false); }}
      onPointerDown={onDown}
      onPointerUp={onUp}
      onPointerCancel={onCancel}
      onBlur={onCancel}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onClick && onClick(); } }}
      aria-current={active ? 'true' : undefined}
      aria-label={label + (sub ? ' — ' + sub : '')}
      style={{
        position: 'relative',
        background: expanded ? C.white : C.paper,
        // Bordo intero su tutti e 4 i lati — così la tab è una card
        // indipendente che fluttua sul paper, non un segmento di un blocco.
        // Il giallo vive SOLO nel top-rail (vedi span sotto): i lati restano
        // hairline neutri anche da attiva.
        border: `0.5px solid ${expanded ? C.border : C.borderSoft}`,
        outline: armed ? `1px solid ${C.yellow}` : 'none',
        outlineOffset: '-1px',
        padding: 'clamp(14px, 2vh, 22px) clamp(14px, 1.6vw, 22px)',
        textAlign: 'left',
        cursor: 'pointer',
        fontFamily: 'IBM Plex Mono, monospace',
        opacity: dim ? 0.6 : 1,
        transition: 'background 200ms linear, border-color 200ms linear, opacity 220ms linear, outline-color 80ms linear',
        display: 'flex', flexDirection: 'column', justifyContent: 'flex-end',
        gap: 10,
        minHeight: 'clamp(140px, 22vh, 200px)',
        overflow: 'hidden',
      }}
      className="sgn-tab"
    >
      {/* Module icon — top-left, sempre visibile, dà identità a ogni tab */}
      <span style={{
        position: 'absolute', top: 10, left: 12, zIndex: 2,
        lineHeight: 0, pointerEvents: 'none',
        transition: 'opacity 200ms linear',
      }}>
        <ModuleIcon
          id={id}
          size={20}
          color={expanded ? C.ink : C.grey}
          strokeWidth={expanded ? 1.4 : 1.1}
        />
      </span>

      {/* MarathonArrow — top-right. Affordance di stato:
          · hover (focused) → punta ↗ (NE): "apri questa sezione"
          · attiva (expanded) → ruota a ↓: chevron "aperta", come un accordion.
          La rotazione di stato vive su un wrapper interno per non entrare in
          conflitto col translate d'ingresso dello span esterno. */}
      <span style={{
        position: 'absolute', top: 9, right: 9, zIndex: 2,
        lineHeight: 0,
        opacity: (expanded || focused) ? 1 : 0,
        transform: (expanded || focused) ? 'translate(0, 0)' : 'translate(4px, -4px)',
        transition: 'opacity 180ms linear, transform 220ms cubic-bezier(0.2,0,0,1)',
        pointerEvents: 'none',
      }}>
        <span style={{
          display: 'inline-block', lineHeight: 0,
          transform: expanded ? 'rotate(135deg)' : 'rotate(0deg)',
          transition: 'transform 360ms cubic-bezier(0.34,1.4,0.5,1)',
        }}>
          <MarathonArrow size={20} dir="up-right" color={expanded ? C.ink : C.yellow}/>
        </span>
      </span>

      {/* Yellow top rail sull'active tab */}
      <span style={{
        position: 'absolute', top: -0.5, left: -0.5, right: -0.5,
        height: 2, background: C.yellow,
        transform: expanded ? 'scaleX(1)' : 'scaleX(0)',
        transformOrigin: 'left',
        transition: 'transform 320ms cubic-bezier(0.2,0,0,1)',
      }}/>

      {/* BOTTOM: numero + etichetta SEMPRE visibile (wayfinding anche a
          riposo). Tre stati, animati:
          · RIPOSO (niente di aperto)  → numero grande, etichetta SOTTO, grigia.
          · COLLASSATA (un'altra aperta) → numero rimpicciolito, etichetta SOTTO:
            così la colonna stretta NON tronca mai il nome (zero "puntini").
          · APERTA (questa attiva)     → numero grande, etichetta AFFIANCATA che
            cresce di corpo+colore e rivela il sottotitolo, sfruttando la
            larghezza extra dell'accordion.
          Tra riposo e collassata cambia solo il CORPO del numero → niente
          riflow di direzione, transizione fluida; solo l'apertura ruota in riga. */}
      <div style={{
        display: 'flex',
        flexDirection: expanded ? 'row' : 'column',
        alignItems: expanded ? 'flex-end' : 'flex-start',
        gap: expanded ? 16 : 'clamp(2px, 0.5vh, 6px)', minHeight: 0,
        transition: 'gap 320ms cubic-bezier(0.2,0,0,1)',
      }}>
        <span style={{
          fontFamily: 'Neue Machina, IBM Plex Mono, monospace', fontWeight: 700,
          // Collassata → numero più piccolo (lascia aria all'etichetta sotto);
          // riposo/aperta → numero pieno.
          fontSize: dim ? 'clamp(30px, 4.6vh, 52px)' : 'clamp(48px, 8vh, 88px)',
          color: C.ink, letterSpacing: '-0.05em', lineHeight: 0.85,
          flexShrink: 0,
          transition: 'font-size 340ms cubic-bezier(0.2,0,0,1)',
        }}>{id}</span>

        {/* Blocco etichetta: label (scala rest→active) + sub (solo da aperta) */}
        <div style={{
          flex: expanded ? 1 : 'none', minWidth: 0, maxWidth: '100%',
          display: 'flex', flexDirection: 'column',
          justifyContent: 'flex-end',
          gap: expanded ? 4 : 0,
          paddingBottom: expanded ? 'clamp(3px, 0.6vh, 9px)' : 0,
          overflow: 'hidden',
        }}>
          <span style={{
            fontWeight: 700, letterSpacing: '0.18em',
            color: expanded ? C.ink : C.grey,
            whiteSpace: 'nowrap', overflow: 'hidden',
            textOverflow: expanded ? 'ellipsis' : 'clip',
            fontSize: expanded ? 'clamp(15px, 1.5vw, 22px)' : 'clamp(9px, 0.95vw, 11px)',
            transition: 'font-size 340ms cubic-bezier(0.2,0,0,1), color 220ms linear',
          }}>{label}</span>
          {sub && (
            <span style={{
              fontSize: 11, fontWeight: 500, color: C.grey,
              letterSpacing: '0.02em', whiteSpace: 'nowrap',
              overflow: 'hidden', textOverflow: 'ellipsis',
              maxHeight: expanded ? 18 : 0,
              opacity: expanded ? 1 : 0,
              transition: 'max-height 320ms cubic-bezier(0.2,0,0,1), opacity 220ms linear 60ms',
            }}>{sub}</span>
          )}
        </div>
      </div>
    </button>
  );
}

/* ModuleStrip — accordion 1fr / 2.5fr, tab fluttuanti scollegati.
   Niente outer border o background-divider: ogni tab è una card
   indipendente, separata dalle altre da un gap visibile su paper. */
function ModuleStrip({ current, focused, setFocused, lang, onSelect, mobile, sound }) {
  const L = I18N[lang];
  const ids = ['01','02','03','04','05'];
  const [activeFr, setActiveFr] = React.useState(2.5);

  React.useEffect(() => {
    function update() {
      setActiveFr(window.innerWidth < 1100 ? 2 : 2.5);
    }
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  if (mobile) {
    return <GameBoyStrip ids={ids} L={L} current={current} onSelect={onSelect} sound={sound}/>;
  }

  const cols = ids.map(id => id === current ? `${activeFr}fr` : '1fr').join(' ');

  /* Container-level mouse-leave: il preview si svuota SOLO quando il cursore
     lascia l'intera strip (cioè risale nel display centrale o esce di lato).
     Tra una tab e l'altra il focus si sostituisce ma non passa mai per null,
     quindi il display non flashava più sulla home SGNOOGLE durante lo sweep. */
  return (
    <div
      className="sgn-strip"
      onMouseLeave={() => setFocused?.(null)}
      style={{
        display: 'grid',
        gridTemplateColumns: cols,
        gap: 'clamp(8px, 1.2vw, 16px)',
        background: 'transparent',
        transition: 'grid-template-columns 320ms cubic-bezier(0.2,0,0,1)',
      }}>
      {ids.map((id, i) => (
        <ModuleTab
          key={id}
          id={id}
          label={L.modules[id].label}
          sub={L.modules[id].sub}
          hotkey={String(i + 1)}
          active={current === id}
          focused={focused === id}
          anyActive={!!current}
          onClick={() => onSelect(id)}
          onHover={() => { setFocused?.(id); sound && sound('hover'); }}
          /* onLeave intenzionalmente NO-OP: il container gestisce il clear. */
          onLeave={() => {}}
        />
      ))}
    </div>
  );
}

/* ─────────────────────────── GameBoyStrip (mobile) ───────────────────────────
   Five distinct chunky buttons, icone custom, no scroll.
   Active: --yellow background. Inactive: --paper + 0.5px border.
   3px bottom border simulates the raised key. On press the button slides
   down 2px and the bottom border collapses to 1px — no box-shadow used. */
function GameBoyStrip({ ids, L, current, onSelect, sound }) {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: 'repeat(5, 1fr)',
      gap: 8,
      background: 'transparent',
      padding: 0,
    }}>
      {ids.map((id, i) => (
        <GameBoyKey
          key={id}
          id={id}
          n={i + 1}
          label={L.modules[id].label}
          active={current === id}
          onPress={() => onSelect(id)}
        />
      ))}
    </div>
  );
}

function GameBoyKey({ id, n, label, active, onPress }) {
  const [pressed, setPressed] = React.useState(false);

  return (
    <button
      aria-label={label}
      aria-current={active ? 'true' : undefined}
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onPress?.(); }}
      onPointerLeave={() => setPressed(false)}
      onPointerCancel={() => setPressed(false)}
      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onPress?.(); } }}
      style={{
        position: 'relative',
        // Stessa lingua del desktop: la tab attiva diventa BIANCA, le inattive
        // restano paper. Stacco affidato a hairline + tono del fondo, mai ombre.
        background: active ? C.white : C.paper,
        color: C.ink,
        border: `0.5px solid ${active ? C.border : C.borderSoft}`,
        padding: '11px 6px 10px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
        cursor: 'pointer',
        fontFamily: 'IBM Plex Mono, monospace',
        // Press feedback minimale: micro-scala, niente bordo-rialzo né shadow.
        transform: pressed ? 'scale(0.96)' : 'scale(1)',
        transition: 'transform 90ms cubic-bezier(0.2,0,0,1), background 160ms linear, border-color 160ms linear',
        minHeight: 62,
      }}>
      {/* Tab attiva → la "linguetta" bianca raccorda la key alla view: colma
         il gap stage↔strip (= --frame-gap) così key + linguetta + view sono una
         forma continua. Sempre montata: morpha in altezza (scaleY dal basso).
         È in DUE parti per evitare che i bordi grigi sconfinino oltre la
         cornice della view (il "saltino"):
         · riempimento bianco — sconfina 1px DENTRO la view per cancellarne la
           hairline inferiore localmente (merge senza cuciture); nessun bordo;
         · bordi laterali — si fermano ESATTAMENTE alla cornice della view
           (height = gap+1, dove l'1px è solo la sovrapposizione sulla key in
           basso), quindi NON spuntano sopra il bordo della view. */}
      <span aria-hidden="true" style={{
        position: 'absolute', bottom: 'calc(100% - 1px)',
        left: -0.5, right: -0.5,
        height: 'calc(var(--frame-gap, 16px) + 2px)',
        // Stesso fondo (e fade 160ms) del tasto: i due viaggiano insieme da
        // paper a white mentre la linguetta cresce.
        background: active ? C.white : C.paper,
        boxSizing: 'border-box', pointerEvents: 'none',
        transformOrigin: 'bottom',
        transform: active ? 'scaleY(1)' : 'scaleY(0)',
        transition: 'transform 340ms cubic-bezier(0.2,0,0,1), background 160ms linear',
      }}/>
      <span aria-hidden="true" style={{
        position: 'absolute', bottom: 'calc(100% - 1px)',
        left: -0.5, right: -0.5,
        height: 'calc(var(--frame-gap, 16px) + 1px)',
        borderLeft: `0.5px solid ${C.border}`,
        borderRight: `0.5px solid ${C.border}`,
        background: 'transparent',
        boxSizing: 'border-box', pointerEvents: 'none',
        transformOrigin: 'bottom',
        transform: active ? 'scaleY(1)' : 'scaleY(0)',
        transition: 'transform 340ms cubic-bezier(0.2,0,0,1)',
      }}/>
      <ModuleIcon id={id} size={22} color={active ? C.ink : C.grey} strokeWidth={1.4}/>
      {/* Label del modulo al posto del vecchio numero hotkey (inutile su touch).
          10px: sopra la soglia comoda di lettura su telefono (era 8px). */}
      <span style={{
        fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
        color: active ? C.ink : C.grey,
        transition: 'color 160ms linear',
      }}>{label}</span>
    </button>
  );
}

Object.assign(window, { TopBar, IdleDisplay, ModuleTab, ModuleStrip,
                         LiveBadge, CornerChangelog, ModulePreview, GameBoyStrip, GameBoyKey });

</script>

function TapToStart({ lang = 'it', onStart, sound }) {

<script type="text/babel">
/* BootScreen — boot mechanico, tacche che si riempiono in giallo da
   sinistra a destra. Stagger 30ms per segmento (~720ms a piena fila su
   24 segmenti), beat finale di ~280ms prima dello sweep di uscita.
   Total ≈ 1500ms. Tap/click per saltare. */

function BootScreen({ lang = 'it', onDone, sound }) {
  const SEGMENTS = 24;
  const STAGGER = 30;       // ms tra un segmento e il successivo
  const FILL_END = SEGMENTS * STAGGER;  // = 720ms — quando l'ultima tacca scatta
  const TOTAL = 1500;
  const [filled, setFilled] = React.useState(0);
  const [phase, setPhase] = React.useState('loading');
  const skipRef = React.useRef(false);
  const soundRef = React.useRef(sound);
  soundRef.current = sound;
  const onDoneRef = React.useRef(onDone);
  onDoneRef.current = onDone;

  /* Micro-status — riga di stato mostrata sotto la barra, cambia in 4 step.
     Niente bla-bla di marketing: messaggi da manuale tecnico. */
  const STATUS = React.useMemo(() => lang === 'en' ? [
    'KERNEL · MOUNT /paper',
    'MODULES · INDEX 01..05',
    'FONTS · NEUE-MACHINA · PLEX-MONO',
    'READY · AWAITING SIGNAL',
  ] : [
    'KERNEL · MOUNT /paper',
    'MODULI · INDEX 01..05',
    'FONT · NEUE-MACHINA · PLEX-MONO',
    'READY · IN ATTESA DEL SEGNALE',
  ], [lang]);
  const stepIndex = Math.min(STATUS.length - 1, Math.floor((filled / SEGMENTS) * STATUS.length));
  const statusLine = STATUS[stepIndex];

  React.useEffect(() => {
    let cancelled = false;
    const start = performance.now();
    const timers = [];

    // Schedule one ticker per segment, equally spaced. Mechanical contatore feel.
    for (let i = 0; i < SEGMENTS; i++) {
      const t = setTimeout(() => {
        if (cancelled || skipRef.current) return;
        setFilled(i + 1);
        if (soundRef.current) soundRef.current('boot');
      }, i * STAGGER);
      timers.push(t);
    }

    // After the full fill, hold for a beat, then leave.
    const leave = setTimeout(() => {
      if (cancelled || skipRef.current) return;
      if (soundRef.current) soundRef.current('bootReady');
      setPhase('leaving');
      setTimeout(() => { if (!cancelled) onDoneRef.current?.(); }, 320);
    }, TOTAL - 320);
    timers.push(leave);

    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, []);

  const skip = React.useCallback(() => {
    if (skipRef.current) return;
    skipRef.current = true;
    setFilled(SEGMENTS);
    setPhase('leaving');
    if (soundRef.current) soundRef.current('confirm');
    setTimeout(() => onDoneRef.current?.(), 200);
  }, []);

  return (
    <div
      className="sgn-hot"
      onClick={skip}
      style={{
        position: 'fixed', inset: 0, zIndex: 100000,
        background: C.paper,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        gap: 'clamp(28px, 8vh, 56px)',
        padding: 'clamp(20px, 5vw, 60px)',
        fontFamily: 'IBM Plex Mono, monospace',
        opacity: phase === 'leaving' ? 0 : 1,
        transition: 'opacity 280ms cubic-bezier(0.4,0,0.2,1)',
        cursor: 'pointer',
        boxSizing: 'border-box', overflow: 'hidden',
      }}>
      <div style={{
        width: '100%', maxWidth: 440, boxSizing: 'border-box',
        display: 'flex', flexDirection: 'column', gap: 20,
        alignItems: 'center', textAlign: 'center',
      }}>
        {/* F-mark, giallo, fade-in coordinato con la prima tacca */}
        <span style={{
          width: 30, height: 30, display: 'block',
          opacity: Math.min(1, (filled / 4)),
          transition: 'opacity 120ms cubic-bezier(0.4,0,0.2,1)',
        }}>
          <svg viewBox="0 0 206.1 201.44" style={{ width: '100%', height: '100%', display: 'block' }}>
            <g fill={C.yellow}>
              <polygon points="51.44 100.64 154.75 100.64 0 201.44"/>
              <polygon points="102.79 0 206.1 0 51.35 100.8"/>
              <polygon points="84.44 0 33 100.8 8.4 100.8 59.83 0"/>
            </g>
          </svg>
        </span>

        {/* product name */}
        <span style={{
          fontSize: 11, letterSpacing: '0.32em', color: C.ink, fontWeight: 700,
        }}>{BRAND.product}</span>

        {/* segmented bar — tacche SEPARATE in sequenza (vedi nota in TapToStart
            sul bordo a 1px), riempimento giallo a contatore meccanico. */}
        <div style={{ display: 'flex', gap: 2, width: '100%', boxSizing: 'border-box' }}>
          {Array.from({ length: SEGMENTS }, (_, i) => {
            const on = i < filled;
            return (
              <div key={i} style={{
                flex: 1, minWidth: 0, height: 9,
                background: on ? C.yellow : 'transparent',
                border: `1px solid ${on ? C.yellow : C.border}`,
                boxSizing: 'border-box',
                transition: 'background 80ms cubic-bezier(0.4,0,0.2,1), border-color 80ms cubic-bezier(0.4,0,0.2,1)',
              }}/>
            );
          })}
        </div>

        {/* progress numerico, piccolo, sotto la barra */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', width: '100%', boxSizing: 'border-box',
          fontSize: 9, letterSpacing: '0.22em', color: C.faint, fontWeight: 600,
        }}>
          <span>BOOT · {BRAND.version}</span>
          <span style={{ color: C.ink, fontWeight: 700 }}>
            {String(Math.round((filled / SEGMENTS) * 100)).padStart(3, '0')}%
          </span>
        </div>

      </div>

      {/* Footer: stesso ingombro del bottone START di TapToStart (stessa
          larghezza/padding, bordo trasparente) → il cluster qui sopra è
          centrato in modo IDENTICO nelle due schermate, così la barra NON si
          sposta quando parte il boot. Mostra la micro-status al posto del bottone. */}
      <div style={{
        width: '100%', maxWidth: 440, boxSizing: 'border-box',
        display: 'flex', alignItems: 'center', gap: 8,
        border: '0.5px solid transparent',
        padding: 'clamp(12px, 2vh, 18px) clamp(12px, 3vw, 20px)',
        fontFamily: 'IBM Plex Mono, monospace',
        fontSize: 10, fontWeight: 600, letterSpacing: '0.16em',
        color: C.grey, fontVariantNumeric: 'tabular-nums',
      }}>
        <span style={{
          display: 'inline-block', width: 6, height: 6,
          background: C.yellow,
          animation: 'sgnpulse 1.2s linear infinite',
          flexShrink: 0,
        }}/>
        <span style={{
          color: C.ink, fontWeight: 700, letterSpacing: '0.18em',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
        }}>{statusLine}</span>
      </div>
    </div>
  );
}

</script>

<script type="text/babel">
/* LangPopover — compact locale switcher anchored under the topbar LANG button.
   Replaces the old fullscreen modal: a small hairline dropdown (IT / EN) that
   expands next to the trigger. No backdrop takeover, no yellow sweep — those
   were abandoned. Current locale gets an isolated yellow tick; hover/keyboard
   focus arms a row with an ink left-rail (giallo e ink non si toccano mai).
   Keyboard: ↑/↓ (or ←/→) move, ↵ confirm, Esc close; click-outside closes. */

function LangPopover({ lang, onPick, onClose, sound }) {
  const ref = React.useRef(null);
  const [hover, setHover] = React.useState(lang);

  React.useEffect(() => {
    function onDown(e) {
      if (ref.current && !ref.current.contains(e.target) &&
          !(e.target.closest && e.target.closest('.sgn-langbtn'))) onClose && onClose();
    }
    function onKey(e) {
      if (e.key === 'Escape') { e.preventDefault(); onClose && onClose(); }
      else if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  { e.preventDefault(); setHover('it'); sound && sound('tick'); }
      else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); setHover('en'); sound && sound('tick'); }
      else if (e.key === 'Enter')    { e.preventDefault(); onPick && onPick(hover); }
    }
    document.addEventListener('mousedown', onDown);
    window.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDown); window.removeEventListener('keydown', onKey); };
  }, [hover, onPick, onClose, sound]);

  const rows = [
    { v: 'it', code: 'IT', name: 'Italiano' },
    { v: 'en', code: 'EN', name: 'English'  },
  ];

  return (
    <div ref={ref} className="sgn-lang-popover" role="menu" aria-label="Locale" style={{
      position: 'absolute', top: 'calc(100% + 6px)', right: 0, zIndex: 9000,
      width: 214, background: C.white, border: `0.5px solid ${C.ink}`,
      fontFamily: 'IBM Plex Mono, monospace',
    }}>
      {/* header strip */}
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '7px 11px', borderBottom: `0.5px solid ${C.borderSoft}`,
      }}>
        <span style={{ fontSize: 8, letterSpacing: '0.28em', color: C.grey, fontWeight: 700 }}>LOCALE</span>
        <span style={{ fontSize: 8, letterSpacing: '0.2em', color: C.faint, fontWeight: 600 }}>SGN·OS</span>
      </div>

      {/* rows */}
      {rows.map((r, i) => {
        const current = lang === r.v;
        const active  = hover === r.v;
        return (
          <button
            key={r.v}
            role="menuitemradio"
            className="sgn-lang-popover__row"
            aria-checked={current}
            onMouseEnter={() => { if (hover !== r.v) sound && sound('tick'); setHover(r.v); }}
            onClick={() => onPick && onPick(r.v)}
            style={{
              position: 'relative', width: '100%',
              display: 'flex', alignItems: 'center', gap: 11,
              padding: '12px 13px', cursor: 'pointer',
              background: active ? C.paper : 'transparent',
              border: 'none', borderTop: i ? `0.5px solid ${C.borderSoft}` : 'none',
              fontFamily: 'inherit', textAlign: 'left', color: C.ink,
              transition: 'background 120ms linear',
            }}>
            {/* ink arm-rail — appears on hover/keyboard focus */}
            <span aria-hidden style={{
              position: 'absolute', left: 0, top: 0, bottom: 0, width: 2.5,
              background: C.ink,
              transform: active ? 'scaleY(1)' : 'scaleY(0)', transformOrigin: 'center',
              transition: 'transform 150ms cubic-bezier(0.2,0,0,1)',
            }}/>
            <span style={{ fontWeight: 700, fontSize: 14, letterSpacing: '0.04em', minWidth: 22 }}>{r.code}</span>
            <span style={{ flex: 1, fontSize: 11, letterSpacing: '0.02em',
              color: active ? C.ink : C.grey, transition: 'color 120ms linear' }}>{r.name}</span>
            {current ? (
              <span aria-hidden title="current" style={{ width: 6, height: 6, background: C.ink, flexShrink: 0 }}/>
            ) : (
              <span aria-hidden style={{ fontSize: 9, letterSpacing: '0.14em', fontWeight: 700,
                color: C.faint, opacity: active ? 1 : 0, transition: 'opacity 120ms linear' }}>SET ▸</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

Object.assign(window, { LangPopover });

</script>

<script type="text/babel">
/* Crosshair cursor — desktop only.
   Only mounts when (hover: hover) AND (pointer: fine) — never on touch / mobile.
   Hairline geometric sight: quiet cross at rest, sharp corner/tick marks on
   hover. No heavy ring; the target state stays delicate and technical. */

function Cursor({ enabled = true, sound }) {
  const [pos, setPos] = React.useState({ x: -100, y: -100 });
  const [hot, setHot] = React.useState(false);
  const [pressed, setPressed] = React.useState(false);
  const [visible, setVisible] = React.useState(true);
  const [supported, setSupported] = React.useState(() => {
    if (typeof window === 'undefined') return false;
    try {
      return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    } catch (e) { return false; }
  });

  // re-check support when the input mode changes (e.g. user plugs in mouse)
  React.useEffect(() => {
    const mq = window.matchMedia('(hover: hover) and (pointer: fine)');
    const onChange = () => setSupported(mq.matches);
    if (mq.addEventListener) mq.addEventListener('change', onChange);
    else mq.addListener(onChange);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', onChange);
      else mq.removeListener(onChange);
    };
  }, []);

  const active = enabled && supported;

  React.useEffect(() => {
    if (!active) {
      // make sure native cursor returns when disabled
      document.body.style.cursor = '';
      const old = document.getElementById('sgn-cursor-hide');
      if (old) old.remove();
      return;
    }

    function onMove(e) {
      setPos({ x: e.clientX, y: e.clientY });
      const t = e.target;
      const interactive = t && t.closest && t.closest('button, a, [role="button"], input, select, textarea, .sgn-tab, .sgn-hot');
      setHot(!!interactive);
    }
    function onDown(e) {
      setPressed(true);
      if (sound) {
        // Only tick on interactive press; tick anywhere else is too noisy.
        const t = e.target;
        if (t && t.closest && t.closest('button, a, [role="button"], .sgn-tab, .sgn-hot')) {
          sound('tick');
        }
      }
    }
    function onUp() { setPressed(false); }
    function onLeave() { setVisible(false); }
    function onEnter() { setVisible(true); }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup',   onUp);
    document.documentElement.addEventListener('mouseleave', onLeave);
    document.documentElement.addEventListener('mouseenter', onEnter);

    document.body.style.cursor = 'none';
    let styleEl = document.getElementById('sgn-cursor-hide');
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'sgn-cursor-hide';
      styleEl.textContent = `
        @media (hover: hover) and (pointer: fine) {
          body, body * { cursor: none !important; }
        }
      `;
      document.head.appendChild(styleEl);
    }

    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup',   onUp);
      document.documentElement.removeEventListener('mouseleave', onLeave);
      document.documentElement.removeEventListener('mouseenter', onEnter);
      document.body.style.cursor = '';
      styleEl && styleEl.remove();
    };
  }, [active, sound]);

  if (!active || !visible) return null;

  const size = hot ? 26 : 18;
  const stroke = hot ? 1.15 : 0.95;
  const opacity = pressed ? 0.62 : 1;

  return (
    <div
      aria-hidden
      style={{
        position: 'fixed',
        top: 0, left: 0,
        transform: `translate(${pos.x - size / 2}px, ${pos.y - size / 2}px) scale(${pressed ? 0.82 : 1})`,
        width: size, height: size,
        pointerEvents: 'none',
        zIndex: 100002,
        transition: 'width 140ms cubic-bezier(0.2,0,0,1), height 140ms cubic-bezier(0.2,0,0,1), opacity 80ms linear',
        opacity,
        willChange: 'transform',
      }}
      className="sgn-cursor"
    >
      {hot ? (
        <svg viewBox="0 0 26 26" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
          <g stroke="#FFC200" strokeWidth={stroke} fill="none" strokeLinecap="square" strokeLinejoin="miter">
            {/* corner blades — geometric target, no heavy ring */}
            <path d="M 2 7 L 2 2 L 7 2"/>
            <path d="M 19 2 L 24 2 L 24 7"/>
            <path d="M 24 19 L 24 24 L 19 24"/>
            <path d="M 7 24 L 2 24 L 2 19"/>
            {/* micro alignment ticks */}
            <path d="M 13 4.5 L 13 7.2 M 13 18.8 L 13 21.5 M 4.5 13 L 7.2 13 M 18.8 13 L 21.5 13" opacity="0.72"/>
            <path d="M 11.4 13 L 13 11.4 L 14.6 13 L 13 14.6 Z" opacity="0.9"/>
          </g>
        </svg>
      ) : (
        <svg viewBox="0 0 18 18" style={{ width: '100%', height: '100%', overflow: 'visible' }}>
          <g stroke="#FFC200" strokeWidth={stroke} fill="none" strokeLinecap="square">
            <line x1="9" y1="1.5" x2="9" y2="6"/>
            <line x1="9" y1="12" x2="9" y2="16.5"/>
            <line x1="1.5" y1="9" x2="6" y2="9"/>
            <line x1="12" y1="9" x2="16.5" y2="9"/>
            <path d="M 8.2 9 L 9 8.2 L 9.8 9 L 9 9.8 Z" opacity="0.86"/>
          </g>
        </svg>
      )}
    </div>
  );
}

Object.assign(window, { Cursor });

</script>

<script type="text/babel">
/* ClickRipple — global yellow sonar ring on every click.
   Mounts a single layer over the whole viewport; spawns a short-lived
   ring at the cursor position on every primary click, animates outward,
   then removes itself. No state per ripple — DOM elements are the source
   of truth, garbage-collected by their own animationend listener. */

function ClickRipple({ enabled = true }) {
  const layerRef = React.useRef(null);

  React.useEffect(() => {
    if (!enabled) return undefined;

    function onDown(e) {
      // Only primary-button clicks — secondary/middle aren't a "select".
      if (e.button !== 0) return;
      // Solo mouse: su touch (e pen) il sonar a ogni tap è ridondante —
      // sul mobile il feedback c'è già (card selezionata, pulsante pieno).
      // pointerType distingue l'input anche sui dispositivi ibridi.
      if (e.pointerType && e.pointerType !== 'mouse') return;
      // Suppress on form inputs so the ripple doesn't fight focus rings.
      const t = e.target;
      if (t && t.closest && t.closest('input, textarea, select')) return;
      // Module tabs handle their own armed→ripple cycle on mouseup.
      // Skip them here so the global ripple doesn't double-fire.
      if (t && t.closest && t.closest('[data-armed-ripple]')) return;

      const layer = layerRef.current;
      if (!layer) return;

      const ring = document.createElement('span');
      ring.className = 'sgn-ripple-ring';
      // Position at click point; the ring is centred via translate(-50%, -50%).
      ring.style.left = e.clientX + 'px';
      ring.style.top  = e.clientY + 'px';
      layer.appendChild(ring);
      ring.addEventListener('animationend', () => ring.remove(), { once: true });
    }

    window.addEventListener('pointerdown', onDown);
    return () => window.removeEventListener('pointerdown', onDown);
  }, [enabled]);

  if (!enabled) return null;
  return (
    <div ref={layerRef} aria-hidden style={{
      position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 99998,
      overflow: 'hidden',
    }}/>
  );
}

Object.assign(window, { ClickRipple });

</script>

    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}

    0 2px 6px rgba(0,0,0,.15)}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

  .twk-chip>span>i:first-child{box-shadow:none}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
