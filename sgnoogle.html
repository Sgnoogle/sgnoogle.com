// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "language": "it",
  "sound": true,
  "crosshair": true,
  "ripple": true
}/*EDITMODE-END*/;

const MODULES = {
  '01': VideoModule,
  '02': ObjectsModule,
  '03': AppsModule,
  '04': LinkModule,
  '05': SelfModule,
};

function useIsMobile(breakpoint = 760) {
  const [m, setM] = useState(() => typeof window !== 'undefined' && window.innerWidth < breakpoint);
  useEffect(() => {
    function update() { setM(window.innerWidth < breakpoint); }
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [breakpoint]);
  return m;
}

/* Compute slide direction between two module ids.
   - +1 forward (number going up, e.g. 02 → 04, or home → any)
   - -1 backward (number going down, or any → home)
   -  0 same / first mount
*/
function computeDirection(prev, next) {
  if (!prev && !next) return 0;
  if (!prev && next)  return +1;   // home → section, entra da destra
  if (prev && !next)  return -1;   // section → home, esce verso destra
  const a = parseInt(prev, 10);
  const b = parseInt(next, 10);
  if (a === b) return 0;
  return b > a ? +1 : -1;
}

/* ── URL hash sync ─────────────────────────────────────────────
   `#01`..`#05` → modulo aperto. `#03-2` → modulo 03, pagina 2 (1-indexed
   nell'URL, 0-indexed internamente). Vuoto / `#00` / altro → home.
   parseHash() ritorna { mod, page }. writeHash() usa replaceState così non
   riempie la cronologia indietro. */
const VALID_HASH = /^#(0[1-5])(?:-([1-9][0-9]?))?$/;
function parseHash() {
  if (typeof window === 'undefined') return { mod: null, page: null };
  const m = (window.location.hash || '').match(VALID_HASH);
  if (!m) return { mod: null, page: null };
  return { mod: m[1], page: m[2] ? (parseInt(m[2], 10) - 1) : null };
}
function writeHash(mod, pageIdx) {
  if (typeof window === 'undefined') return;
  let frag = '';
  if (mod) frag = (pageIdx && pageIdx > 0) ? `#${mod}-${pageIdx + 1}` : `#${mod}`;
  if ((window.location.hash || '') === frag) return;
  const url = window.location.pathname + window.location.search + frag;
  try { window.history.replaceState(null, '', url); } catch (e) {}
}

/* ── Command palette ───────────────────────────────────────────
   Triggered da `/`. Filtra azioni (apri moduli, home, lang, sound,
   replay boot). ↑↓ per navigare, Enter per eseguire, Esc per chiudere.
   La lista è statica + dipendente dallo stato (label dinamiche). */
function CommandPalette({ open, onClose, lang, current, sound, actions }) {
  const [q, setQ] = React.useState('');
  const [idx, setIdx] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) {
      setQ('');
      setIdx(0);
      setTimeout(() => inputRef.current?.focus(), 30);
    }
  }, [open]);

  const items = React.useMemo(() => {
    const list = [];
    ['01','02','03','04','05'].forEach(id => {
      const m = I18N[lang].modules[id];
      list.push({
        kind: 'module', id,
        glyph: '§',
        label: `${lang === 'it' ? 'Apri' : 'Open'} ${m.label}`,
        sub: m.sub,
        kbd: id.slice(-1),
        action: () => actions.select(id),
      });
    });
    list.push({
      kind: 'nav', id: 'home',
      glyph: '◇',
      label: lang === 'it' ? 'Torna alla home' : 'Back to home',
      sub: lang === 'it' ? 'menu principale' : 'main menu',
      kbd: 'ESC',
      action: () => actions.goHome(),
      hidden: !current,
    });
    list.push({
      kind: 'lang', id: 'lang-it',
      glyph: '⌘', label: 'Italiano', sub: 'lang · it',
      kbd: 'IT', action: () => actions.setLang('it'),
      hidden: lang === 'it',
    });
    list.push({
      kind: 'lang', id: 'lang-en',
      glyph: '⌘', label: 'English', sub: 'lang · en',
      kbd: 'EN', action: () => actions.setLang('en'),
      hidden: lang === 'en',
    });
    list.push({
      kind: 'sound', id: 'sound-toggle',
      glyph: '♪',
      label: actions.soundOn
        ? (lang === 'it' ? 'Disattiva suoni' : 'Mute sounds')
        : (lang === 'it' ? 'Attiva suoni' : 'Unmute sounds'),
      sub: 'click feedback',
      kbd: 'M', action: () => actions.toggleSound(),
    });
    list.push({
      kind: 'boot', id: 'replay-boot',
      glyph: '⟲',
      label: lang === 'it' ? 'Rigioca boot sequence' : 'Replay boot sequence',
      sub: 'sgn-os · boot',
      kbd: '',
      action: () => actions.replayBoot(),
    });
    return list.filter(it => !it.hidden);
  }, [lang, current, actions]);

  const filtered = React.useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return items;
    return items.filter(it =>
      it.label.toLowerCase().includes(needle) ||
      (it.sub || '').toLowerCase().includes(needle) ||
      (it.id || '').toLowerCase().includes(needle)
    );
  }, [items, q]);

  React.useEffect(() => { setIdx(0); }, [q]);

  if (!open) return null;

  function run(item) {
    if (!item) return;
    sound?.('confirm');
    item.action?.();
    onClose();
  }

  function onKey(e) {
    if (e.key === 'Escape') { e.preventDefault(); onClose(); return; }
    if (e.key === 'Enter')  { e.preventDefault(); run(filtered[idx]); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setIdx(i => Math.min(filtered.length - 1, i + 1));
      sound?.('tick');
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      setIdx(i => Math.max(0, i - 1));
      sound?.('tick');
    }
  }

  return (
    <div className="sgn-cp-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="sgn-cp" role="dialog" aria-label="Command palette" onKeyDown={onKey}>
        <div className="sgn-cp-input-row">
          <span className="sgn-cp-prompt">/</span>
          <input
            ref={inputRef}
            className="sgn-cp-input"
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder={lang === 'it'
              ? 'cerca un modulo, una lingua, un\'azione…'
              : 'search a module, language, action…'}
          />
        </div>
        <ul className="sgn-cp-list" role="listbox">
          {filtered.length === 0 && (
            <li className="sgn-cp-item" style={{ cursor: 'default', opacity: 0.6, gridTemplateColumns: '1fr' }}>
              <span className="label" style={{ color: 'rgba(120,122,124,0.8)' }}>
                {lang === 'it' ? 'Nessun risultato.' : 'No results.'}
              </span>
            </li>
          )}
          {filtered.map((it, i) => (
            <li
              key={it.id}
              className={`sgn-cp-item${i === idx ? ' active' : ''}`}
              onMouseEnter={() => setIdx(i)}
              onMouseDown={(e) => { e.preventDefault(); run(it); }}
              role="option" aria-selected={i === idx}>
              <span className="glyph">{it.glyph}</span>
              <span className="num">{it.kind === 'module' ? it.id : ''}</span>
              <span className="label">{it.label}</span>
              <span className="kbd">{it.kbd}</span>
            </li>
          ))}
        </ul>
        <div className="sgn-cp-foot">
          <span><kbd>↑↓</kbd> nav</span>
          <span><kbd>↵</kbd> {lang === 'it' ? 'esegui' : 'run'}</span>
          <span><kbd>ESC</kbd> {lang === 'it' ? 'chiudi' : 'close'}</span>
        </div>
      </div>
    </div>
  );
}

/* PagerCard — scheda laterale stretta-e-alta col pager a barre verticali.
   Mostrata solo quando il modulo attivo è un PageDeck con più di una pagina.
   Le barre sono stackate verticalmente (una sopra l'altra), non orizzontali.
   Click su una barra → goto(i). Frecce ↑↓ saltano fra le barre.
   Header "PG" + footer numerico "01/03" (testo verticale rl). */
function PagerCard({ index, total, labels, goto, lang, sound }) {
  function onBarKey(e, i) {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      const next = Math.min(total - 1, i + 1);
      goto(next);
      // sposta il focus alla nuova barra attiva
      requestAnimationFrame(() => {
        e.currentTarget?.parentElement?.children?.[next]?.focus();
      });
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      const next = Math.max(0, i - 1);
      goto(next);
      requestAnimationFrame(() => {
        e.currentTarget?.parentElement?.children?.[next]?.focus();
      });
    } else if (e.key === 'Home') {
      e.preventDefault(); goto(0);
    } else if (e.key === 'End') {
      e.preventDefault(); goto(total - 1);
    }
  }
  return (
    <aside
      className="sgn-pager-card"
      role="tablist"
      aria-orientation="vertical"
      aria-label={lang === 'it' ? 'Pagine del modulo' : 'Module pages'}>
      <span className="sgn-pager-head">PG</span>
      <div className="sgn-pager-bars">
        {Array.from({ length: total }).map((_, i) => {
          const active = i === index;
          const label = labels?.[i] || `${lang === 'it' ? 'Pagina' : 'Page'} ${i + 1}`;
          return (
            <button
              key={i}
              type="button"
              role="tab"
              aria-selected={active}
              aria-label={label}
              tabIndex={active ? 0 : -1}
              className={`sgn-pager-bar${active ? ' active' : ''}`}
              onClick={() => { if (!active) { goto(i); sound?.('tick'); } }}
              onKeyDown={(e) => onBarKey(e, i)}
            />
          );
        })}
      </div>
      <span className="sgn-pager-foot" aria-hidden="true">
        <span className="cur">{String(index + 1).padStart(2, '0')}</span>
        <span className="sep">/</span>
        <span className="tot">{String(total).padStart(2, '0')}</span>
      </span>
    </aside>
  );
}

/* MobilePageRail — eco verticale della PagerCard, overlay sul bordo destro
   del display. Solo mobile (CSS) + moduli multi-pagina. Tap su una barra
   salta alla pagina. */
function MobilePageRail({ index, total, goto, lang, sound }) {
  // Rail discreto a riposo: vive a bassa opacità per non rubare spazio agli
  // screenshot/contenuti. "Sveglia" (piena opacità) ad ogni cambio pagina —
  // cioè appena si scorre tra le pagine della sezione — poi sfuma di nuovo.
  const [awake, setAwake] = React.useState(false);
  const firstRef = React.useRef(true);
  React.useEffect(() => {
    if (firstRef.current) { firstRef.current = false; return; } // non al primo mount
    setAwake(true);
    const t = setTimeout(() => setAwake(false), 1600);
    return () => clearTimeout(t);
  }, [index]);
  return (
    <div className={`sgn-mrail${awake ? ' awake' : ''}`} role="tablist" aria-orientation="vertical"
      aria-label={lang === 'it' ? 'Pagine del modulo' : 'Module pages'}>
      {Array.from({ length: total }).map((_, i) => {
        const active = i === index;
        return (
          <button
            key={i}
            type="button"
            role="tab"
            aria-selected={active}
            aria-label={`${lang === 'it' ? 'Pagina' : 'Page'} ${i + 1}`}
            className={`sgn-mrail-bar${active ? ' active' : ''}`}
            onClick={() => { if (!active) { goto(i); sound?.('tick'); } }}
          />
        );
      })}
    </div>
  );
}

/* SwipeHint — pill transitoria "SCORRI ↕" (mobile, una-tantum a sessione). */
function SwipeHint({ lang }) {
  return (
    <div className="sgn-swipe-hint" role="status" aria-hidden="true">
      {lang === 'it' ? 'SCORRI' : 'SWIPE'}<span className="ar">↕</span>
    </div>
  );
}

function MobileNavHint({ lang }) {
  return (
    <div className="sgn-swipe-hint" role="status" aria-hidden="true">
      <span className="ar">◀▶</span>{lang === 'it' ? 'MODULI' : 'MODULES'}<span style={{ color: C.border }}>/</span>
      <span className="ar">↕</span>{lang === 'it' ? 'PAGINE' : 'PAGES'}
    </div>
  );
}

/* OnboardHint — coachmark desktop una-tantum: indica la nav da tastiera. */
function OnboardHint({ lang, onClose }) {
  return (
    <div className="sgn-onboard" role="dialog" aria-label={lang === 'it' ? 'Suggerimento navigazione' : 'Navigation tip'}>
      <span className="ob-rail" aria-hidden="true"/>
      <span className="ob-txt">
        {lang === 'it' ? (
          <>Naviga con i tasti <kbd>1</kbd>–<kbd>5</kbd>, oppure premi <kbd>/</kbd> per la <b>palette comandi</b>.</>
        ) : (
          <>Jump with keys <kbd>1</kbd>–<kbd>5</kbd>, or press <kbd>/</kbd> for the <b>command palette</b>.</>
        )}
      </span>
      <button type="button" className="ob-x" onClick={onClose}>OK</button>
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = useState(tweaks.language || 'it');
  const [current, setCurrent] = useState(null);
  const [focused, setFocused] = useState(null);
  // Boot persistente: la prima visita vede TapToStart + boot; chi torna entra
  // diretto. sessionStorage resta fallback per compatibilità con visite aperte.
  const bootedBefore = (() => { try { return localStorage.getItem('sgnBooted') === '1' || sessionStorage.getItem('sgnBooted') === '1'; } catch (e) { return false; } })();
  const [started, setStarted] = useState(bootedBefore);
  const [booted, setBooted] = useState(bootedBefore);
  const [langOpen, setLangOpen] = useState(false);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [transKey, setTransKey] = useState(0);
  const [direction, setDirection] = useState(0);
  const [pageMeta, setPageMeta] = useState({ label: '', index: 0, total: 0, goto: null, labels: [] });
  const [idle, setIdle] = useState(false);
  const [swipeHint, setSwipeHint] = useState(false);
  const [mobileHint, setMobileHint] = useState(false);
  const [onboard, setOnboard] = useState(false);
  const prevRef = useRef(null);
  const pendingPageRef = useRef(null);
  const mobile = useIsMobile();
  const displayInnerRef = useRef(null);
  const displaySectionRef = useRef(null);

  /* Niente reset esplicito di pageMeta sul cambio `current`: il cleanup
     dell'useEffect di PageDeck azzera già al unmount del modulo precedente,
     e il nuovo deck ripopola al primo commit. Un reset qui (parent) girerebbe
     DOPO l'effect del figlio (child→parent) e cancellerebbe la label appena
     scritta — race condition diagnosticata dal verifier. */

  /* Stable identity for the provider value, così non causa re-render a cascata. */
  const pageMetaCtx = React.useMemo(() => ({ setMeta: setPageMeta }), []);
  /* PageMetaContext live su window — riassegna a un identificatore PascalCase
     così il JSX <PageMeta.Provider> compila pulito sotto Babel. */
  const PageMeta = window.SgnPageMetaContext;

  /* Idle reveal del footer: dopo 5s senza input l'hint compare;
     al primo movimento del mouse o keydown sparisce. */
  useEffect(() => {
    let t;
    const arm = () => {
      setIdle(false);
      clearTimeout(t);
      t = setTimeout(() => setIdle(true), 5000);
    };
    arm();
    window.addEventListener('mousemove', arm, { passive: true });
    window.addEventListener('keydown', arm);
    window.addEventListener('touchstart', arm, { passive: true });
    window.addEventListener('wheel', arm, { passive: true });
    return () => {
      clearTimeout(t);
      window.removeEventListener('mousemove', arm);
      window.removeEventListener('keydown', arm);
      window.removeEventListener('touchstart', arm);
      window.removeEventListener('wheel', arm);
    };
  }, []);

  useEffect(() => { if (tweaks.language && tweaks.language !== lang) setLang(tweaks.language); }, [tweaks.language]);
  useEffect(() => { window.sgnAudio?.setEnabled(!!tweaks.sound); }, [tweaks.sound]);

  const sound = useCallback((kind) => {
    if (tweaks.sound && window.sgnTick) window.sgnTick(kind);
  }, [tweaks.sound]);

  const select = useCallback((id, dirOverride) => {
    if (navigator.vibrate) navigator.vibrate(8);   // micro feedback aptico (Android; iOS ignora)
    setCurrent(prev => {
      const next = prev === id ? null : id;
      // dirOverride: usato dallo swipe per far animare il wrap del carosello
      // nel verso del gesto (altrimenti la giunzione 05↔home scivola al contrario).
      const dir = dirOverride != null ? dirOverride : computeDirection(prev, next);
      setDirection(dir);
      prevRef.current = prev;
      if (next) { setTransKey(k => k + 1); sound('confirm'); }
      else { sound('back'); }
      return next;
    });
  }, [sound]);

  const goHome = useCallback((dirOverride) => {
    if (navigator.vibrate) navigator.vibrate(8);   // micro feedback aptico
    setCurrent(prev => {
      if (!prev) return prev;
      setDirection(typeof dirOverride === 'number' ? dirOverride : computeDirection(prev, null));
      prevRef.current = prev;
      sound('back');
      return null;
    });
  }, [sound]);

  // Swipe orizzontale (solo mobile) per scorrere tra i moduli, riusando la
  // stessa select/goHome → suono, direzione e animazione restano coerenti.
  // Carosello CIRCOLARE su [home, 01..05]: nessun bordo, si gira all'infinito
  // (così i due triangoli ◀▶ del prompt sono entrambi onesti). Si escludono lo
  // STL (drag per ruotare), gli iframe e gli scroller orizzontali; i drag
  // verticali restano scroll normale (mai preventDefault → paging intatto).
  useEffect(() => {
    if (!mobile) return undefined;
    const el = displaySectionRef.current;
    if (!el) return undefined;
    const ORDER = [null, '01', '02', '03', '04', '05'];
    const SLOP = 12, THRESH = 60;
    let sx = 0, sy = 0, tracking = false, axis = null;
    const onInteractive = (t) => {
      if (!t || !t.closest) return false;
      if (t.closest('.sgn-stl-viewer') || t.closest('iframe')) return true;
      let n = t;
      while (n && n !== el) {
        if (n.scrollWidth - n.clientWidth > 2) {
          const ox = getComputedStyle(n).overflowX;
          if (ox === 'auto' || ox === 'scroll') return true;
        }
        n = n.parentElement;
      }
      return false;
    };
    const onStart = (e) => {
      if ((e.touches && e.touches.length > 1) || onInteractive(e.target)) { tracking = false; return; }
      const p = e.touches ? e.touches[0] : e;
      sx = p.clientX; sy = p.clientY; tracking = true; axis = null;
    };
    const onMove = (e) => {
      if (!tracking) return;
      const p = e.touches ? e.touches[0] : e;
      const dx = p.clientX - sx, dy = p.clientY - sy;
      if (!axis) {
        if (Math.abs(dx) < SLOP && Math.abs(dy) < SLOP) return;
        axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
      if (axis === 'v') tracking = false;   // lascia scorrere in verticale
    };
    const onEnd = (e) => {
      if (!tracking) { return; }
      tracking = false;
      if (axis !== 'h') return;
      const p = e.changedTouches ? e.changedTouches[0] : e;
      const dx = p.clientX - sx;
      if (Math.abs(dx) < THRESH) return;
      const cur = current ?? null;
      const i = ORDER.indexOf(cur);
      const step = dx < 0 ? 1 : -1;                          // swipe-sinistra = avanti
      const ni = (i + step + ORDER.length) % ORDER.length;   // wrap-around: carosello circolare
      const target = ORDER[ni];
      // passo la direzione del gesto: la giunzione 05↔home anima nel verso giusto
      if (target === null) goHome(step); else select(target, step);
    };
    const onCancel = () => { tracking = false; };
    const opt = { passive: true };
    el.addEventListener('touchstart', onStart, opt);
    el.addEventListener('touchmove', onMove, opt);
    el.addEventListener('touchend', onEnd, opt);
    el.addEventListener('touchcancel', onCancel, opt);
    return () => {
      el.removeEventListener('touchstart', onStart);
      el.removeEventListener('touchmove', onMove);
      el.removeEventListener('touchend', onEnd);
      el.removeEventListener('touchcancel', onCancel);
    };
  }, [mobile, current, select, goHome]);

  const onPickLang = useCallback((v) => {
    setLang(v); setTweak('language', v);
    setLangOpen(false);
  }, [setTweak]);

  /* URL hash sync — leggi al mount + scrivi quando cambia `current`.
     Se l'utente naviga avanti/indietro col browser, popstate ri-applica. */
  useEffect(() => {
    writeHash(current, (pageMeta.total > 1) ? pageMeta.index : 0);
  }, [current, pageMeta.index, pageMeta.total]);
  useEffect(() => {
    function onPop() {
      const { mod: fromHash, page } = parseHash();
      pendingPageRef.current = page;
      setCurrent(prev => {
        if (prev === fromHash) return prev;
        setDirection(computeDirection(prev, fromHash));
        prevRef.current = prev;
        if (fromHash) setTransKey(k => k + 1);
        return fromHash;
      });
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  /* Deep-link a livello di pagina: quando il deck del modulo pubblica il suo
     `goto`, se c'è una pagina pendente (da hash/popstate) saltaci una volta. */
  useEffect(() => {
    const p = pendingPageRef.current;
    if (p != null && pageMeta.goto && pageMeta.total > 1) {
      pendingPageRef.current = null;
      if (p > 0 && p < pageMeta.total) pageMeta.goto(p);
    }
  }, [pageMeta.goto, pageMeta.total]);

  /* Focus management — al cambio modulo sposta il focus nel display, così
     tastiera e screen-reader seguono la nuova schermata. preventScroll per
     non disturbare il layout fisso. Solo dopo il boot. */
  useEffect(() => {
    if (!booted) return;
    const el = displaySectionRef.current;
    if (!el) return;
    try { el.focus({ preventScroll: true }); } catch (e) { try { el.focus(); } catch (e2) {} }
  }, [current, transKey, booted]);

  /* Mobile navigation hint: una-tantum dopo il boot, spiega assi SGN-OS
     senza popup — orizzontale per moduli, verticale per pagine. */
  useEffect(() => {
    if (!mobile || !booted) return;
    try { if (localStorage.getItem('sgnMobileNavSeen')) return; } catch (e) {}
    const t = setTimeout(() => setMobileHint(true), 1100);
    const h = setTimeout(() => {
      setMobileHint(false);
      try { localStorage.setItem('sgnMobileNavSeen', '1'); } catch (e) {}
    }, 4600);
    return () => { clearTimeout(t); clearTimeout(h); };
  }, [mobile, booted]);
  useEffect(() => {
    if ((current || pageMeta.index > 0) && mobileHint) {
      setMobileHint(false);
      try { localStorage.setItem('sgnMobileNavSeen', '1'); } catch (e) {}
    }
  }, [current, pageMeta.index, mobileHint]);

  /* Swipe hint (mobile, una-tantum a sessione) sui moduli multi-pagina. */
  useEffect(() => {
    if (!mobile || !current || pageMeta.total <= 1) { setSwipeHint(false); return; }
    try { if (sessionStorage.getItem('sgnSwipeSeen')) return; } catch (e) {}
    setSwipeHint(true);
    const t = setTimeout(() => {
      setSwipeHint(false);
      try { sessionStorage.setItem('sgnSwipeSeen', '1'); } catch (e) {}
    }, 3400);
    return () => clearTimeout(t);
  }, [mobile, current, pageMeta.total]);
  useEffect(() => {
    if (pageMeta.index > 0 && swipeHint) {
      setSwipeHint(false);
      try { sessionStorage.setItem('sgnSwipeSeen', '1'); } catch (e) {}
    }
  }, [pageMeta.index]);

  /* Onboarding desktop (una-tantum, persistente) — appare dopo il boot e
     sparisce alla prima navigazione o su OK. */
  useEffect(() => {
    if (mobile || !booted) return;
    try { if (localStorage.getItem('sgnOnboardSeen')) return; } catch (e) {}
    const t = setTimeout(() => setOnboard(true), 1400);
    return () => clearTimeout(t);
  }, [mobile, booted]);
  const dismissOnboard = useCallback(() => {
    setOnboard(false);
    try { localStorage.setItem('sgnOnboardSeen', '1'); } catch (e) {}
  }, []);
  useEffect(() => { if (current && onboard) dismissOnboard(); }, [current]);
  useEffect(() => { if (paletteOpen && onboard) dismissOnboard(); }, [paletteOpen]);

  /* Keyboard nav — [11] tasti 1-5, ESC, ↑↓, `/` palette */
  useEffect(() => {
    function onKey(e) {
      const inInput = ['INPUT','TEXTAREA'].includes(document.activeElement?.tagName);
      // `/` apre la palette ovunque (anche con la palette giù: l'input la gestisce);
      // ignora se sei già in un input non-palette.
      if (e.key === '/' && !inInput && !langOpen && !mobile) {
        e.preventDefault();
        setPaletteOpen(true);
        sound('tick');
        return;
      }
      if (inInput || langOpen || paletteOpen) return;
      if (['1','2','3','4','5'].includes(e.key)) {
        select(`0${e.key}`);
      } else if (e.key === 'Escape' || e.key === '0') {
        goHome();
      } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        // ↑↓ delegano al PageDeck attivo (se presente) per saltare
        // ESATTAMENTE di una pagina, niente scroll libero.
        const deck = document.querySelector('.sgn-display [data-page-deck]');
        if (deck) {
          e.preventDefault();
          deck.dispatchEvent(new CustomEvent('sgn-deck-nav', {
            detail: { dir: e.key === 'ArrowDown' ? 'next' : 'prev' }
          }));
        }
      } else if (e.key.toLowerCase() === 'l') {
        setLangOpen(true);
      } else if (e.key.toLowerCase() === 'm') {
        setTweak('sound', !tweaks.sound);
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [select, goHome, langOpen, paletteOpen, tweaks.sound, setTweak, sound, mobile]);

  const ActiveModule = current ? MODULES[current] : null;
  const slideClass = direction > 0 ? 'sgn-slide-forward'
                    : direction < 0 ? 'sgn-slide-back' : '';

  return (
    <div data-screen-label={current ? `${current} ${I18N[lang].modules[current].label}` : '00 Menu'}>
      <a href="#sgn-main" className="sgn-skip"
        onClick={(e) => { e.preventDefault(); const el = displaySectionRef.current; if (el) el.focus(); }}>
        {lang === 'it' ? 'Salta al contenuto' : 'Skip to content'}
      </a>
      <p className="sgn-sr-only" aria-live="polite">
        {current
          ? `${lang === 'it' ? 'Sezione' : 'Section'} ${current} ${I18N[lang].modules[current].label}`
          : (lang === 'it' ? 'Menu principale' : 'Main menu')}
      </p>
      {!started && <TapToStart lang={lang} onStart={() => setStarted(true)} sound={sound}/>}
      {started && !booted && <BootScreen lang={lang} onDone={() => { setBooted(true); try { localStorage.setItem('sgnBooted', '1'); sessionStorage.setItem('sgnBooted', '1'); } catch (e) {} }} sound={sound}/>}

      <Cursor enabled={!!tweaks.crosshair && !mobile} sound={sound}/>
      <ClickRipple enabled={!!tweaks.ripple}/>

      <div className="sgn-page">
        <div className="sgn-frame">
          <div className="sgn-stage">
          <TopBar
            lang={lang}
            langOpen={langOpen}
            onToggleLang={() => { setLangOpen(o => !o); sound('tick'); }}
            onPickLang={onPickLang}
            onCloseLang={() => setLangOpen(false)}
            onOpenPalette={() => { setLangOpen(false); setPaletteOpen(true); sound('tick'); }}
            sound={sound}
            onHome={() => goHome()}
            current={current}
            direction={direction}
            variant="topbar"
            mobile={mobile}
            soundOn={!!tweaks.sound}
            onToggleSound={() => setTweak('sound', !tweaks.sound)}
            pageLabel={pageMeta.label}
            pageIndex={pageMeta.index}
            pageTotal={pageMeta.total}
            idle={idle}
          />

          <div className={`sgn-display-area${pageMeta.total > 1 && pageMeta.goto ? ' has-pager' : ''}`}>
            <section
              className="sgn-display"
              id="sgn-main"
              ref={displaySectionRef}
              tabIndex={-1}
              role="region"
              aria-label={current
                ? `${current} ${I18N[lang].modules[current].label}${pageMeta.total > 1 ? ` · ${lang === 'it' ? 'pagina' : 'page'} ${pageMeta.index + 1}/${pageMeta.total}` : ''}`
                : (lang === 'it' ? 'Menu principale' : 'Main menu')}>
              <PageMeta.Provider value={pageMetaCtx}>
                <div
                  key={`mod-${current || 'idle'}-${transKey}`}
                  ref={displayInnerRef}
                  className={`sgn-display-inner ${slideClass}`}>
                  {ActiveModule
                    ? <ActiveModule lang={lang} mobile={mobile}/>
                    : <IdleDisplay lang={lang} mobile={mobile} focused={focused}/>
                  }
                </div>
              </PageMeta.Provider>
              {pageMeta.total > 1 && pageMeta.goto && (
                <MobilePageRail
                  index={pageMeta.index}
                  total={pageMeta.total}
                  goto={pageMeta.goto}
                  lang={lang}
                  sound={sound}
                />
              )}
              {mobileHint && <MobileNavHint lang={lang}/>}
              {swipeHint && <SwipeHint lang={lang}/>}
            </section>
            {pageMeta.total > 1 && pageMeta.goto && (
              <PagerCard
                index={pageMeta.index}
                total={pageMeta.total}
                labels={pageMeta.labels || []}
                goto={pageMeta.goto}
                lang={lang}
                sound={sound}
              />
            )}
          </div>
          </div>

          <ModuleStrip
            current={current}
            focused={focused}
            setFocused={setFocused}
            lang={lang}
            onSelect={select}
            mobile={mobile}
            sound={sound}
          />
        </div>
      </div>

      {/* La scorciatoia comandi vive ora nel readout centrale della topbar
          quando il sito va in standby (vedi StatusReadout · idle). Niente
          più hint nel footer. */}

      <CommandPalette
        open={paletteOpen}
        onClose={() => setPaletteOpen(false)}
        lang={lang}
        current={current}
        sound={sound}
        actions={{
          select,
          goHome,
          setLang: (v) => { setLang(v); setTweak('language', v); },
          soundOn: !!tweaks.sound,
          toggleSound: () => setTweak('sound', !tweaks.sound),
          replayBoot: () => setBooted(false),
        }}
      />

      {onboard && <OnboardHint lang={lang} onClose={dismissOnboard}/>}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Language">
          <TweakRadio label="Locale" value={tweaks.language || 'it'}
            onChange={(v) => { setLang(v); setTweak('language', v); }}
            options={[{ value: 'it', label: 'IT' }, { value: 'en', label: 'EN' }]}/>
          <TweakButton label="Open language menu" onClick={() => setLangOpen(true)} secondary/>
        </TweakSection>
        <TweakSection label="Feel">
          <TweakToggle label="Sound (clicks)" value={!!tweaks.sound}
            onChange={(v) => setTweak('sound', v)}/>
          <TweakToggle label="Crosshair cursor" value={!!tweaks.crosshair}
            onChange={(v) => setTweak('crosshair', v)}/>
          <TweakToggle label="Click ripple" value={!!tweaks.ripple}
            onChange={(v) => setTweak('ripple', v)}/>
          <TweakButton label="Replay boot sequence" onClick={() => setBooted(false)} secondary/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
