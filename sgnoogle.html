@font-face {

:root {
  --yellow:   #FFC200;
  --paper:    #F0F1F2;
  --bg-outer: #E8E9EA;
  --grey:     #686A6C;
  --ink:      #28282C;
  --white:    #FFFFFF;

  --bg:           var(--paper);
  --bg-elevated:  var(--white);
  --bg-inverse:   var(--ink);
  --fg:           var(--ink);
  --fg-muted:     var(--grey);
  --fg-faint:     #727476;
  --fg-on-yellow: var(--ink);
  --fg-on-ink:    var(--paper);
  --fg-accent:    var(--yellow);

  --border:       rgba(120, 122, 124, 0.3);
  --border-soft:  rgba(120, 122, 124, 0.2);
  --border-hair:  rgba(120, 122, 124, 0.15);
  --border-dash:  rgba(120, 122, 124, 0.25);

  --accent:       var(--yellow);
  --accent-line:  var(--yellow);

  --font-display: 'Neue Machina', 'IBM Plex Mono', monospace;
  --font-mono:    'IBM Plex Mono', ui-monospace, 'Courier New', monospace;
  --font-body:    var(--font-mono);

  --fw-light:     300;
  --fw-regular:   400;
  --fw-medium:    500;
  --fw-semibold:  600;
  --fw-bold:      700;
  --fw-display:   900;

  --fs-hero:      clamp(56px, 8vw, 160px);
  --fs-cover:     clamp(40px, 5vw, 100px);
  --fs-display:   clamp(32px, 3.5vw, 60px);
  --fs-h1:        clamp(28px, 2.6vw, 48px);
  --fs-h2:        clamp(22px, 2vw, 34px);
  --fs-h3:        clamp(17px, 1.4vw, 22px);
  --fs-body:      14px;
  --fs-small:     11px;
  --fs-label:     10px;
  --fs-micro:     9px;
  --fs-nano:      8px;

  --tracking-tight:  -0.03em;
  --tracking-snug:   -0.01em;
  --tracking-normal: 0;
  --tracking-wide:   0.06em;
  --tracking-wider:  0.12em;
  --tracking-widest: 0.2em;

  --lh-tight:    0.95;
  --lh-snug:     1.15;
  --lh-normal:   1.6;
  --lh-loose:    1.85;

  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --space-12: 48px; --space-16: 64px; --space-20: 80px;

  --stroke-hair:  0.5px;
  --stroke-thin:  1px;
  --stroke-mark:  1.5px;
  --stroke-rail:  2px;
  --stroke-accent: 3px;
  --radius: 0;
  --shadow: none;
  --motion-fast:   120ms;
  --motion-base:   180ms;
  --motion-slow:   240ms;
  --easing:        linear;
  --easing-sharp:  cubic-bezier(0.2, 0, 0, 1);
  --grain-opacity: 0;
}

html { -webkit-text-size-adjust: 100%; }
/* Niente flash azzurro al tap su mobile: il sito ha già il proprio feedback di
   pressione (micro-scala + cambio sfondo). Qui spegniamo l'overlay di default
   del browser, che altrimenti lampeggia in contrasto con la linguetta bianca. */
* { -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg-outer);
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
/* Selezione testo: fondo ink + testo paper. NIENTE giallo dietro il nero
   (regola giallo↔ink), come il toggle: il giallo resta accento su chiaro. */
::selection { background: var(--ink); color: var(--paper); }


  /* ──────────────────────────────────────────────────────────
     SGN-OS shell — floating layout v3.3
     Sfondo paper, 3 componenti su white, gap visibile,
     contenitore centrato max 1400px.
     ────────────────────────────────────────────────────────── */
  html, body {
    background: var(--bg-outer);
    margin: 0;
    min-height: 100%;
    height: 100%;
    overflow: hidden;
    /* iOS non gonfia il testo in landscape; niente rubber-band che scopre
       il fondo paper oltre i bordi. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overscroll-behavior: none;
  }
  body {
    font-family: var(--font-mono);
    color: var(--ink);
  }
  button, input, select, textarea { font-family: inherit; color: inherit; }

  /* ── Pulse for status dots */
  @keyframes sgnpulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }

  /* ── Anteprima ambient: pan+zoom lento per i fondali fotografici
     (thumbnail video, icona app) — molto zoomati e sfocati così la bassa
     risoluzione non si nota, e il movimento li tiene vivi. */
  @keyframes sgnPanZoom {
    0%   { transform: scale(1.5) translate(-2.5%, -1.5%); }
    100% { transform: scale(1.78) translate(2.5%, 2%); }
  }
  /* ── Drift diagonale per i fondali a marchio/tile (wireframe, logo,
     slot vuoti): traslazione continua di un tile ripetuto. */
  @keyframes sgnDrift {
    from { transform: translate(0, 0); }
    to   { transform: translate(-132px, -132px); }
  }
  @media (prefers-reduced-motion: reduce) {
    .sgn-ambient { animation: none !important; }
  }

  /* ── Aree scrollabili: scrollabili ma SENZA scrollbar visibile.
     Coerente con il deck (.sgn-deck-scroll); l'affordance dello scroll è
     data dal fade-mask ai bordi e, dove presenti, dalle frecce. La barra
     non occupa spazio e non riflowa il layout. Cross-browser. */
  .sgn-stl-scroll,
  .sgn-video-grid,
  .sgn-cp-list,
  .sgn-noscroll {
    scrollbar-width: none;        /* Firefox */
    -ms-overflow-style: none;     /* IE / vecchio Edge */
  }
  .sgn-stl-scroll::-webkit-scrollbar,
  .sgn-video-grid::-webkit-scrollbar,
  .sgn-cp-list::-webkit-scrollbar,
  .sgn-noscroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* Fade-edge: sostituisce la scrollbar come segnale "c'è altro".
     Sul vuoto la maschera è invisibile (niente da sfumare); sul contenuto
     che eccede il bordo, sfuma l'ultimo tratto così lo scroll si legge come
     intenzionale. Verticale per la griglia video, orizzontale per la strip
     sponsor (ribaltata a verticale sul mobile, vedi @media). */
  .sgn-video-grid {
    -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 16px), transparent);
    mask-image: linear-gradient(to bottom, #000 calc(100% - 16px), transparent);
  }
  .sgn-link-scroller {
    -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 18px), transparent);
    mask-image: linear-gradient(to right, #000 calc(100% - 18px), transparent);
  }

  /* ── Terminal cursor blink (empty-states) */
  @keyframes sgnBlink {
    0%, 49%   { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  /* ── Hairline sweep — usata dal route-readout in topbar (sottolineatura
     direzionale del nome sezione). Cresce dal lato d'ingresso e rientra
     dall'altro. */
  @keyframes sgnSweepRight {
    0%     { transform: scaleX(0); transform-origin: left; }
    40%    { transform: scaleX(1); transform-origin: left; }
    40.01% { transform-origin: right; }
    100%   { transform: scaleX(0); transform-origin: right; }
  }
  @keyframes sgnSweepLeft {
    0%     { transform: scaleX(0); transform-origin: right; }
    40%    { transform: scaleX(1); transform-origin: right; }
    40.01% { transform-origin: left; }
    100%   { transform: scaleX(0); transform-origin: left; }
  }

  /* ── Content slide-in (direzione coerente con [9]) */
  @keyframes sgnSlideInFromRight {
    from { transform: translateX(32px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes sgnSlideInFromLeft {
    from { transform: translateX(-32px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  /* ── 3D wireframe F monogram on home */
  @keyframes sgnMarkSpin {
    from { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
    to   { transform: rotateX(0deg) rotateY(360deg) rotateZ(0deg); }
  }
  .sgn-wire-node {
    opacity: 0.72;
    transform-box: fill-box;
    transform-origin: center;
    animation: sgnWireNodePulse 6.4s cubic-bezier(0.2,0,0,1) infinite;
  }
  .sgn-wire-node--b { animation-delay: 0.45s; }
  .sgn-wire-node--c { animation-delay: 0.9s; }
  .sgn-wire-node--d { animation-delay: 1.35s; }
  @keyframes sgnWireNodePulse {
    0%, 58%, 100% { opacity: 0.62; transform: scale(1); }
    7%  { opacity: 1; transform: scale(1.34); }
    14% { opacity: 0.78; transform: scale(0.92); }
    22% { opacity: 0.72; transform: scale(1); }
  }

  /* ── Click ripple sonar */
  .sgn-ripple-ring {
    position: absolute;
    width: 18px; height: 18px;
    transform: translate(-50%, -50%);
    border: 1.5px solid var(--yellow);
    border-radius: 50%;
    opacity: 0.9;
    animation: sgnRipple 620ms cubic-bezier(0.2, 0, 0, 1) forwards;
    will-change: transform, opacity, width, height;
  }
  @keyframes sgnRipple {
    0%   { width: 14px; height: 14px; opacity: 0.85; border-width: 1.5px; }
    60%  { opacity: 0.5; }
    100% { width: 180px; height: 180px; opacity: 0; border-width: 0.5px; }
  }

  /* ──────────────────────────────────────────────────────────
     FLOATING shell layout
     - Outer page = paper bg, padding laterale che respira.
     - Inner frame = max 1400px, 3 sezioni con gap fra loro.
     - Ogni sezione (topbar / display / strip) sta sopra il paper
       in una superficie white con hairline.
     ────────────────────────────────────────────────────────── */
  .sgn-page {
    width: 100%;
    height: 100vh;        /* fallback */
    height: 100dvh;       /* segue la barra dinamica di Safari/Chrome mobile */
    /* padding laterale che respira + rispetto delle safe-area (notch/island). */
    padding-top: clamp(12px, 2vh, 24px);
    padding-left: max(clamp(16px, 3vw, 48px), env(safe-area-inset-left));
    padding-right: max(clamp(16px, 3vw, 48px), env(safe-area-inset-right));
    padding-bottom: max(clamp(28px, 3.6vh, 44px), env(safe-area-inset-bottom));
    box-sizing: border-box;
    overflow: hidden;
  }
  /* Solo la shell esterna — non le pagine interne di PageDeck che condividono
     la stessa classe. #root > seleziona solo il figlio diretto. */
  #root > .sgn-page {
    background: var(--paper);
    max-width: 1100px;
    margin: 0 auto;
  }
  .sgn-frame {
    --frame-gap: clamp(12px, 2vh, 24px);
    max-width: 1400px;
    margin: 0 auto;
    height: 100%;
    display: grid;
    grid-template-rows: 1fr clamp(140px, 24vh, 200px);
    gap: var(--frame-gap);
    box-sizing: border-box;
  }
  /* ── Stage = TopBar + display impilati in colonna. NON c'è gap di griglia
        tra loro: lo stacco è una margin-bottom della TopBar (= --frame-gap),
        così in home può collassare a 0 e i due pannelli diventano un'unica
        superficie bianca — merge strutturale, niente "gonna" che copre il gap
        a pixel (era quella a lasciare la riga di separazione). L'unico gap di
        griglia rimasto è stage↔strip, quello che la linguetta raccorda. ── */
  .sgn-stage { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .sgn-topbar {
    margin-bottom: var(--frame-gap);
    transition: height 320ms cubic-bezier(0.2,0,0,1),
                margin-bottom 320ms cubic-bezier(0.2,0,0,1),
                border-color 220ms linear;
  }
  .sgn-topbar--home {
    margin-bottom: 0;
    border-color: transparent !important;
    height: clamp(54px, 8vh, 66px) !important;
  }
  .sgn-display {
    position: relative;
    overflow: hidden;
    background: var(--white);
    outline: none;
  }
  /* ── Display area = display + (optional) side pager card ── */
  .sgn-display-area {
    display: grid;
    flex: 1 1 auto;
    grid-template-columns: 1fr;
    gap: clamp(8px, 1vw, 14px);
    min-height: 0; min-width: 0;
  }
  .sgn-display-area.has-pager {
    grid-template-columns: 1fr clamp(36px, 3vw, 48px);
  }
  /* Pager card — barre verticali stackate, una pagina sopra l'altra. */
  .sgn-pager-card {
    background: var(--white);
    border: 0.5px solid var(--border-soft);
    box-sizing: border-box;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: clamp(10px, 1.6vh, 16px) 0;
    overflow: hidden;
  }
  .sgn-pager-head, .sgn-pager-foot {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 700; letter-spacing: 0.22em;
    color: rgba(120,122,124,0.7);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    line-height: 1;
    flex-shrink: 0;
  }
  .sgn-pager-foot {
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .sgn-pager-foot .sep { color: rgba(120,122,124,0.4); margin: 0 2px; }
  .sgn-pager-foot .tot { color: rgba(120,122,124,0.7); }
  .sgn-pager-bars {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(6px, 1vh, 10px);
    padding: clamp(8px, 1.4vh, 14px) 0;
    width: 100%;
  }
  .sgn-pager-bar {
    appearance: none; padding: 0; margin: 0; cursor: pointer;
    background: transparent;
    border: 0.5px solid rgba(120,122,124,0.35);
    width: 6px;
    height: clamp(28px, 6vh, 56px);
    transition:
      width 200ms cubic-bezier(0.2,0,0,1),
      height 200ms cubic-bezier(0.2,0,0,1),
      background 160ms linear,
      border-color 160ms linear;
  }
  .sgn-pager-bar:hover { border-color: var(--ink); }
  .sgn-pager-bar.active {
    width: 10px;
    background: var(--yellow);
    border-color: var(--yellow);
  }
  .sgn-pager-bar:focus-visible {
    outline: 0.5px solid var(--yellow);
    outline-offset: 2px;
  }
  @media (max-width: 760px) {
    .sgn-display-area.has-pager { grid-template-columns: 1fr; }
    .sgn-pager-card { display: none; }
  }
  .sgn-display-inner {
    position: absolute; inset: 0;
    overflow: hidden;  /* il PageDeck è absolute inset:0 e gestisce il suo scroll */
  }
  /* Hide scrollbars del deck — la nav avviene con HUD + tastiera */
  .sgn-deck-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* ──────────────────────────────────────────────────────────
     Pagina = unità fissa: tutto dentro DEVE poter rimpicciolirsi
     per evitare overflow. Niente min-* implicito dei flex/grid,
     media cap a 100%.
     ────────────────────────────────────────────────────────── */
  .sgn-page,
  .sgn-page * {
    min-width: 0;
    min-height: 0;
  }
  .sgn-page img,
  .sgn-page iframe,
  .sgn-page video,
  .sgn-page canvas {
    max-width: 100%;
    max-height: 100%;
  }

  /* ── Tab hover (background only — il resto è gestito JSX) */
  .sgn-tab:hover { background: var(--white) !important; }

  /* ══════════════════════════════════════════════════════════════
     CTA — pulsante canonico del sito (INSTALLA · SCRIVIMI · MW …).
     Struttura unica: [cella freccia | hairline | label]. La taglia
     cambia (md/sm/xs), la struttura no. Reso da <CTA> in modules.jsx.
     HOVER "arma" il pulsante: resta bianco, si accende di INK solo la
     cella della freccia, la freccia passa giallo→paper (mai gialla
     sull'ink) e il bordo si fa ink. Taglio netto a 120ms, niente ombra,
     niente lift — giallo e ink non si toccano MAI.
     ══════════════════════════════════════════════════════════════ */
  .sgn-cta {
    position: relative;
    display: inline-flex; align-items: stretch;
    background: var(--white);
    border: 0.5px solid var(--ink);
    color: var(--ink);
    text-decoration: none;
    font-family: var(--font-mono);
    cursor: pointer;
    box-sizing: border-box;
    /* Hard, mechanical cut — no shadow, no lift (brand: shadow:none, moto non-organico). */
    transition: background 120ms linear, color 120ms linear, border-color 120ms linear, transform 90ms ease-out;
  }
  .sgn-cta__icon {
    display: flex; align-items: center; justify-content: center;
    border-right: 0.5px solid var(--border);
    flex-shrink: 0;
    transition: background 140ms linear, border-color 140ms linear;
  }
  .sgn-cta__icon > span { transition: background-color 140ms linear; }
  .sgn-cta__label {
    display: flex; align-items: center;
    font-weight: 700; text-transform: uppercase; white-space: nowrap;
  }
  /* ignite — al hover il GIALLO SPARISCE del tutto: il pulsante si riempie
     di ink e freccia + label diventano paper (chiaro-su-scuro, pulito).
     Così giallo e ink non si toccano MAI: il giallo vive solo a riposo
     (freccia gialla su bianco). Niente accostamento giallo-nero. */
  .sgn-cta:hover,
  .sgn-card-hover:hover .sgn-cta {
    background: var(--white);
    border-color: var(--ink);
  }
  .sgn-cta:hover .sgn-cta__icon,
  .sgn-card-hover:hover .sgn-cta .sgn-cta__icon {
    background: var(--ink);
    border-right-color: var(--ink);
  }
  .sgn-cta:hover .sgn-cta__icon > span,
  .sgn-card-hover:hover .sgn-cta .sgn-cta__icon > span {
    background-color: var(--paper) !important;
  }
  .sgn-cta:hover .sgn-cta__label,
  .sgn-card-hover:hover .sgn-cta .sgn-cta__label {
    color: var(--ink) !important;
  }
  /* press — feedback meccanico al clic: il pulsante "scatta" giù di 1px e si
     riempie di ink (freccia + label → paper), come l'hover ma deciso. Niente
     ombra/lift: solo il nudge verticale. Vale anche dove l'hover non esiste
     (touch), così su telefono il tap dà comunque una risposta netta prima che
     si apra il Play Store. Scoped a .sgn-hot = solo le CTA interattive. */
  .sgn-cta.sgn-hot:active {
    background: var(--ink);
    border-color: var(--ink);
    transform: translateY(1px);
  }
  .sgn-cta.sgn-hot:active .sgn-cta__icon {
    background: var(--ink); border-right-color: rgba(255,255,255,0.22);
  }
  .sgn-cta.sgn-hot:active .sgn-cta__icon > span { background-color: var(--paper) !important; }
  .sgn-cta.sgn-hot:active .sgn-cta__label { color: var(--paper) !important; }

  /* Pulsante video nelle SponsorCard — stesso linguaggio del box-icona CTA:
     a riposo hairline + glifo ink; al hover/press della card si riempie di
     ink e il glifo (currentColor) diventa paper. */
  .sgn-ytbtn { transition: background 140ms linear, border-color 140ms linear, color 140ms linear; }
  .sgn-card-hover:hover .sgn-ytbtn,
  .sgn-card-hover:active .sgn-ytbtn {
    background: var(--ink) !important;
    border-color: var(--ink) !important;
    color: var(--paper) !important;
  }

  /* ══════════════════════════════════════════════════════════════
     Card interattiva — qualunque .sgn-card-hover (video, app-row,
     link/sponsor/contact card, channel row). HOVER "COMBO" (selezione
     inequivocabile, zero ombre): scambio di tono (bg → paper), cornice
     ispessita a 1.5px ink (outline, niente reflow) e corner-marks gialli
     che si agganciano crescendo — mirino HUD. Profondità da tono + bordo
     + marks, mai da shadow.
     ══════════════════════════════════════════════════════════════ */
  .sgn-card-hover { transition: border-color 160ms linear, background 160ms linear; }
  /* Hover intermedio: niente doppia cornice nera, niente ombre (regola brand).
     Solo un hairline grigio un filo più marcato + fondo paper. La selezione
     "vera" resta affidata ai corner-mark gialli. */
  .sgn-card-hover:hover {
    border-color: var(--grey) !important;
    background: var(--paper) !important;
  }
  .sgn-card-hover .sgn-cm {
    transition: opacity 180ms linear,
                width 170ms cubic-bezier(0.2,0,0,1),
                height 170ms cubic-bezier(0.2,0,0,1) !important;
  }
  .sgn-card-hover:hover .sgn-cm { opacity: 1 !important; width: 16px !important; height: 16px !important; }

  /* Variante MEDIA (card video: featured + griglia) — il corpo è già scuro
     (player) o paper (art): NON ribaltare il fondo a paper, altrimenti l'art
     si fonde con la card. Tieni il fondo bianco e affida la selezione a
     bordo ink + corner-marks gialli. */
  .sgn-card-hover--media:hover { background: var(--white) !important; }

  /* ══════════════════════════════════════════════════════════════
     STL catalog rows — ogni voce si "sveglia" al passaggio del mouse,
     prima ancora del click: fondo paper + rail giallo che affiora. La
     voce attiva resta com'è (rail pieno). Stesso linguaggio tono+rail.
     ══════════════════════════════════════════════════════════════ */
  .sgn-stl-item { transition: background 140ms linear; }
  .sgn-stl-item:hover:not(.is-active) { background: var(--paper) !important; }
  .sgn-stl-item:hover:not(.is-active) .sgn-stl-rail { background: rgba(255,194,0,0.45) !important; }
  .sgn-stl-item:hover:not(.is-active) .sgn-stl-id { color: var(--ink) !important; }

  /* ══════════════════════════════════════════════════════════════
     Controlli topbar (audio + lingua) — hover "sta per selezionare":
     cornice → ink + fondo → paper. Stesso linguaggio della card (tono +
     bordo), in scala ridotta. Niente giallo, niente ombra.
     ══════════════════════════════════════════════════════════════ */
  /* NB: i bottoni topbar portano stili inline (background:transparent, border)
     che hanno priorità sulle regole :hover — servono !important per
     far emergere lo stato hover. */
  .sgn-topctl { transition: border-color 120ms linear, background 120ms linear, transform 90ms ease-out; }
  .sgn-topctl:active { transform: translateY(1px); }
  /* l'icona audio si "arma": la freccia gialla resta, ma il bordo si fa ink */
  .sgn-topctl:active { background: #ECEBE7 !important; }
  .sgn-mobilemark, .sgn-ghostctl { background: transparent !important; }
  .sgn-mobilemark { transition: opacity 120ms linear, transform 90ms ease-out; }
  .sgn-mobilemark:active { opacity: 0.72; transform: translateY(1px) scale(0.96); }
  .sgn-ghostctl:active { background: transparent !important; }
  .sgn-featured:hover .sgn-feat-cta:not(:hover) .sgn-cta__icon {
    background: transparent !important; border-right-color: var(--border) !important;
  }
  .sgn-featured:hover .sgn-feat-cta:not(:hover) .sgn-cta__icon > span { background-color: var(--yellow) !important; }
  .sgn-homebrand { position: relative; }
  .sgn-homebrand::after {
    content: ''; position: absolute; left: 32px; right: 0; bottom: -7px; height: 2px;
    background: var(--yellow); transform: scaleX(0); transform-origin: left;
    transition: transform 180ms cubic-bezier(0.2,0,0,1);
  }

  /* ══════════════════════════════════════════════════════════════
     LANG button (topbar) + popover trigger states.
     Riposo: hairline grey. Hover: bordo → ink (stesso linguaggio di
     card/CTA). Aperto (is-open): la cella valore si arma a ink+paper e
     il caret ruota. Nessun giallo coinvolto.
     ══════════════════════════════════════════════════════════════ */
  .sgn-langbtn { position: relative; overflow: hidden; transition: border-color 120ms linear; }
  .sgn-langbtn__val { transition: background 120ms linear, color 120ms linear; }
  .sgn-langbtn.is-open { border-color: var(--ink); }
  .sgn-langbtn.is-open .sgn-langbtn__val { background: var(--ink) !important; color: var(--paper) !important; }
  .sgn-caret { transition: transform 160ms cubic-bezier(0.2,0,0,1); }
  .sgn-langbtn.is-open .sgn-caret { transform: rotate(180deg); }
  .sgn-langbtn.is-open::after {
    content: ''; position: absolute; left: -0.5px; right: -0.5px; top: -0.5px; height: 2px;
    background: var(--grey); transform-origin: left; animation: sgnTopRailIn 160ms cubic-bezier(0.2,0,0,1) both;
  }
  @keyframes sgnTopRailIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .sgn-lang-popover {
    transform-origin: top right;
    animation: sgnLangPanelIn 150ms cubic-bezier(0.2,0,0,1) both;
  }
  .sgn-lang-popover__row { animation: sgnLangRowIn 160ms linear both; }
  .sgn-lang-popover__row:nth-of-type(2) { animation-delay: 35ms; }
  .sgn-lang-popover__row:nth-of-type(3) { animation-delay: 70ms; }
  @keyframes sgnLangPanelIn {
    from { opacity: 0; clip-path: inset(0 0 100% 0); transform: translateY(-4px); }
    to   { opacity: 1; clip-path: inset(0); transform: translateY(0); }
  }
  @keyframes sgnLangRowIn {
    from { opacity: 0; transform: translateY(-2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hover SOLO su dispositivi con puntatore fine (mouse). Sul touch un
     :hover resta "incollato" dopo il tap — es. dopo aver aperto e chiuso il
     menu lingua la cella valore restava ink. Lo stato is-open (sopra) NON è
     hover, quindi il feedback "aperto" continua a valere anche sul dito. */
  @media (hover: hover) and (pointer: fine) {
    .sgn-topctl:hover {
      border-color: var(--ink) !important;
      background: #FFFFFF !important;
    }
    .sgn-langbtn:hover { border-color: var(--ink) !important; }
    /* la cella valore (IT/EN) si accende a ink+paper anche al solo hover,
       non solo da aperta — feedback "sta per selezionare". */
    .sgn-langbtn:hover .sgn-langbtn__val { background: var(--ink) !important; color: var(--paper) !important; }
    .sgn-homebrand:hover::after { transform: scaleX(1); }
  }

  /* ── Command palette overlay ── */
  .sgn-cp-overlay {
    position: fixed; inset: 0; z-index: 99000;
    background: rgba(40,40,44,0.32);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: clamp(64px, 14vh, 140px);
    animation: sgnCpFade 120ms linear;
  }
  @keyframes sgnCpFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .sgn-cp {
    width: min(560px, 92vw);
    background: var(--white);
    border: 0.5px solid var(--border-soft);
    box-sizing: border-box;
    font-family: var(--font-mono);
    color: var(--ink);
    display: flex; flex-direction: column;
  }
  .sgn-cp-input-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border-soft);
  }
  .sgn-cp-prompt {
    color: var(--yellow); font-weight: 700; font-size: 12px;
    letter-spacing: 0.18em;
  }
  .sgn-cp-input {
    flex: 1;
    appearance: none; border: 0; outline: none;
    background: transparent;
    font: inherit; font-size: 14px; font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .sgn-cp-input::placeholder { color: rgba(120,122,124,0.5); }
  .sgn-cp-list {
    max-height: 56vh;
    overflow-y: auto;
    list-style: none; margin: 0; padding: 0;
  }
  .sgn-cp-item {
    display: grid;
    grid-template-columns: 24px 28px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border-soft);
    cursor: pointer;
    transition: background 80ms linear;
  }
  .sgn-cp-item:last-child { border-bottom: none; }
  .sgn-cp-item.active { background: rgba(255,194,0,0.10); }
  .sgn-cp-item .glyph {
    color: var(--faint, rgba(120,122,124,0.7));
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    text-align: center;
  }
  .sgn-cp-item.active .glyph { color: var(--yellow); }
  .sgn-cp-item .num {
    font-family: 'Neue Machina', 'IBM Plex Mono', monospace;
    font-weight: 700; font-size: 14px; color: var(--ink);
    letter-spacing: -0.02em;
  }
  .sgn-cp-item .label {
    font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: 0.04em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .sgn-cp-item .kbd {
    font-size: 9px; letter-spacing: 0.18em; color: rgba(120,122,124,0.7);
    font-weight: 600; text-transform: uppercase;
    border: 0.5px solid rgba(120,122,124,0.25);
    padding: 2px 6px;
  }
  .sgn-cp-foot {
    padding: 8px 16px;
    border-top: 0.5px solid var(--border-soft);
    display: flex; gap: 16px; align-items: center;
    font-size: 9px; letter-spacing: 0.18em; color: rgba(120,122,124,0.7);
    font-weight: 600; text-transform: uppercase;
  }
  .sgn-cp-foot kbd {
    background: var(--paper);
    border: 0.5px solid rgba(120,122,124,0.25);
    padding: 1px 6px;
    font-family: inherit; font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; color: var(--ink);
  }

  /* ── Slide-in container per il display content ── */
  .sgn-slide-forward { animation: sgnSlideInFromRight 280ms cubic-bezier(0.2,0,0,1); }
  .sgn-slide-back    { animation: sgnSlideInFromLeft  280ms cubic-bezier(0.2,0,0,1); }

  /* ── Featured video: grid-area nomi (valgono sia desktop che mobile) ── */
  .sgn-feat-label-row { grid-area: tag; }
  .sgn-feat-vid-col   { grid-area: vid; }
  .sgn-feat-info      { grid-area: info; }

  /* ── Mobile (<=760) ── */
  @media (max-width: 760px) {
    .sgn-page { padding: clamp(8px, 2vh, 16px) clamp(10px, 3vw, 20px) max(20px, env(safe-area-inset-bottom, 0px)); }
    .sgn-frame {
      --frame-gap: clamp(12px, 2.5vh, 20px);
      grid-template-rows: 1fr auto;
      gap: var(--frame-gap);
    }
    .sgn-self-grid { grid-template-columns: 1fr !important; justify-items: center; text-align: center; gap: clamp(12px, 2vh, 18px) !important; }
    .sgn-self-grid > div:first-child { width: clamp(150px, 46vw, 220px) !important; }
    .sgn-self-grid > div:last-child { width: 100%; text-align: left; gap: clamp(10px, 1.4vh, 14px) !important; }
    .sgn-profile-statband { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
    .sgn-profile-bio {
      display: -webkit-box !important;
      -webkit-line-clamp: 3 !important;
      -webkit-box-orient: vertical !important;
      overflow: hidden !important;
    }
    .sgn-stl-grid  { grid-template-columns: 1fr !important; }
    .sgn-skill-grid { grid-template-columns: 1fr !important; }
    /* App hero: l'icona e il blocco testo restano in riga, il bottone
       INSTALLA va a capo a tutta larghezza (flex-wrap nel componente). */
    /* App body su mobile: NIENTE scroll interno alla pagina (richiesta esplicita).
       La pagina app deve entrare intera nel display. Per farcela:
       · la DESCRIZIONE è nascosta (ridondante: la tagline sotto al nome fa già
         da sottotitolo, e ripete le stesse cose delle caratteristiche);
       · resta il blocco CARATTERISTICHE (specifiche compatte, una riga ciascuna);
       · gli SCREENSHOT riempiono tutto lo spazio che avanza (flex: 1).
       Stack verticale (flex column), overflow nascosto → mai una scrollbar
       dentro la pagina, mai sovrapposizioni. */
    .sgn-app-body-grid {
      display: flex !important;
      flex-direction: column !important;
      overflow: hidden !important;
      gap: clamp(12px, 2vh, 18px) !important;
    }
    /* descrizione: via su mobile (ridondante con la tagline dell'hero) */
    .sgn-app-about { display: none !important; }
    /* caratteristiche: via su mobile, la gallery prende tutto lo spazio */
    .sgn-app-textcol { display: none !important; }
    /* gallery: prende tutto lo spazio residuo */
    .sgn-app-galcol {
      flex: 1 1 auto !important;
      min-height: 0 !important;
    }
    .sgn-app-row {
      grid-template-columns: 40px 1fr !important;
      row-gap: 10px !important;
    }
    .sgn-app-row > *:nth-child(3),
    .sgn-app-row > *:nth-child(4) { grid-column: 1 / -1; }

    /* ── Mobile reflow v3.9 — snap come desktop, elementi responsive ──
       Le pagine restano a tutta schermata con snap verticale (identico al
       desktop): qui NON si cambia la natura dello scroll, si rende solo ogni
       layout fluido alle larghezze/densità telefono. Tutti i blocchi a 2
       colonne collassano a 1; gli scroll interni già presenti (catalogo,
       descrizione app) restano tali. */

    /* 01 · Video featured → mobile: cover editoriale prima, player sotto.
       Il contenuto SGNOOGLE apre la schermata; la preview resta però nel
       formato reale dei video (18:9), senza stretch verticale/crop aggressivi. */
    .sgn-featured {
      grid-template-areas: "info" "vid" !important;
      grid-template-columns: 1fr !important;
      grid-template-rows: auto minmax(0, 1fr) !important;
      align-content: stretch !important;
      flex: 1 1 auto !important;
      height: 100% !important;
      max-height: 100% !important;
      gap: 0 !important;
    }
    .sgn-feat-vid-col {
      min-height: 0 !important;
      box-sizing: border-box !important;
      padding: clamp(18px, 3.2vh, 42px) clamp(12px, 3.5vw, 16px) clamp(14px, 2.2vh, 20px) !important;
      border-top: none !important;
      align-items: flex-end !important;
      justify-content: center !important;
    }
    .sgn-feat-vid {
      flex: 0 0 auto !important;
      height: auto !important;
      width: 100% !important;
      aspect-ratio: 18 / 9 !important;
      margin: 0 !important;
      border: 0.5px solid var(--border) !important;
      box-sizing: border-box !important;
      background: var(--ink) !important;
    }
    /* Impilato: niente divisore verticale, pannello info compatto e gerarchico. */
    .sgn-feat-info {
      justify-content: flex-start !important;
      padding: clamp(16px, 2.3vh, 22px) clamp(12px, 3.5vw, 16px) clamp(14px, 2vh, 18px) !important;
      gap: clamp(9px, 1.35vh, 13px) !important;
      border-left: none !important;
    }
    .sgn-feat-title {
      font-size: clamp(15px, 4.5vw, 20px) !important;
      -webkit-line-clamp: 2 !important;
      margin-top: clamp(6px, 1vh, 10px) !important;
    }
    .sgn-feat-desc-panel {
      flex: 0 1 auto !important;
      min-height: 0 !important;
      max-height: clamp(56px, 10.5vh, 78px) !important;
    }
    .sgn-feat-desc {
      display: -webkit-box !important;
      -webkit-box-orient: vertical !important;
      -webkit-line-clamp: 3 !important;
      overflow: hidden !important;
      font-size: clamp(10px, 2.85vw, 12px) !important;
      line-height: 1.42 !important;
    }
    .sgn-feat-stats { margin-top: 0 !important; }
    .sgn-feat-stat-cell {
      flex-direction: row !important;
      align-items: baseline !important;
      justify-content: space-between !important;
      gap: 8px !important;
      padding: 9px 10px !important;
      text-align: left !important;
    }
    .sgn-feat-stat-value {
      font-size: clamp(13px, 3.7vw, 16px) !important;
      letter-spacing: -0.015em !important;
    }
    .sgn-feat-stat-label {
      order: -1;
      font-size: 8px !important;
      letter-spacing: 0.14em !important;
      white-space: nowrap;
    }
    .sgn-feat-foot { gap: clamp(8px, 1.2vh, 12px) !important; }
    /* CTA a tutta larghezza = bersaglio tap ampio, label centrata, ma più compatta. */
    .sgn-feat-cta {
      align-self: stretch !important;
      width: 100% !important;
      height: 38px !important;
      min-height: 38px !important;
    }
    .sgn-feat-cta .sgn-cta__icon { width: 38px !important; }
    .sgn-feat-cta .sgn-cta__label {
      flex: 1 1 auto !important;
      justify-content: center !important;
      font-size: 10px !important;
      letter-spacing: 0.17em !important;
    }

    /* 01b · ULTIMI VIDEO → su mobile la griglia collassa a 1 colonna: aggancio
       dolce (proximity) della cima di ogni card così si vede sempre intera,
       senza che lo snap "combatta" col dito (no mandatory). Desktop = libero. */
    .sgn-video-grid {
      scroll-snap-type: y proximity;
      scroll-padding-top: 4px;
    }
    .sgn-video-grid > * { scroll-snap-align: start; }

    /* 02 · STL → viewer in alto, catalogo sotto (mantiene il suo scroll) */
    .sgn-stl-grid {
      grid-template-columns: 1fr !important;
      grid-template-rows: minmax(200px, 42%) minmax(0, 1fr) !important;
    }

    /* 04 · Link → in verticale: schede a tutta larghezza, scroll col dito
       su/giù (NON la strip orizzontale del desktop). Le frecce ← → orizzontali
       dell'header spariscono; al loro posto, NELLO STESSO angolo in alto a
       destra dell'header (che resta sempre visibile mentre le schede scorrono),
       compaiono due frecce ↑ ↓ affiancate e compatte. Niente più colonna
       laterale di affordance. */
    .sgn-link-arrows { display: none !important; }
    .sgn-link-arrows-m { display: inline-flex !important; }
    .sgn-link-scroller {
      flex-direction: column !important;
      align-items: stretch !important;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      scroll-snap-type: y proximity !important;
      gap: clamp(12px, 1.6vh, 18px) !important;
      -webkit-mask-image: linear-gradient(to bottom, #000 calc(100% - 18px), transparent) !important;
      mask-image: linear-gradient(to bottom, #000 calc(100% - 18px), transparent) !important;
    }
    .sgn-link-scroller > [data-link-card] {
      height: auto !important;
      aspect-ratio: 4 / 3 !important;
      width: 100% !important;
      min-width: 0 !important;
      flex: 0 0 auto !important;
    }
    /* La prima card è la hero/azione primaria: stesso contenuto, più respiro. */
    .sgn-link-hero-card {
      min-height: clamp(320px, 48vh, 420px) !important;
      aspect-ratio: auto !important;
      justify-content: space-between !important;
      padding: clamp(28px, 7vw, 40px) clamp(28px, 7vw, 40px) clamp(22px, 6vw, 34px) !important;
      padding-left: clamp(32px, 8vw, 46px) !important;
      gap: clamp(24px, 4vh, 42px) !important;
    }
    .sgn-link-hero-title {
      font-size: clamp(38px, 11vw, 54px) !important;
      line-height: 0.92 !important;
      max-width: 9ch !important;
      margin-top: clamp(18px, 4vh, 42px) !important;
    }
    .sgn-link-hero-cta {
      width: 100% !important;
      align-self: stretch !important;
      margin-top: auto !important;
    }
    .sgn-link-hero-cta .sgn-cta__label {
      flex: 1 1 auto !important;
      justify-content: center !important;
    }

    /* 05 · Contatti → lista command a una colonna, tap target generoso */
    .sgn-contact-grid {
      grid-template-columns: 1fr !important;
      grid-template-rows: none !important;
      grid-auto-rows: minmax(58px, auto) !important;
    }
    .sgn-contact-grid > a { grid-column: 1 / -1 !important; }
    .sgn-contact-grid > a > span:nth-of-type(2) { flex: 0 0 76px !important; }
    .sgn-contact-grid > a > span:nth-of-type(3) { font-size: clamp(12px, 3.3vw, 15px) !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .sgn-display-inner { scroll-behavior: auto; }
  }

  /* ── Viewport bassi: telefono in landscape, finestre corte, split-view.
        Il breakpoint mobile è solo sulla LARGHEZZA, quindi qui (altezza
        piccola ma larghezza > 760) la striscia in basso schiaccerebbe il
        display a una fessura. La comprimiamo e riduciamo i margini verticali.
        Il video resta 18:9 (gestito da container-query, nessuna banda nera). */
  @media (max-height: 560px) {
    .sgn-page {
      padding-top: clamp(6px, 1.5vh, 12px);
      padding-bottom: max(clamp(8px, 1.5vh, 14px), env(safe-area-inset-bottom));
    }
    .sgn-frame {
      --frame-gap: clamp(8px, 1.4vh, 14px);
      grid-template-rows: 1fr clamp(92px, 22vh, 150px);
      gap: var(--frame-gap);
    }
  }

  /* ── Range tablet / desktop stretto (761–1024): NESSUN reflow — la UX
        resta identica al desktop, si toglie solo un filo di cromo verticale
        così il display respira nelle finestre intermedie. ── */
  @media (min-width: 761px) and (max-width: 1024px) {
    .sgn-frame {
      --frame-gap: clamp(12px, 1.8vh, 18px);
      grid-template-rows: 1fr clamp(132px, 21vh, 176px);
      gap: var(--frame-gap);
    }
  }

  /* ── Focus da tastiera (desktop): il linguaggio di selezione del sito vive
        tutto su hover/active, e le regole :focus-visible stavano SOLO dentro

<script>
/* Tiny WebAudio click engine — game-menu style ticks.
   v3.3: distinct hover / click / confirm / back / boot envelopes,
   all much quieter and crisper than the v3.1 beeps. */

(function() {
  let ctx = null;
  let enabled = false;

  function ensureCtx() {
    if (!ctx) {
      try {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { ctx = null; }
    }
    return ctx;
  }

  /* Single-note: shaped envelope (attack → quick decay).
     freq: Hz; dur: total seconds; vol: peak amplitude;
     type: oscillator type; bend: ratio to ramp pitch to over dur. */
  function note(ac, { freq, dur, vol, type = 'sine', bend = 0.7, when = 0 }) {
    const start = ac.currentTime + when;
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq * bend), start + dur);

    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(vol, start + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);

    osc.connect(gain).connect(ac.destination);
    osc.start(start);
    osc.stop(start + dur + 0.01);
  }

  function play(seq) {
    if (!enabled) return;
    const ac = ensureCtx();
    if (!ac) return;
    if (ac.state === 'suspended') ac.resume();
    seq.forEach((n) => note(ac, n));
  }

  /* Game-menu vocabulary:
     hover  — very soft high tick when entering a button (UI feedback)
     tick   — firmer click when activating
     confirm — two-note ascending (entering a module / picking a lang)
     back   — two-note descending (leaving a module)
     boot   — sparse low click during the boot bar fill */
  const presets = {
    hover:   [{ freq: 1400, dur: 0.024, vol: 0.032, type: 'sine'     }],
    tick:    [{ freq: 1800, dur: 0.022, vol: 0.035, type: 'triangle' }],
    confirm: [
      { freq: 1100, dur: 0.040, vol: 0.035, type: 'triangle', when: 0     },
      { freq: 1650, dur: 0.060, vol: 0.040, type: 'triangle', when: 0.045 },
    ],
    back: [
      { freq: 800,  dur: 0.040, vol: 0.030, type: 'triangle', when: 0     },
      { freq: 480,  dur: 0.070, vol: 0.035, type: 'triangle', when: 0.045 },
    ],
    boot: [{ freq: 1400, dur: 0.014, vol: 0.018, type: 'sine' }],
    // skill — variazione del 'boot' per il riempimento delle barre competenze:
    // stesso click meccanico, timbro un filo più brillante (triangle, +pitch).
    skill: [{ freq: 1500, dur: 0.016, vol: 0.020, type: 'triangle' }],
    bootReady: [
      { freq:  880, dur: 0.055, vol: 0.050, type: 'triangle', bend: 0.99, when: 0    },
      { freq: 1319, dur: 0.065, vol: 0.055, type: 'triangle', bend: 0.99, when: 0.06 },
      { freq: 1760, dur: 0.140, vol: 0.060, type: 'triangle', bend: 0.96, when: 0.13 },
    ],
  };

  window.sgnTick = function(kind = 'tick') {
    play(presets[kind] || presets.tick);
  };

  window.sgnAudio = {
    setEnabled(v) { enabled = !!v; },
    isEnabled()   { return enabled; },
    unlock() {
      const ac = ensureCtx();
      if (ac && ac.state === 'suspended') ac.resume();
    },
  };
})();

</script>
<script>
/* touch-select — solo su dispositivi senza hover.
   Il sito esprime la selezione con i corner-mark gialli all'hover; sul
   touch l'hover non esiste, quindi qui replichiamo lo stato "selezionato"
   come PERSISTENTE: un tap mette data-tapped sulla card e lo toglie dalle
   altre. Il CSS sotto @media (hover:none) accende i corner-mark su
   [data-tapped]. Nessun effetto sul desktop (hover:hover → return).
   Niente ombre, stessi marker gialli del desktop. */
(function () {
  var mq = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)');
  if (mq && mq.matches) return; // desktop con mouse: lascia fare all'hover

  function onTap(e) {
    var t = e.target;
    var card = t && t.closest ? t.closest('.sgn-card-hover') : null;
    var marked = document.querySelectorAll('.sgn-card-hover[data-tapped]');
    for (var i = 0; i < marked.length; i++) {
      if (marked[i] !== card) marked[i].removeAttribute('data-tapped');
    }
    if (card) card.setAttribute('data-tapped', '');
  }

  // pointerup copre touch e penna; capture per scattare prima di eventuali stopPropagation.
  document.addEventListener('pointerup', onTap, true);
})();

</script>

<script type="text/babel">
/* Shared primitives for SGN-OS v2.7+ : palette, tags, bars, pills, tiers. */

const C = {
  yellow: '#FFC200',
  paper:  '#F0F1F2',
  grey:   '#686A6C',
  ink:    '#28282C',
  white:  '#FFFFFF',
  borderSoft: 'rgba(120,122,124,0.2)',
  border: 'rgba(120,122,124,0.3)',
  borderHair: 'rgba(120,122,124,0.15)',
  faint: '#727476',
  yellowSoft: 'rgba(255,194,0,0.12)',
};

/* Padding unico per le FASCE DI TESTO dei box che contengono media
   (featured / griglia video / sponsor). Principio: il media va a filo
   della cornice (niente mat bianco intorno), il padding vive solo qui. */
const CARD_PAD = 'clamp(10px, 1vw, 14px)';

/* ───────── Tag / Label / Caption / Pill ───────── */

function Tag({ children, color = C.yellow, size = 10, style }) {
  return (
    <span style={{
      fontFamily: 'IBM Plex Mono, monospace',
      fontSize: size, fontWeight: 700,
      letterSpacing: '0.2em', textTransform: 'uppercase',
      color, ...style,
    }}>{children}</span>
  );
}

function Label({ children, color = C.grey, size = 10, style }) {
  return (
    <span style={{
      fontFamily: 'IBM Plex Mono, monospace',
      fontSize: size, fontWeight: 600,
      letterSpacing: '0.14em', textTransform: 'uppercase',
      color, ...style,
    }}>{children}</span>
  );
}

function Caption({ children, style }) {
  return (
    <span style={{
      fontFamily: 'IBM Plex Mono, monospace',
      fontSize: 9, fontWeight: 300,
      letterSpacing: '0.06em', color: C.faint, ...style,
    }}>{children}</span>
  );
}

/* Square pill — key/value chip used as a tag. No rounding (brand). */
function Pill({ k, v, gold, style }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'stretch',
      border: `0.5px solid ${gold ? C.yellow : C.border}`,
      background: gold ? C.yellowSoft : C.white,
      fontFamily: 'IBM Plex Mono, monospace',
      fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase',
      ...style,
    }}>
      <span style={{
        padding: '4px 8px',
        color: gold ? C.ink : C.faint,
        borderRight: `0.5px solid ${gold ? C.yellow : C.borderSoft}`,
        background: gold ? C.yellow : 'transparent',
        fontWeight: 700,
      }}>{k}</span>
      <span style={{ padding: '4px 10px', color: C.ink, fontWeight: 700 }}>{v}</span>
    </span>
  );
}

/* ───────── BarHeader — section divider giapponese: tacca gialla + label
   + hairline che corre fino a fine riga. Sostituisce i titoli "nudi" e
   dà lo schematismo da spec-sheet (▍ LABEL ─────). */
function BarHeader({ children, tick = C.yellow, color = C.ink, size = 9, style }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      flexShrink: 0, ...style,
    }}>
      <span style={{ width: 4, height: size + 4, background: tick, flexShrink: 0 }}/>
      <span style={{
        fontFamily: 'IBM Plex Mono, monospace',
        fontSize: size, fontWeight: 700, letterSpacing: '0.28em',
        color, whiteSpace: 'nowrap',
      }}>{children}</span>
      <span style={{ flex: 1, height: 0, borderTop: `0.5px solid ${C.borderSoft}`, minWidth: 0 }}/>
    </div>
  );
}

/* ───────── Bar — segmented 10-block stat bar.
   `value` 0-10. `active` controls fill animation timing. */

function Bar({ value, max = 10, gold, active = true, height = 6, gap = 3, delay = 0, sound = false }) {
  const [filled, setFilled] = useState(active ? 0 : value);
  const doneRef = React.useRef(false);
  useEffect(() => {
    if (!active) return;
    setFilled(0);
    doneRef.current = false;
    const start = performance.now();
    const dur = 700;
    let raf;
    const tick = (t) => {
      const elapsed = t - start - delay;
      if (elapsed < 0) { raf = requestAnimationFrame(tick); return; }
      const p = Math.min(1, elapsed / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setFilled(value * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
      // Un solo click quando la barra ha finito di riempirsi (niente ticchettio
      // per ogni tacca). Stesso timbro 'skill', feel del contatore di boot.
      else if (sound && value > 0 && !doneRef.current) {
        doneRef.current = true;
        if (window.sgnTick) window.sgnTick('skill');
      }
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value, active, delay]);

  return (
    <div style={{ display: 'flex', gap }}>
      {Array.from({ length: max }, (_, i) => (
        <div key={i} style={{
          flex: 1, height,
          background: i < filled
            ? (gold ? C.yellow : C.ink)
            : 'rgba(120,122,124,0.2)',
          transition: 'background 80ms linear',
        }}/>
      ))}
    </div>
  );
}

/* ───────── Progress — continuous bar (for stage / loading). */
function Progress({ value = 0, gold, active = true, height = 2, delay = 0 }) {
  const [w, setW] = useState(active ? 0 : value);
  useEffect(() => {
    if (!active) return;
    const t = setTimeout(() => setW(value), delay);
    return () => clearTimeout(t);
  }, [value, active, delay]);
  return (
    <div style={{ height, background: 'rgba(120,122,124,0.2)' }}>
      <div style={{
        height: '100%', width: `${w}%`,
        background: gold ? C.yellow : C.ink,
        transition: 'width 600ms cubic-bezier(0.2,0,0,1)',
      }}/>
    </div>
  );
}

/* ───────── TierBadge — S / A / B / C rank tag. S is gold. */
function TierBadge({ tier, size = 28 }) {
  const isS = tier === 'S';
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: size, height: size,
      background: isS ? C.yellow : C.white,
      border: `0.5px solid ${isS ? C.yellow : C.border}`,
      fontFamily: 'IBM Plex Mono, monospace',
      fontWeight: 700, fontSize: size * 0.55,
      color: C.ink, letterSpacing: '-0.02em',
    }}>{tier}</span>
  );
}

/* ───────── GhostNumber — huge faint section number background. */
function GhostNumber({ n, top = 0, right = 0, size = '20vw', opacity = 0.06 }) {
  return (
    <span aria-hidden style={{
      position: 'absolute', top, right,
      fontFamily: 'IBM Plex Mono, monospace', fontWeight: 700,
      fontSize: size, lineHeight: 0.85,
      letterSpacing: '-0.05em',
      color: C.ink, opacity,
      pointerEvents: 'none', userSelect: 'none',
    }}>{n}</span>
  );
}

Object.assign(window, { C, Tag, Label, Caption, Pill, Bar, BarHeader, Progress, TierBadge, GhostNumber });

</script>

<script type="text/babel">
/* ModuleIcon — 5 custom geometric icons, one per module.
   Sharp / angular language, no external libraries.
   Same SVG renders on web (small, secondary to number) and mobile (bottom nav).
   Pass `size` and `color` to scale + recolor. */

function ModuleIcon({ id, size = 18, color = 'currentColor', strokeWidth = 1.2 }) {
  const s = strokeWidth;
  const props = {
    width: size, height: size, viewBox: '0 0 24 24',
    fill: 'none', stroke: color, strokeWidth: s,
    strokeLinecap: 'square', strokeLinejoin: 'miter',
    'aria-hidden': true, style: { display: 'block', flexShrink: 0 },
  };
  switch (id) {
    case '01':
      // VIDEO — angular play chevron inside a frame.
      // Two cuts: outer frame + inward triangle. Reads as "play" without
      // resorting to the cliché filled triangle.
      return (
        <svg {...props}>
          <rect x="2.5" y="4.5" width="19" height="15"/>
          <polygon points="9.5,8.5 16.5,12 9.5,15.5" fill={color} stroke="none"/>
        </svg>
      );
    case '02':
      // OBJECTS — isometric cube, 3 visible faces drawn as polylines.
      // Echoes the STL viewer vocabulary.
      return (
        <svg {...props}>
          <polygon points="12,3 21,8 21,17 12,22 3,17 3,8"/>
          <polyline points="3,8 12,13 21,8"/>
          <line x1="12" y1="13" x2="12" y2="22"/>
        </svg>
      );
    case '03':
      // APPS — 2×2 sharp grid, no rounding, no rounded "app icons" cliche.
      return (
        <svg {...props}>
          <rect x="3" y="3" width="7.5" height="7.5"/>
          <rect x="13.5" y="3" width="7.5" height="7.5"/>
          <rect x="3" y="13.5" width="7.5" height="7.5"/>
          <rect x="13.5" y="13.5" width="7.5" height="7.5"/>
        </svg>
      );
    case '04':
      // LINK — two interlocking brackets, a chain link drawn from
      // straight strokes only. No round endcaps.
      return (
        <svg {...props}>
          <polyline points="9,4 4,4 4,11 9,11"/>
          <polyline points="15,13 20,13 20,20 15,20"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      );
    case '05':
      // ABOUT — silhouette as concentric square stack, the system's own
      // way to spell "person" without drawing a head-and-shoulders glyph.
      return (
        <svg {...props}>
          <rect x="9" y="3" width="6" height="6"/>
          <polyline points="3,21 3,13 21,13 21,21"/>
        </svg>
      );
    default:
      return <svg {...props}><rect x="4" y="4" width="16" height="16"/></svg>;
  }
}

Object.assign(window, { ModuleIcon });

/* ChannelGlyph — monogrammi geometrici per le celle contatti.
   Stesso linguaggio di ModuleIcon: viewBox 24, solo tratti, square-cap,
   nessun arrotondamento. NON sono i loghi ufficiali: sono marchi generici
   in stile-casa (busta, play-in-frame, fotocamera squadrata, croce). */
function ChannelGlyph({ id, size = 22, color = 'currentColor', strokeWidth = 1.2 }) {
  const props = {
    width: size, height: size, viewBox: '0 0 24 24',
    fill: 'none', stroke: color, strokeWidth,
    strokeLinecap: 'square', strokeLinejoin: 'miter',
    'aria-hidden': true, style: { display: 'block', flexShrink: 0 },
  };
  switch ((id || '').toUpperCase()) {
    case 'EMAIL':
      // busta: rettangolo + lembo a V, tutto a tratti dritti.
      return (
        <svg {...props}>
          <rect x="3" y="6" width="18" height="12"/>
          <polyline points="3,7 12,13 21,7"/>
        </svg>
      );
    case 'YOUTUBE':
      // play-in-frame: stessa grammatica della 01 VIDEO.
      return (
        <svg {...props}>
          <rect x="3" y="6" width="18" height="12"/>
          <polygon points="10.5,9.5 15.5,12 10.5,14.5" fill={color} stroke="none"/>
        </svg>
      );
    case 'INSTAGRAM':
      // fotocamera squadrata: cornice + obiettivo quadrato + tacca lente.
      return (
        <svg {...props}>
          <rect x="4" y="4" width="16" height="16"/>
          <rect x="9" y="9" width="6" height="6"/>
          <rect x="16" y="6.5" width="1.6" height="1.6" fill={color} stroke="none"/>
        </svg>
      );
    case 'X':
      // croce: due tratti incrociati, square-cap.
      return (
        <svg {...props}>
          <line x1="5" y1="5" x2="19" y2="19"/>
          <line x1="19" y1="5" x2="5" y2="19"/>
        </svg>
      );
    default:
      return <svg {...props}><rect x="5" y="5" width="14" height="14"/></svg>;
  }
}

Object.assign(window, { ModuleIcon, ChannelGlyph });

</script>

<script type="text/babel">
/* PageDeck — paginazione verticale a snap mandatory.
   Ogni `<Page>` figlio occupa esattamente lo spazio del display, niente
   scroll interno: il contenuto di una pagina deve stare dentro o si
   adatta. La navigazione tra pagine avviene con:
     - ↑/↓ (gestito dal parent che ascolta keydown)
     - swipe verticale (touch)
     - side-card pager esterno (vedi index.html .sgn-pager-card)

   Ogni Page può portare `label`: PageDeck legge le label tramite
   React.Children e — quando la pagina attiva cambia — pubblica
   { label, index, total, goto, labels } a window.SgnPageMetaContext.
   Così la TopBar può mostrare la sub-label al centro e la side-card
   pager può richiamare goto(i) per saltare a una pagina specifica.

   Esposto sul window come PageDeck + Page + PageTitle. */
const SgnPageMetaContext = React.createContext({ setMeta: () => {} });

function PageDeck({ children, headerless = false }) {
  const pages = React.Children.toArray(children).filter(Boolean);
  const total = pages.length;
  const labels = pages.map(p => (p && p.props && p.props.label) || '');
  const [page, setPage] = React.useState(0);
  const scrollerRef = React.useRef(null);
  const lastScrollSyncRef = React.useRef(0);
  const { setMeta } = React.useContext(SgnPageMetaContext);

  // Goto via scroll — dichiarato prima dell'useEffect che lo publica.
  const goto = React.useCallback((i) => {
    const clamped = Math.max(0, Math.min(total - 1, i));
    const el = scrollerRef.current;
    if (!el) return;
    el.scrollTo({ top: clamped * el.clientHeight, behavior: 'smooth' });
    setPage(clamped);
    if (window.sgnTick) window.sgnTick('tick');
  }, [total]);

  // Publish current page meta upward whenever it changes (or on first mount).
  // Esponiamo anche `goto` così la side-card pager può saltare alle pagine.
  React.useEffect(() => {
    setMeta({ label: labels[page] || '', index: page, total, goto, labels });
  }, [page, total, labels[page], setMeta, goto]);
  // Reset to neutral on unmount so the topbar doesn't show a stale label.
  React.useEffect(() => {
    return () => setMeta({ label: '', index: 0, total: 0, goto: null, labels: [] });
  }, [setMeta]);

  // Keep `page` in sync with scrollTop in case the user scrolls/swipes manually.
  React.useEffect(() => {
    const el = scrollerRef.current;
    if (!el) return undefined;
    function onScroll() {
      const now = performance.now();
      // Throttle to ~60Hz max
      if (now - lastScrollSyncRef.current < 16) return;
      lastScrollSyncRef.current = now;
      const h = el.clientHeight;
      if (h === 0) return;
      const idx = Math.round(el.scrollTop / h);
      setPage(prev => prev === idx ? prev : idx);
    }
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, [total]);

  // Listen for "deck-nav" custom events bubbled up from the App (keyboard).
  React.useEffect(() => {
    const el = scrollerRef.current;
    if (!el) return undefined;
    function onNav(e) {
      const dir = e.detail?.dir;
      if (dir === 'next') goto(page + 1);
      else if (dir === 'prev') goto(page - 1);
    }
    el.addEventListener('sgn-deck-nav', onNav);
    return () => el.removeEventListener('sgn-deck-nav', onNav);
  }, [page, goto]);

  return (
    <div
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
      }}>
      <div
        ref={scrollerRef}
        data-page-deck
        className="sgn-deck-scroll"
        style={{
          flex: 1, minHeight: 0,
          overflowY: 'auto', overflowX: 'hidden',
          scrollSnapType: 'y mandatory',
          scrollBehavior: 'smooth',
          scrollbarWidth: 'none',
        }}>
        {pages.map((child, i) => (
          <div key={i} className="sgn-page" style={{
            scrollSnapAlign: 'start',
            scrollSnapStop: 'always',
            height: '100%',
            minHeight: '100%',
            boxSizing: 'border-box',
            padding: 'clamp(16px, 2.5vw, 32px)',
            display: 'flex', flexDirection: 'column',
            overflow: 'hidden',
          }}>
            {child}
          </div>
        ))}
      </div>
    </div>
  );
}

/* Page — singolo pannello. Riempie verticalmente. È un flex column.
   Il contenuto interno DEVE essere dimensionato per stare nello spazio
   (niente overflow). Cinta a margini comuni via padding del PageDeck.
   Accetta `label`: PageDeck la raccoglie e la mostra in TopBar. */
function Page({ children, justify = 'flex-start', align = 'stretch', label }) {
  return (
    <div style={{
      flex: 1, minHeight: 0,
      display: 'flex', flexDirection: 'column',
      justifyContent: justify, alignItems: align,
      gap: 'clamp(14px, 2vh, 22px)',
    }}>{children}</div>
  );
}

/* PageTitle — header standard di una pagina dentro un deck.
   Numero pagina (piccolo) + titolo + sottotitolo opzionale.
   Usato dai moduli quando una pagina è "parte di una storia". */
function PageTitle({ label, sub }) {
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 4,
      flexShrink: 0,
    }}>
      <span style={{
        fontFamily: 'IBM Plex Mono, monospace',
        fontSize: 10, fontWeight: 700, letterSpacing: '0.22em',
        color: C.faint,
      }}>{label}</span>
      {sub && (
        <span style={{
          fontFamily: 'IBM Plex Mono, monospace',
          fontSize: 11, color: C.grey, letterSpacing: '0.04em',
        }}>{sub}</span>
      )}
    </div>
  );
}

Object.assign(window, { PageDeck, Page, PageTitle, SgnPageMetaContext });

</script>

<script type="text/babel">
/* Animation primitives — count-up, intersection-based reveal, stagger.
   All durations linear or sharp-bezier per brand rules (no bounce, no spring). */

const { useState, useEffect, useRef } = React;

/* Format helpers for number display. */
function formatStat(raw, fmt) {
  if (fmt === 'short') {
    if (raw >= 1e6) return (raw / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    if (raw >= 1e3) return Math.round(raw / 1e3) + 'K';
    return String(Math.round(raw));
  }
  if (fmt === 'int') return String(Math.round(raw));
  if (fmt === 'oneDecimal') return raw.toFixed(1);
  if (fmt === 'oneDecimalM') return raw.toFixed(1) + 'M';
  return String(raw);
}

/* useCountUp — animates from 0 → target while `active` is true.
   Returns the current display string. Easing: ease-out for "settle" feel. */
function useCountUp(target, { duration = 1200, fmt = 'int', active = true } = {}) {
  const [value, setValue] = useState(active ? 0 : target);
  const startRef = useRef(null);
  const rafRef = useRef(null);

  useEffect(() => {
    if (!active) return;
    setValue(0);
    startRef.current = null;
    const tick = (t) => {
      if (startRef.current == null) startRef.current = t;
      const elapsed = t - startRef.current;
      const p = Math.min(1, elapsed / duration);
      // ease-out cubic for a "ratcheting" settle
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(target * eased);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, [target, duration, active]);

  return formatStat(value, fmt);
}

/* useInView — fires `true` once the element scrolls into view.
   Returns [ref, inView]. Sticky: stays true after first trigger. */
function useInView({ threshold = 0.25, once = true } = {}) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);

  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      (entries) => {
        for (const e of entries) {
          if (e.isIntersecting) {
            setInView(true);
            if (once) obs.disconnect();
          } else if (!once) {
            setInView(false);
          }
        }
      },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold, once]);

  return [ref, inView];
}

/* useStagger — returns delays for an indexed array.
   Use as: const delays = useStagger(items.length, 60); */
function useStagger(count, step = 60, base = 0) {
  return Array.from({ length: count }, (_, i) => base + i * step);
}

Object.assign(window, { useCountUp, useInView, useStagger, formatStat });

</script>

<script type="text/babel">
/* Hero3DMark — wireframe F monogram rotating slowly in 3D background of home.
   CSS 3D transforms only — no canvas, no WebGL.
   Reacts to mouse on desktop (subtle parallax), self-rotates on mobile.
   Strokes only, monochrome grey/yellow — never the focal point, always
   the *atmosphere* behind the wordmark. */

function Hero3DMark({ mobile, color = C.borderSoft, accent = C.yellow }) {
  const wrapRef = React.useRef(null);
  const [tilt, setTilt] = React.useState({ x: 0, y: 0 });

  // Desktop parallax
  React.useEffect(() => {
    if (mobile) return;
    function onMove(e) {
      const w = window.innerWidth, h = window.innerHeight;
      const nx = (e.clientX / w - 0.5) * 2;  // -1..1
      const ny = (e.clientY / h - 0.5) * 2;
      setTilt({ x: nx * 14, y: ny * 10 });
    }
    window.addEventListener('mousemove', onMove);
    return () => window.removeEventListener('mousemove', onMove);
  }, [mobile]);

  return (
    <div aria-hidden style={{
      position: 'absolute', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      pointerEvents: 'none', overflow: 'hidden',
      perspective: '900px',
    }}>
      <div style={{
        width: 'min(620px, 70vw)', aspectRatio: '1/1',
        transformStyle: 'preserve-3d',
        transform: `rotateX(${-tilt.y}deg) rotateY(${tilt.x}deg)`,

/* loadThreeSTL — loader on-demand per il modulo Objects.

  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[src="${src}"]`);
    if (existing) {
      if (existing.dataset.loaded === '1') resolve();
      else {
        existing.addEventListener('load', resolve, { once: true });
        existing.addEventListener('error', reject, { once: true });
      }
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.crossOrigin = 'anonymous';
    script.onload = () => { script.dataset.loaded = '1'; resolve(); };
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

  if (window.THREE?.STLLoader) return Promise.resolve(window.THREE);

}

  if (cached?.geometry) return Promise.resolve(cached.geometry);
  if (cached?.promise) return cached.promise;

      geometry.center();

}

    let cancelled = false, innerCleanup = null;

    // l'animazione di separazione della top bar: aprendo questa tab l'init
    // della GPU girava nel frame del morph (height/margin = layout) e lo

    // (transitionend), con un fallback a tempo se non c'è transizione.
    let started = false;
    const begin = () => {
      if (started || cancelled || !mountRef.current) return;
      started = true;
      innerCleanup = (() => {
    const THREE = window.THREE;
    const el = mountRef.current;
    // Guardia: se il layout non ha ancora dato dimensioni al contenitore,
    // usa fallback ragionevoli — il ResizeObserver correggerà appena il grid

    const w = el.clientWidth  || 600;
    const h = el.clientHeight || 400;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xFFFFFF);

    const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 2000);
    camera.position.set(0, 0, 360);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    renderer.setSize(w, h);
    el.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(80, 120, 200);
    scene.add(dir);

    // Subtle grid floor
    const grid = new THREE.GridHelper(400, 20, 0x787A7C, 0xC7C8C9);
    grid.material.opacity = 0.10;
    grid.material.transparent = true;
    grid.position.y = -110;
    scene.add(grid);

    // Group container — we swap its child on model change.
    const holder = new THREE.Group();
    scene.add(holder);

    // ── Interaction
    let rotX = -0.25, rotY = 0.3;
    let dragging = false, dragSx = 0, dragSy = 0, dragRx = 0, dragRy = 0;
    spinRef.current.autoSpin = true;

    // La rotazione automatica si ferma quando l'utente tocca/trascina o usa le
    // frecce, e riparte da sola qualche secondo dopo l'ultima interazione.
    // Durante il drag il timer resta sospeso (riparte al rilascio).

    let resumeTimer = null;
    const pauseSpin = () => {
      spinRef.current.autoSpin = false;
      if (resumeTimer) { clearTimeout(resumeTimer); resumeTimer = null; }
    };
    const scheduleResume = () => {
      if (resumeTimer) clearTimeout(resumeTimer);
      resumeTimer = setTimeout(() => { spinRef.current.autoSpin = true; resumeTimer = null; }, RESUME_DELAY);
    };

    const onDown = (e) => {
      dragging = true; pauseSpin();
      const p = e.touches ? e.touches[0] : e;
      dragSx = p.clientX; dragSy = p.clientY;
      dragRx = rotX;      dragRy = rotY;
    };
    const onMove = (e) => {
      if (!dragging) return;
      const p = e.touches ? e.touches[0] : e;
      const dx = p.clientX - dragSx;
      const dy = p.clientY - dragSy;
      rotY = dragRy + dx * 0.01;
      rotX = Math.max(-1.2, Math.min(1.2, dragRx + dy * 0.01));
    };
    const onUp = () => { if (dragging) { dragging = false; scheduleResume(); } };

    const onKey = (e) => {
      const step = 0.18;
      let handled = true;
      switch (e.key) {
        case 'ArrowLeft':  rotY -= step; break;
        case 'ArrowRight': rotY += step; break;
        case 'ArrowUp':    rotX = Math.max(-1.2, rotX - step); break;
        case 'ArrowDown':  rotX = Math.min(1.2,  rotX + step); break;
        default: handled = false;
      }
      if (handled) { pauseSpin(); scheduleResume(); e.preventDefault(); }
    };

    el.addEventListener('keydown', onKey);
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup',   onUp);

    // ── Pinch-to-zoom (mobile, due dita): varia la distanza della camera tra
    // limiti. `el` ha già touch-action:none → il gesto non zooma la pagina. Un
    // solo dito resta drag-per-ruotare (pointer events sopra); col secondo dito
    // si annulla il drag e si entra in pinch, così non ruota mentre zoomi.
    const MIN_Z = 150, MAX_Z = 700;

    const touchDist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);

      const edgeMat = new THREE.LineBasicMaterial({ color: 0x28282C, linewidth: 1, transparent: true, opacity: 0 });

      const edges = new THREE.EdgesGeometry(geometry, 15);
      const lines = new THREE.LineSegments(edges, edgeMat);

      group.add(lines);

    }

      Promise.all([exitDone, loadCachedSTLGeometry(THREE, obj).catch(() => null)])
        .then(([, geometry]) => {
          if (cancelled) { geometry?.dispose?.(); return; }
          if (geometry) {
            const { group, materials } = buildSTLGroup(geometry);
            holder.add(group);
            nextAttached = true;
            revealModel(group, materials);
          } else {
            const fallback = buildProceduralModel(THREE, currentId);
            holder.add(fallback);
            nextAttached = true;
            revealModel(fallback, collectMaterials(fallback));
          }
        });
      return () => { cancelled = true; };
    }

    exitDone.then(() => {
      if (cancelled) return;
      const fallback = buildProceduralModel(THREE, currentId);
      holder.add(fallback);
      nextAttached = true;
      revealModel(fallback, collectMaterials(fallback));
    });
    return () => { cancelled = true; };
  }, [currentId, ready, booted]);

    <div style={{
      height: '100%', minHeight: 0,
      display: 'grid',
      gridTemplateColumns: 'minmax(0, 1.4fr) minmax(260px, 1fr)',
      gap: 'clamp(12px, 1.5vw, 22px)',
    }} className="sgn-stl-grid">
      {/* Viewer */}
      <div className="sgn-stl-viewer" style={{
        position: 'relative',
        background: C.white,
        border: `0.5px solid ${C.border}`,
        minHeight: 0,
      }}>
        <div ref={mountRef}
          tabIndex={ready ? 0 : -1}
          role="img"
          aria-label={(lang === 'it' ? 'Modello 3D: ' : '3D model: ') + (current?.name || '') + (lang === 'it' ? ' — usa le frecce per ruotare' : ' — use arrow keys to rotate')}
          style={{
          position: 'absolute', inset: 0,
          touchAction: 'none', cursor: 'grab', outlineOffset: '-2px',
        }}/>

          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 10, letterSpacing: '0.22em', color: C.faint,
          }}>LOADING · THREE.JS</div>

/* ──────────────────────────────────────────────────────────────────
   buildProceduralModel — geometrie procedurali per ogni voce della
   lista. Sostituire con STLLoader.load(path) appena gli .stl reali
   atterrano in /assets/models/.
   Tutti i modelli sono in giallo brand + edges ink, sempre coerenti.
   ────────────────────────────────────────────────────────────────── */
function buildProceduralModel(THREE, id) {
  const group = new THREE.Group();
  const fillMat = new THREE.MeshLambertMaterial({ color: 0xEDB200 }); // ambra brand leggermente smorzato per il 3D (meno flashy del giallo #FFC200)
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x28282C, linewidth: 1 });

  function addMesh(geom) {
    group.add(new THREE.Mesh(geom, fillMat));
    const edges = new THREE.EdgesGeometry(geom, 18);
    group.add(new THREE.LineSegments(edges, edgeMat));
  }

  // Fallback procedurale (usato solo se il caricamento dell'STL reale fallisce):
  // CMF GameBoy Slide — corpo rettangolare con guida laterale.
  const body = new THREE.BoxGeometry(200, 18, 96);
  body.translate(0, 0, 0);
  addMesh(body);
  const rail = new THREE.BoxGeometry(200, 7, 10);
  rail.translate(0, -12, 0);
  addMesh(rail);

  // Center + scale: `group` viene centrato all'origine, poi avvolto in un
  // wrapper esterno che fa lo scaling. Così il fit avviene attorno al centro
  // (lo scaling di `group` direttamente, dopo position.sub, sposterebbe il
  // modello fuori asse di center*(k-1)).
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  group.position.sub(center);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const target = 180;
  const wrapper = new THREE.Group();
  wrapper.add(group);
  if (maxDim > 0) wrapper.scale.setScalar(target / maxDim);
  return wrapper;
}

function CTA({ label, href, onClick, target, as, size = 'md', dir = 'up-right', className = '', style, ...rest }) {

    className: `sgn-cta${interactive ? ' sgn-hot' : ''}${className ? ' ' + className : ''}`,

    onClick,
    ...rest,

  return (
    <Tag {...tagProps}>

/* ── Helpers per i metadati live del featured video ── */
function fmtViews(n) {
  if (!n) return '—';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}
function fmtDur(iso) {
  const m = iso?.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
  if (!m) return '—';
  const h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), sec = parseInt(m[3] || 0);
  if (h > 0) return `${h}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${min}:${String(sec).padStart(2,'0')}`;
}
function fmtPubDate(iso, lang) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const M = lang === 'it'
    ? ['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC']
    : ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

/* useFeaturedVideoMeta — due fetch dirette a YouTube Data v3 con la key
   Google Cloud del sito: playlistItems → ultimo upload, poi videos → stats. */
function useFeaturedVideoMeta() {
  const [meta, setMeta] = React.useState(() => {
    try {
      const cached = JSON.parse(localStorage.getItem('sgn_feat_v3')) || null;
      return cached?.channelId === CHANNEL_ID ? cached : null;
    } catch { return null; }
  });
  React.useEffect(() => {
    if (!YT_API_KEY) return;
    let alive = true;
    const listUrl = 'https://www.googleapis.com/youtube/v3/playlistItems'
      + '?part=snippet,contentDetails&maxResults=1&playlistId=' + UPLOADS_PID
      + '&key=' + YT_API_KEY;
    fetch(listUrl)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => {
        const item = d?.items?.[0];
        const sn = item?.snippet || {};
        const videoId = item?.contentDetails?.videoId || sn.resourceId?.videoId;
        if (!alive || !videoId || sn.channelId !== CHANNEL_ID) return;
        return fetch('https://www.googleapis.com/youtube/v3/videos'
          + '?part=statistics,contentDetails,snippet&id=' + videoId + '&key=' + YT_API_KEY)
          .then(r => r.ok ? r.json() : Promise.reject(r.status))
          .then(sd => {
            const video = sd?.items?.[0];
            const { statistics: stats = {}, contentDetails: cd = {}, snippet: vs = {} } = video || {};
            if (!alive || !video || vs.channelId !== CHANNEL_ID) return;
            const fresh = {
              videoId, youtubeId: videoId, channelId: CHANNEL_ID, uploadsPlaylistId: UPLOADS_PID,
              title: vs.title || sn.title, publishedAt: vs.publishedAt || item.contentDetails?.videoPublishedAt || sn.publishedAt,
              views: parseInt(stats.viewCount || 0, 10),
              likes: parseInt(stats.likeCount || 0, 10),
              duration: cd.duration,
              description: vs.description || '',
              thumbnail: vs.thumbnails?.maxres?.url || vs.thumbnails?.high?.url || vs.thumbnails?.medium?.url || '',
              url: 'https://www.youtube.com/watch?v=' + videoId,
            };
            try { localStorage.setItem('sgn_feat_v3', JSON.stringify(fresh)); } catch {}
            if (alive) setMeta(fresh);
          });
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);
  return meta;
}

/* useLatestUploads — popola la pagina 2 con gli ULTIMI video reali del canale.
   Usa direttamente la API key Google Cloud limitata a sgnoogle.com. */
function useLatestUploads() {
  const [rest, setRest] = React.useState(() => VIDEOS.slice(1));
  React.useEffect(() => {
    if (!YT_API_KEY) return;
    let alive = true;
    const url = 'https://www.googleapis.com/youtube/v3/playlistItems'
      + '?part=snippet,contentDetails&maxResults=13&playlistId=' + UPLOADS_PID
      + '&key=' + YT_API_KEY;
    fetch(url)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        if (!alive || !Array.isArray(data?.items)) return;
        const mapped = data.items.map(it => {
          const s = it.snippet || {};
          const vid = it.contentDetails?.videoId || s.resourceId?.videoId;
          if (!vid || s.channelId !== CHANNEL_ID) return null;
          return {
            id: vid, youtubeId: vid,
            title: (s.title || '').toUpperCase(),
            cat: 'YOUTUBE',
            url: 'https://www.youtube.com/watch?v=' + vid,
          };
        }).filter(Boolean);
        // [0] = ultimo upload = già in primo piano → lo escludo dalla griglia
        if (mapped.length > 1) setRest(mapped.slice(1));
      })
      .catch(() => { /* tiene il fallback curato */ });
    return () => { alive = false; };
  }, []);
  return rest;
}
