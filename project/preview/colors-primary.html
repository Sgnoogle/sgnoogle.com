<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); width: 100%; height: 100%; }
  .cell { display: flex; flex-direction: column; }
  .swatch { flex: 1; position: relative; }
  .meta { padding: 12px 14px; background: var(--white); border-top: 0.5px solid var(--border); }
  .hex { font-size: 13px; font-weight: 600; color: var(--ink); display: block; margin-bottom: 4px; letter-spacing: 0; }
  .name { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey); display: block; }
</style>
</head>
<body style="padding: 0;">
  <div class="grid">
    <div class="cell">
      <div class="swatch" style="background: #FFC200;"></div>
      <div class="meta"><span class="hex">#FFC200</span><span class="name">Giallo</span></div>
    </div>
    <div class="cell">
      <div class="swatch" style="background: #F0F1F2; outline: 1px dashed rgba(120,122,124,0.4); outline-offset: -8px;"></div>
      <div class="meta"><span class="hex">#F0F1F2</span><span class="name">Acciaio Chiaro</span></div>
    </div>
    <div class="cell">
      <div class="swatch" style="background: #787A7C;"></div>
      <div class="meta"><span class="hex">#787A7C</span><span class="name">Grigio</span></div>
    </div>
    <div class="cell">
      <div class="swatch" style="background: #28282C;"></div>
      <div class="meta"><span class="hex">#28282C</span><span class="name">Antracite</span></div>
    </div>
    <div class="cell">
      <div class="swatch" style="background: #FFFFFF; border: 0.5px solid var(--border);"></div>
      <div class="meta"><span class="hex">#FFFFFF</span><span class="name">Bianco</span></div>
    </div>
  </div>
</body>
</html>
