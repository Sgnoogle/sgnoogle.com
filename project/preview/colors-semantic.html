<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 32px; align-content: start; }
  .tok { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 0.5px dashed var(--border-soft); }
  .chip { width: 22px; height: 22px; flex-shrink: 0; border: 0.5px solid var(--border-soft); }
  .name { font-size: 10px; font-weight: 600; color: var(--ink); flex: 1; }
  .val { font-size: 9px; color: var(--grey); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="tok"><div class="chip" style="background:#F0F1F2;"></div><span class="name">--bg</span><span class="val">paper</span></div>
  <div class="tok"><div class="chip" style="background:#28282C;"></div><span class="name">--fg</span><span class="val">ink</span></div>
  <div class="tok"><div class="chip" style="background:#FFFFFF;"></div><span class="name">--bg-elevated</span><span class="val">white</span></div>
  <div class="tok"><div class="chip" style="background:#787A7C;"></div><span class="name">--fg-muted</span><span class="val">grey</span></div>
  <div class="tok"><div class="chip" style="background:#28282C;"></div><span class="name">--bg-inverse</span><span class="val">ink</span></div>
  <div class="tok"><div class="chip" style="background:rgba(120,122,124,0.5);"></div><span class="name">--fg-faint</span><span class="val">grey 50%</span></div>
  <div class="tok"><div class="chip" style="background:#FFC200;"></div><span class="name">--accent</span><span class="val">yellow</span></div>
  <div class="tok"><div class="chip" style="background:#FFC200;"></div><span class="name">--fg-accent</span><span class="val">yellow</span></div>
  <div class="tok"><div class="chip" style="background:rgba(120,122,124,0.3);"></div><span class="name">--border</span><span class="val">grey 30%</span></div>
  <div class="tok"><div class="chip" style="background:rgba(120,122,124,0.2);"></div><span class="name">--border-soft</span><span class="val">grey 20%</span></div>
  <div class="tok"><div class="chip" style="background:rgba(120,122,124,0.15);"></div><span class="name">--border-hair</span><span class="val">grey 15%</span></div>
  <div class="tok"><div class="chip" style="background:#FFFFFF; color:#28282C; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700;">A</div><span class="name">--fg-on-yellow</span><span class="val">ink</span></div>
</body>
</html>
