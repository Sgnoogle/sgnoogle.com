<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 30px 40px; display: flex; align-items: center; justify-content: center; }
  .card { position: relative; border-left: 3px solid var(--yellow); padding: 20px 28px; background: var(--paper); border-top: 0.5px solid var(--border-soft); border-right: 0.5px solid var(--border-soft); border-bottom: 0.5px solid var(--border-soft); width: 100%; max-width: 560px; }
  .lbl { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey); margin-bottom: 10px; }
  .big { font-family: var(--font-display); font-weight: 900; font-size: 56px; color: var(--ink); letter-spacing: -0.035em; line-height: 1; margin-bottom: 4px; }
  .sub { font-size: 14px; color: var(--grey); margin-bottom: 14px; }
  .src { padding-top: 10px; border-top: 0.5px dashed var(--border-dash); font-size: 9px; color: var(--fg-faint); letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="card">
    <span class="cm tl"></span><span class="cm tr"></span><span class="cm bl"></span><span class="cm br"></span>
    <div class="lbl">Prezzo · Lancio Italia</div>
    <div class="big">€ 1.299</div>
    <div class="sub">iPhone 16 Pro Max · 256GB</div>
    <div class="src">Apple Store Italia · Novembre 2024</div>
  </div>
</body>
</html>
