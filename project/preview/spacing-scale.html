<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
  .row { display: flex; align-items: center; gap: 16px; }
  .l { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey); width: 96px; flex-shrink: 0; }
  .b { background: var(--ink); height: 14px; }
  .px { font-size: 9px; color: var(--fg-faint); width: 50px; text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="l">space-1</span><div class="b" style="width: 4px;"></div><span class="px">4 px</span></div>
  <div class="row"><span class="l">space-2</span><div class="b" style="width: 8px;"></div><span class="px">8 px</span></div>
  <div class="row"><span class="l">space-3</span><div class="b" style="width: 12px;"></div><span class="px">12 px</span></div>
  <div class="row"><span class="l">space-4</span><div class="b" style="width: 16px;"></div><span class="px">16 px</span></div>
  <div class="row"><span class="l">space-5</span><div class="b" style="width: 20px;"></div><span class="px">20 px</span></div>
  <div class="row"><span class="l">space-6</span><div class="b" style="width: 24px;"></div><span class="px">24 px</span></div>
  <div class="row"><span class="l">space-8</span><div class="b" style="width: 32px;"></div><span class="px">32 px</span></div>
  <div class="row"><span class="l">space-10</span><div class="b" style="width: 40px;"></div><span class="px">40 px</span></div>
  <div class="row"><span class="l">space-12</span><div class="b" style="width: 48px;"></div><span class="px">48 px</span></div>
  <div class="row"><span class="l">space-16</span><div class="b" style="width: 64px;"></div><span class="px">64 px</span></div>
  <div class="row"><span class="l">space-20</span><div class="b" style="width: 80px;"></div><span class="px">80 px</span></div>
</body>
</html>
