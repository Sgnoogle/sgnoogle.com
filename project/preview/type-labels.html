<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 32px; align-content: center; }
  .b { display: flex; flex-direction: column; gap: 6px; }
  .l { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); }
  .ex { padding: 4px 0; }
</style>
</head>
<body>
  <div class="b">
    <span class="l">.t-tag</span>
    <span class="ex" style="font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--yellow);">§ 01 · NUOVO</span>
  </div>
  <div class="b">
    <span class="l">.t-label</span>
    <span class="ex" style="font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey);">PREZZO LANCIO ITALIA</span>
  </div>
  <div class="b">
    <span class="l">.t-body</span>
    <span class="ex" style="font-size: 13px; color: var(--grey);">iPhone 16 Pro Max · 256GB · Apple Store</span>
  </div>
  <div class="b">
    <span class="l">.t-caption</span>
    <span class="ex" style="font-size: 9px; font-weight: 300; color: var(--fg-faint); letter-spacing: 0.06em;">Apple Store Italia · Novembre 2024</span>
  </div>
  <div class="b">
    <span class="l">CTA · ALL CAPS</span>
    <span class="ex" style="font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink);">→ CONTINUA</span>
  </div>
  <div class="b">
    <span class="l">title · uppercase</span>
    <span class="ex display" style="font-size: 28px; color: var(--ink);">COMPRARLO</span>
  </div>
</body>
</html>
