<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 32px; display: flex; flex-direction: column; gap: 18px; justify-content: center; align-items: flex-start; }
  .hud { display: flex; align-items: center; gap: 10px; border: 0.5px solid var(--border); padding: 8px 12px; background: var(--white); }
  .avatar { width: 36px; height: 36px; background: var(--ink); display: flex; align-items: center; justify-content: center; color: var(--yellow); font-family: var(--font-display); font-weight: 900; font-size: 16px; flex-shrink: 0; }
  .info { border-left: 0.5px solid var(--border); padding-left: 10px; }
  .name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--ink); }
  .sub { font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey); margin: 2px 0 5px; }
  .bar { height: 2px; background: rgba(120,122,124,0.2); width: 88px; position: relative; }
  .bar div { position: absolute; left: 0; top: 0; height: 100%; width: 65%; background: var(--yellow); }

  .mini { display: flex; align-items: center; gap: 8px; }
  .mini .y { font-size: 12px; color: var(--yellow); font-weight: 900; }
  .mini .n { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--grey); }
  .mini .v { font-size: 9px; color: var(--fg-faint); }

  .caption { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-faint); margin-top: 2px; }
</style>
</head>
<body>
  <div>
    <div class="hud">
      <div class="avatar">FS</div>
      <div class="info">
        <div class="name">SGNAOLIN</div>
        <div class="sub">Tech Creator</div>
        <div class="bar"><div></div></div>
      </div>
    </div>
    <div class="caption">Versione completa · top-right</div>
  </div>
  <div>
    <div class="mini">
      <span class="y">⚡</span>
      <span class="n">FrancescoSgnaolin</span>
      <span class="v">· v2.4</span>
    </div>
    <div class="caption" style="margin-top: 8px;">Versione minimal · mobile · video</div>
  </div>
</body>
</html>
