<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; display: flex; flex-direction: column; justify-content: center; }
  .meta { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--grey); margin-bottom: 14px; display: flex; justify-content: space-between; }
  .meta .badge { background: var(--yellow); color: var(--ink); font-weight: 700; padding: 3px 8px; letter-spacing: 0.1em; }
  .big { font-family: var(--font-display); font-weight: 900; font-size: 84px; line-height: 0.92; letter-spacing: -0.035em; color: var(--ink); }
  .big span { color: var(--yellow); }
  .underline { font-size: 12px; color: var(--grey); margin-top: 12px; }
</style>
</head>
<body>
  <div class="meta"><span>Neue Machina · Ultrabold · Display</span><span class="badge">TITOLI · COVER · NUMERI</span></div>
  <div class="big">2 ANNI<br><span>DOPO</span></div>
  <div class="underline">Min size 40px @ 1920×1080 · max 5 parole · giallo solo sopra 60px su acciaio</div>
</body>
</html>
